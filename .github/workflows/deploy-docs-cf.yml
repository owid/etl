name: Deploy docs to Cloudflare Pages

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: deploy-docs-cf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Override site_url for the Cloudflare build
        run: |
          sed -i 's|^site_url = .*|site_url = "https://docs.owid.io/projects/etl/"|' zensical.toml

      - name: Build docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make docs.build

      - name: Stage build under /projects/etl/
        run: |
          mkdir -p staging/projects/etl
          cp -a site/. staging/projects/etl/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy staging
            --project-name=owid-etl-docs
            --branch=${{ github.head_ref || github.ref_name }}
        # PR preview URL is surfaced by the owidbot comment
        # (apps/owidbot/cli.py:create_comment_body), so we don't post a
        # separate sticky comment from here.
