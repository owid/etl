dataset:
  title: Long-run stunting rates (Schneider et al. 2026)
  description: Long-run estimates of childhood stunting rates
  licenses:
    - {}
tables:
  stunting_rate_schneider:
    variables:
      stunting_rate:
        title: Stunting rate among 2 to 10 year olds
        unit: '%'
