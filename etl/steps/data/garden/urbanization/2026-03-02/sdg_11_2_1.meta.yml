definitions:
  common:
    presentation:
      topic_tags:
        - Urbanization
    processing_level: major

dataset:
  update_period_days: 365
  description: |-
    This dataset provides data on SDG Indicator 11.2.1 - the proportion of the urban population with convenient access to public transport.

    Country-level values are population-weighted averages across cities, using city population data from the Global Human Settlement Layer (GHSL) Urban Centers database.

    Administrative regions (states, provinces, national averages) have been excluded from the dataset to focus on actual city-level measurements.

tables:
  sdg_11_2_1_country:
    variables:
      public_transport_access:
        title: Share of urban population with convenient access to public transport (population-weighted)
        unit: "%"
        short_unit: "%"
        description_short: Population-weighted average share of residents in [cities](#dod:cities-degurba) with a public transport stop within 500 metres walking distance.
        description_key:
          - This measures what share of urban residents live within 500 metres walking distance of a public transport stop — the threshold UN-Habitat uses to define "convenient access".
          - It captures physical proximity to a stop, not service quality, frequency, affordability, or safety. A stop that runs twice a day counts the same as one with frequent service.
          - Informal transport networks are likely undercounted where they are not fully mapped in available data sources. Cities with extensive informal networks may have higher actual access than reported.
          - Data sources vary across cities and countries. Transport stop locations are drawn from OpenStreetMap, GTFS feeds, Google Maps, TomTom, and others. Most cities are estimated by UN-Habitat using the global methodology; European cities use Eurostat sources; some countries provide their own data from surveys or administrative records. This variation can affect comparability.
          - Country values are population-weighted averages across all cities with available data. Cities are weighted by their population from the GHSL Urban Centers database, so larger cities contribute more to the country average than smaller cities. This provides a more accurate representation of the urban population's access to public transport than a simple average.
          - Approximately 81% of cities could be matched with GHSL population data. Unmatched cities (mainly due to name spelling differences or cities below the GHSL 50k population threshold) are excluded from country averages. Administrative regions (states, provinces, national averages) have also been excluded.
          - City boundaries follow the [Degree of Urbanization](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php) and may differ from official administrative boundaries.
        description_processing: |-
          Administrative regions (167 entries) were excluded from the original SDG dataset to focus on actual cities. Country values are calculated as population-weighted averages across all cities with available population data. City populations are sourced from the Global Human Settlement Layer (GHSL) Urban Centers database (2020 values). Cities are matched with GHSL data using multiple strategies: normalized name matching (removes diacritics, handles alternative names), substring matching, compound name handling (e.g., "City, Province" → "City"), and manual mapping for common transliteration differences. About 81% of cities successfully match with GHSL population data.
        display:
          numDecimalPlaces: 1
