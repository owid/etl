dataset:
  update_period_days: 365
  title: SDG Indicator 11.2.1 - Access to Public Transport

tables:
  sdg_11_2_1_city:
    title: Access to Public Transport - City Level
    description: |-
      City-level data on the proportion of the population that has convenient access to public transport. Convenient access is defined as having a public transport stop within 500 meters walking distance.
    variables:
      public_transport_access:
        title: Share of urban population with convenient access to public transport
        unit: "%"
        short_unit: "%"
        description_short: Proportion of the population that has convenient access to public transport (within 500 meters walking distance).
        description_key:
          - SDG Indicator 11.2.1 measures the proportion of the population that has convenient access to public transport, disaggregated by sex, age and persons with disabilities.
          - Convenient access is defined as having a public transport stop within 500 meters walking distance.
          - This indicator is based on mapping of public transport stops and population distribution data.
        display:
          numDecimalPlaces: 1
          entityAnnotationsMap: *entityAnnotationsMapCities

  sdg_11_2_1_country:
    title: Access to Public Transport - Country Level
    description: |-
      Country-level aggregates showing the average proportion of urban population with convenient access to public transport. This is calculated as the mean across all cities in each country.
    variables:
      public_transport_access:
        title: Average share of urban population with convenient access to public transport across cities
        unit: "%"
        short_unit: "%"
        description_short: Average across all cities in the country of the proportion of the population that has convenient access to public transport (within 500 meters walking distance).
        description_key:
          - This is calculated as the mean across all cities in each country that have data available.
          - SDG Indicator 11.2.1 measures the proportion of the population that has convenient access to public transport, where convenient access is defined as having a public transport stop within 500 meters walking distance.
          - The country average provides a summary measure but may not be population-weighted, so larger cities have the same weight as smaller cities.
        display:
          numDecimalPlaces: 1
