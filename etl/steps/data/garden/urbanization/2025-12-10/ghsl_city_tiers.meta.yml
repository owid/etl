# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      topic_tags:
        - Urbanization
    processing_level: major

  desc_key: &desc_key
    - The [GHSL Urban Centre Database (GHS-UCDB R2024A)](https://human-settlement.emergency.copernicus.eu/ghs_ucdb2024.php) tracks population and land use for 11,422 [cities](#dod:cities-degurba) around the world. Cities are identified using the [Degree of Urbanization](https://human-settlement.emergency.copernicus.eu/degurba.php), based on population density and settlement size rather than administrative boundaries. To qualify as a city, an area must have at least 1,500 people per square kilometre and a total population of at least 50,000.
    - City boundaries are fixed at their 2025 extent and held constant across all years. This means historical values reflect conditions within today's city boundary, not the city as it was defined at the time.
    - The underlying population figures have been rescaled to match UN World Population Prospects 2022 national totals, so country-level numbers are consistent with UN estimates.

  desc_processing: &desc_processing |-
    Cities are ranked by population within each country and year. Tier 1 is the single largest city; Tier 2 is the 2nd to 5th largest cities combined; Tier 3 is the 6th to 50th largest cities combined. Regional aggregates pool all cities from member countries before ranking.

  # ── short descriptions ────────────────────────────────────────────────────
  desc_tier1_pop_est: &desc_tier1_pop_est |-
    Total population living in the single largest city (historical).
  desc_tier1_pop_proj: &desc_tier1_pop_proj |-
    Total population living in the single largest city (projected).
  desc_tier2_pop_est: &desc_tier2_pop_est |-
    Total population living in the 2nd to 5th largest cities combined (historical).
  desc_tier2_pop_proj: &desc_tier2_pop_proj |-
    Total population living in the 2nd to 5th largest cities combined (projected).
  desc_tier3_pop_est: &desc_tier3_pop_est |-
    Total population living in the 6th to 50th largest cities combined (historical).
  desc_tier3_pop_proj: &desc_tier3_pop_proj |-
    Total population living in the 6th to 50th largest cities combined (projected).

  desc_tier1_share_est: &desc_tier1_share_est |-
    Share of the total population living in the single largest city (historical).
  desc_tier1_share_proj: &desc_tier1_share_proj |-
    Share of the total population living in the single largest city (projected).
  desc_tier2_share_est: &desc_tier2_share_est |-
    Share of the total population living in the 2nd to 5th largest cities combined (historical).
  desc_tier2_share_proj: &desc_tier2_share_proj |-
    Share of the total population living in the 2nd to 5th largest cities combined (projected).
  desc_tier3_share_est: &desc_tier3_share_est |-
    Share of the total population living in the 6th to 50th largest cities combined (historical).
  desc_tier3_share_proj: &desc_tier3_share_proj |-
    Share of the total population living in the 6th to 50th largest cities combined (projected).

