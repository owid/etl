# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      topic_tags:
        - Urbanization
    processing_level: major

  desc_key: &desc_key
    - The [GHSL Urban Centre Database (GHS-UCDB R2024A)](https://human-settlement.emergency.copernicus.eu/ghs_ucdb2024.php) tracks population and land use for 11,422 [cities](#dod:cities-degurba) around the world. Cities are identified using the [Degree of Urbanization](https://human-settlement.emergency.copernicus.eu/degurba.php), based on population density and settlement size rather than administrative boundaries. To qualify as a city, an area must have at least 1,500 people per square kilometre and a total population of at least 50,000.
    - City boundaries are fixed at their 2025 extent and held constant across all years. This means historical values reflect conditions within today's city boundary, not the city as it was defined at the time.
    - The underlying population figures have been rescaled to match UN World Population Prospects 2022 national totals, so country-level numbers are consistent with UN estimates.
    - Cities are grouped into size bins following the 1-2-3-5 rule on a log scale. Each x-axis value is the upper bound of its bin (e.g. x = 100,000 captures cities with 50,000–100,000 people). Bin boundaries are 100k, 200k, 300k, 500k, 1M, 2M, 3M, 5M, 10M, 20M, 30M, 50M, and 100M (sentinel for 50M+).

  desc_short_share_estimates: &desc_short_share_estimates |-
    Share of urban-centre population living in cities of each size category (historical estimates). The x-axis position is the upper-population limit of the bin.

  desc_short_share_projections: &desc_short_share_projections |-
    Share of urban-centre population living in cities of each size category (projections). The x-axis position is the upper-population limit of the bin.

  desc_short_pop_estimates: &desc_short_pop_estimates |-
    Total number of people living in urban centres of each size category (historical estimates). The x-axis position is the upper-population limit of the bin.

  desc_short_pop_projections: &desc_short_pop_projections |-
    Total number of people living in urban centres of each size category (projections). The x-axis position is the upper-population limit of the bin.

  desc_processing_share: &desc_processing_share |-
    For each country and year, cities are assigned to a size bin based on their population. The population in each bin is summed and divided by the total urban-centre population to give the share. Regional aggregates are computed as the sum of city populations across all countries in the region.

  desc_processing_pop: &desc_processing_pop |-
    For each country and year, cities are assigned to a size bin based on their population. The population in each bin is summed. Regional aggregates are computed as the sum of city populations across all countries in the region.

