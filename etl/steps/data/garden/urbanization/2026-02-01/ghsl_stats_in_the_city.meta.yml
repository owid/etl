definitions:
  common:
    display:
      numDecimalPlaces: 1
    presentation:
      topic_tags:
        - Urbanization
    processing_level: minor

  # Shared description used across variables
  desc_key_common: &desc_key_common
    - This dataset reports country-level indicators aggregated from [cities](#dod:cities-degurba). Cities are defined using the [Degree of Urbanization](https://human-settlement.emergency.copernicus.eu/degurba.php), which identifies urban centres based on population density and settlement size rather than administrative boundaries.
    - City boundaries are model-derived and may not match official administrative limits. In some countries, what is considered a single city may appear as multiple cities depending on how built-up areas are distributed.

  # Processing anchors
  desc_processing_pop_weighted: &desc_processing_pop_weighted |-
    Country values were calculated as a population-weighted average across cities. Larger cities therefore contribute more to the country average, meaning the result reflects the experience of the average city resident rather than the average city.

  desc_processing_simple_mean: &desc_processing_simple_mean |-
    Country values were calculated as a simple average across cities. Each city contributes equally, regardless of population size.

  desc_processing_sum_over_city_pop_2020: &desc_processing_sum_over_city_pop_2020 |-
    We summed totals across all cities in each country and divided by the total city population in 2020. Using a fixed denominator makes values comparable over time but means changes may reflect both infrastructure growth and differences in historical population levels.

  desc_speedtest_caveat: &desc_speedtest_caveat
    - Internet speeds are measured using the Speedtest app, which users voluntarily run to test their own connection.
    - Coverage is therefore higher in places where more people run these tests, and some cities have little or no data.

  desc_osm_healthsites_caveat: &desc_osm_healthsites_caveat
    - Facility locations come from OpenStreetMap via healthsites.io.
    - Coverage and accuracy vary by location, and some hospitals or pharmacies may be missing or misclassified.

dataset:
  update_period_days: 365

tables:
  ghsl_stats_in_the_city:
    variables:

      average_download_speed:
        title: Average internet download speed
        unit: megabits per second
        short_unit: Mbps
        description_short: Average internet download speed across [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - *desc_key_common
          - Download speeds are measured using the Speedtest app.
          - *desc_speedtest_caveat
          - Country values are calculated as population-weighted averages across cities.
        description_from_producer: Network performance is measured through user tests on the Speedtest app, so information is missing where users do not run tests.
        description_processing: *desc_processing_pop_weighted

      road_network_density:
        title: Road network density
        unit: km per km²
        short_unit: km/km²
        description_short: Total length of roads per square kilometre of land in [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated by dividing the total length of roads in a city by its land area.
          - Road data comes from the Overture Maps Foundation.
          - Country values are calculated as simple averages across cities.
        description_from_producer: Road network density is defined as total road length inside the urban centre divided by its area.
        description_processing: *desc_processing_simple_mean

      road_length_per_inhabitant:
        title: Road length per city resident
        unit: meters per person
        short_unit: m
        description_short: Total road length per resident across [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated by summing the total length of roads across all cities in a country and dividing by the 2020 city population.
          - Road data comes from the Overture Maps Foundation.
          - Using a fixed (2020) population denominator allows comparisons over time.
        description_from_producer: Total road length inside the urban center.
        description_processing: *desc_processing_sum_over_city_pop_2020

      share_of_population_living_in_the_high_green_area:
        title: Share of city residents living in high-greenness areas
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living in areas with high vegetation cover, aggregated to the country level.
        description_key:
          - *desc_key_common
          - Areas are classified as "high greenness" using satellite vegetation data (NDVI).
          - NDVI values are averaged over three years, with thresholds defined by UN-Habitat for different agro-ecological zones.
          - Measured within a 300-metre buffer around the built-up area of each city.
          - Country values are calculated as population-weighted averages across cities.
        description_from_producer: Share of the Urban Centre population living in areas of high greenness.
        description_processing: *desc_processing_pop_weighted

      share_of_population_with_access_to_hospitals:
        title: Share of city residents with a hospital nearby
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living within 1 km of a hospital, aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated as the share of people living within 1 kilometre of a hospital.
          - *desc_osm_healthsites_caveat
          - Country values are calculated as population-weighted averages across cities.
        description_from_producer: Share of population living within a kilometer buffer of a hospital facility inside the urban centre.
        description_processing: *desc_processing_pop_weighted

      share_of_population_with_access_to_pharmacies:
        title: Share of city residents with a pharmacy nearby
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living within 1 km of a pharmacy, aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated as the share of people living within 1 kilometre of a pharmacy.
          - *desc_osm_healthsites_caveat
          - Country values are calculated as population-weighted averages across cities.
        description_from_producer: Share of population living within a kilometer buffer of a pharmacy facility inside the urban centre.
        description_processing: *desc_processing_pop_weighted

      number_of_hospitals:
        title: Hospitals per 100,000 city residents
        unit: per 100,000 people
        short_unit: per 100k
        description_short: Hospital facilities per 100,000 [city](#dod:cities-degurba) residents, aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated by summing all hospital facilities across cities in a country.
          - The total is divided by the country's city population for that year and expressed per 100,000 residents.
          - *desc_osm_healthsites_caveat
        description_from_producer: Number of hospital facilities.
        description_processing: We summed the total number of hospitals across cities in each country and divided by the total city population for that year, multiplying by 100,000.

      number_of_pharmacies:
        title: Pharmacies per 100,000 city residents
        unit: per 100,000 people
        short_unit: per 100k
        description_short: Pharmacy facilities per 100,000 [city](#dod:cities-degurba) residents, aggregated to the country level.
        description_key:
          - *desc_key_common
          - Calculated by summing all pharmacy facilities across cities in a country.
          - The total is divided by the country's city population for that year and expressed per 100,000 residents.
          - *desc_osm_healthsites_caveat
        description_from_producer: Number of pharmacy facilities.
        description_processing: We summed the total number of pharmacies across cities in each country and divided by the total city population for that year, multiplying by 100,000.