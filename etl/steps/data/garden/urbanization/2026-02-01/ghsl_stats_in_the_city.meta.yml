definitions:
  common:
    display:
      numDecimalPlaces: 1
    presentation:
      topic_tags:
        - Urbanization
    processing_level: major

  desc_key_city_definition: &desc_key_city_definition
    - Cities here are defined using the [Degree of Urbanization](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php), which maps dense settlements from population grids rather than administrative borders. To qualify, an area needs at least 1,500 people per km² and 50,000 residents in total. This means city boundaries won't always match official city limits, and some places people consider one city may appear as several — or vice versa — depending on how built-up areas connect.
    - Cities are split at country borders, so a cross-border city appears as a separate entry for each country. For country-level figures, only the portion inside that country is counted.

  # Shared: proximity threshold caveat for 1 km access indicators
  desc_key_1km_threshold: &desc_key_1km_threshold
    - The 1 km threshold is a straight-line distance, not walking or travel time. Actual access depends on road layout, transport, and whether facilities are open and operational.


  # Shared: hospital identification and tagging methodology
  desc_key_hospital_identification: &desc_key_hospital_identification
    - Hospitals are identified from OpenStreetMap data. A facility is counted as a hospital when its attributes contain the word "hospital"; point and polygon features are compared to reduce duplicates.

  # Shared: caveat on the broad and inconsistent definition of "hospital"
  desc_key_hospital_definition_broad: &desc_key_hospital_definition_broad
    - The definition of "hospital" is broad and inconsistent across countries. It includes any facility tagged with "hospital" in OpenStreetMap, making no distinction between major teaching hospitals, small clinics, inpatient facilities, or outpatient centers. Different countries may tag similar facilities differently.

  # Shared: OSM coverage caveat specific to hospital indicators
  desc_key_hospital_osm_coverage: &desc_key_hospital_osm_coverage
    - Because this relies on OpenStreetMap, coverage varies dramatically. Countries with active mapping communities (particularly in Europe) may have more facilities mapped, including small clinics, while others may only have major hospitals recorded. High values often reflect better OpenStreetMap coverage rather than more health infrastructure.

  # Shared: cross-country comparison warning for hospital indicators
  desc_key_hospital_cross_country: &desc_key_hospital_cross_country
    - Cross-country comparisons are unreliable and should not be used to assess relative health system capacity. Differences often reflect OpenStreetMap mapping practices and volunteer activity rather than actual differences in hospital availability.

  # Shared: pharmacy identification and tagging methodology
  desc_key_pharmacy_identification: &desc_key_pharmacy_identification
    - Pharmacies are identified from OpenStreetMap data. A facility is counted as a pharmacy when its attributes contain "pharmacy" but not "hospital"; point and polygon features are compared to reduce duplicates.

  # Shared: OSM coverage caveat specific to pharmacy indicators
  desc_key_pharmacy_osm_coverage: &desc_key_pharmacy_osm_coverage
    - Because this relies on OpenStreetMap, coverage varies dramatically. Countries with active mapping communities may have more facilities mapped, while others may only have major pharmacies recorded. High values often reflect better OpenStreetMap coverage rather than more pharmacy infrastructure.

  # Shared: cross-country comparison warning for pharmacy indicators
  desc_key_pharmacy_cross_country: &desc_key_pharmacy_cross_country
    - Cross-country comparisons are unreliable and should not be used to assess relative pharmacy availability. Differences often reflect OpenStreetMap mapping practices and volunteer activity rather than actual differences in pharmacy density.

  # Shared: road data source caveat for road indicators
  desc_key_road_data_source: &desc_key_road_data_source
    - Road data comes from the Overture Maps Foundation, an open global mapping dataset. Completeness and how roads are classified can differ across countries, so comparisons should be made with care.

  desc_processing_pop_weighted: &desc_processing_pop_weighted |-
    Country values are calculated as a population-weighted average across cities, so larger cities count more. This reflects what the average city resident experiences rather than treating a city of 100,000 the same as one of 5 million. Population weights come from the GHSL 5-year series; for indicator years that fall between intervals, the nearest available population year is used.

  desc_processing_road_length: &desc_processing_road_length |-
    Road length is first converted to metres per person at the city level, then aggregated to the country level as a population-weighted average. Population weights come from the GHSL 5-year series; the nearest available population year to 2024 (i.e. 2025) is used.

  desc_processing_facilities_per_capita: &desc_processing_facilities_per_capita |-
    Facility counts are first converted to a per-100,000 rate at the city level, then aggregated to the country level as a population-weighted average. Population weights come from the GHSL 5-year series; the nearest available population year to 2024 (i.e. 2025) is used.

dataset:
  update_period_days: 365

tables:
  ghsl_stats_in_the_city:
    variables:

      average_download_speed:
        title: Average internet download speed (fixed broadband)
        unit: megabits per second
        short_unit: Mbps
        description_short: Average fixed-broadband download speed across [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - This measures how fast fixed (non-mobile) broadband connections are in cities. It gives a sense of the digital infrastructure available to city residents.
          - The speed data comes from Speedtest by Ookla and reflects tests that people voluntarily run, not a census of all connections. Coverage is uneven — places where fewer people run tests may have noisier or missing estimates.
          - This covers fixed broadband only. Mobile internet speeds, which are often the primary connection in lower-income countries, are not included.
          - *desc_key_city_definition
        description_processing: *desc_processing_pop_weighted

      road_network_density:
        title: Road network density
        unit: km per km²
        short_unit: km/km²
        description_short: Total road length per square kilometre across [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - This measures how densely roads are laid out within a city — the total length of roads divided by the city's land area. A higher value means roads are more closely spaced.
          - It captures the extent of the road network, but not road quality, width, or how well-connected the network is for getting around.
          - *desc_key_road_data_source
          - *desc_key_city_definition
        description_processing: *desc_processing_pop_weighted

      road_length_per_inhabitant:
        title: Road length per city resident
        unit: meters per person
        short_unit: m
        description_short: Total road length per resident across [cities](#dod:cities-degurba), aggregated to the country level.
        description_key:
          - This measures how much road infrastructure exists relative to the number of people living in cities. It reflects whether road networks have kept pace with city populations.
          - *desc_key_road_data_source
          - *desc_key_city_definition
        description_processing: *desc_processing_road_length

      share_of_population_living_in_the_high_green_area:
        title: Share of city residents living in high-greenness areas
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living in neighbourhoods with high vegetation cover, aggregated to the country level.
        description_key:
          - This measures the share of city residents who live near abundant vegetation — a common proxy for access to green space and the cooling, air quality, and wellbeing benefits it provides.
          - Vegetation is measured from satellites using NDVI (a standard index of land surface greenness), averaged over three years and assessed within 300 metres of the built-up city area.
          - This measures vegetation cover, not the presence of formal parks. A tree-lined street counts; a paved park with few trees may not.
          - What counts as "high greenness" depends on where a city is. A city in a dry region is compared to other dry-region cities, not to cities in wetter, greener parts of the world. UN-Habitat set these benchmarks by averaging vegetation levels across 700 cities in each climate zone.
          - City boundaries are fixed at their 2025 extent, so historical values describe vegetation conditions inside today's city boundary — not the city as it was in the past.
          - *desc_key_city_definition
        description_processing: *desc_processing_pop_weighted

      share_of_population_with_access_to_hospitals:
        title: Share of city residents with a hospital nearby
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living within 1 km of a hospital, aggregated to the country level.
        description_key:
          - This measures how many city residents live within 1 kilometre of a hospital — a basic indicator of physical access to inpatient care.
          - *desc_key_1km_threshold
          - High values can reflect either good coverage or compact geography. In small, densely populated cities, most residents may live within 1 km of the few hospitals that exist. This indicates proximity but not necessarily abundant healthcare capacity.
          - *desc_key_hospital_identification
          - *desc_key_hospital_definition_broad
          - *desc_key_hospital_osm_coverage
          - *desc_key_hospital_cross_country
          - *desc_key_city_definition
        description_processing: *desc_processing_pop_weighted

      share_of_population_with_access_to_pharmacies:
        title: Share of city residents with a pharmacy nearby
        unit: "%"
        short_unit: "%"
        description_short: Share of [city](#dod:cities-degurba) residents living within 1 km of a pharmacy, aggregated to the country level.
        description_key:
          - This measures how many city residents live within 1 kilometre of a pharmacy — a basic indicator of access to medicines and routine healthcare.
          - *desc_key_1km_threshold
          - High values can reflect either good coverage or compact geography. In small, densely populated cities, most residents may live within 1 km of the few pharmacies that exist. This indicates proximity but not necessarily abundant pharmacy infrastructure.
          - *desc_key_pharmacy_identification
          - *desc_key_pharmacy_osm_coverage
          - *desc_key_pharmacy_cross_country
          - *desc_key_city_definition
        description_processing: *desc_processing_pop_weighted

      number_of_hospitals:
        title: Hospitals per 100,000 city residents
        unit: per 100,000 people
        description_short: Number of hospital facilities per 100,000 [city](#dod:cities-degurba) residents, aggregated to the country level.
        description_key:
          - This measures the density of hospitals relative to the city population — how many facilities exist per 100,000 city residents.
          - *desc_key_hospital_identification
          - *desc_key_hospital_definition_broad
          - *desc_key_hospital_osm_coverage
          - *desc_key_hospital_cross_country
          - *desc_key_city_definition
        description_processing: *desc_processing_facilities_per_capita


      number_of_pharmacies:
        title: Pharmacies per 100,000 city residents
        unit: per 100,000 people
        description_short: Number of pharmacy facilities per 100,000 [city](#dod:cities-degurba) residents, aggregated to the country level.
        description_key:
          - This measures the density of pharmacies relative to the city population — how many facilities exist per 100,000 city residents.
          - *desc_key_pharmacy_identification
          - *desc_key_pharmacy_osm_coverage
          - *desc_key_pharmacy_cross_country
          - *desc_key_city_definition
        description_processing: *desc_processing_facilities_per_capita
