# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    processing_level: major
    presentation:
      topic_tags:
        - Economic Growth
  description_processing_splice: |-
    This indicator combines two sources: recent estimates from the World Bank's World Development Indicators, and a compilation of historical sources built by Our World in Data, based on the dataset published by Herrendorf, Rogerson and Valentinyi (2014) and updated with the GGDC 10-Sector Database (January 2015 release) and the Swedish Historical National Accounts. For each country, World Bank data is used from its first available year onwards; historical sources only inform earlier years.
  description_key_utilities: |-
    In the historical estimates, utilities (electricity, gas and water) are counted within services, following Herrendorf, Rogerson and Valentinyi (2014). The World Bank counts them within industry. This creates a small definitional break between the historical and recent segments of the industry and services series.
  description_key_employment_concepts: |-
    Historical estimates count the number of persons engaged in each sector, based on national historical statistics. Recent estimates (from 1991) are ILO-modeled estimates published by the World Bank, based on employment of people aged 15 and over.

# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  title: Long-run data on employment and GDP by economic sector
  update_period_days: 365

tables:
  structural_transformation_omm:
    variables:
      share_employed_agriculture:
        title: Share of employment in agriculture
        unit: "%"
        short_unit: "%"
        description_short: Share of working people employed in agriculture, including hunting, forestry and fishing.
        description_key:
          - Recent estimates (from 1991) are ILO-modeled estimates published by the World Bank, measuring agricultural employment as a share of total employment.
          - Earlier estimates for ten of today's rich countries are derived from historical reconstructions of the number of people working in each sector. For five European countries, benchmark estimates from Broadberry and Gardner (2013) reach back as far as 1300; these measure the share of the total labor force, which also includes unemployed people.
        description_processing: |-
          {definitions.description_processing_splice}

          Employment shares before the first World Bank year are calculated from the compilation's employment numbers, as agricultural employment divided by total employment across the three sectors. Benchmark estimates of the share of the labor force in agriculture from Broadberry and Gardner (2013) are used for years and countries the compilation does not cover.
        presentation:
          topic_tags:
            - Employment in Agriculture
            - Economic Growth
          title_public: Share of employment in agriculture
        display:
          name: Agriculture
          numDecimalPlaces: 1
      share_employed_industry:
        title: Share of employment in industry
        unit: "%"
        short_unit: "%"
        description_short: Share of working people employed in industry, including mining, manufacturing and construction.
        description_key:
          - Recent estimates (from 1991) are ILO-modeled estimates published by the World Bank, measuring industrial employment as a share of total employment.
          - Earlier estimates for ten of today's rich countries are derived from historical reconstructions of the number of people working in each sector.
          - "{definitions.description_key_utilities}"
        description_processing: |-
          {definitions.description_processing_splice}

          Employment shares before the first World Bank year are calculated from the compilation's employment numbers, as industrial employment divided by total employment across the three sectors.
        display:
          name: Industry
          numDecimalPlaces: 1
        presentation:
          title_public: Share of employment in industry
      share_employed_services:
        title: Share of employment in services
        unit: "%"
        short_unit: "%"
        description_short: Share of working people employed in services.
        description_key:
          - Recent estimates (from 1991) are ILO-modeled estimates published by the World Bank, measuring services employment as a share of total employment.
          - Earlier estimates for ten of today's rich countries are derived from historical reconstructions of the number of people working in each sector.
          - "{definitions.description_key_utilities}"
        description_processing: |-
          {definitions.description_processing_splice}

          Employment shares before the first World Bank year are calculated from the compilation's employment numbers, as services employment divided by total employment across the three sectors.
        display:
          name: Services
          numDecimalPlaces: 1
        presentation:
          title_public: Share of employment in services
      number_employed_agriculture:
        title: Number of people employed in agriculture
        unit: people
        description_short: Number of people working in agriculture, including hunting, forestry and fishing.
        description_key:
          - "{definitions.description_key_employment_concepts}"
        description_processing: |-
          {definitions.description_processing_splice}

          For recent years, the number is calculated as the World Bank's agricultural share of employment multiplied by the total number of employed people, which is derived in turn from the ILO-modeled employment-to-population ratio and the United Nations estimate of the population aged 15 and over.
        presentation:
          topic_tags:
            - Employment in Agriculture
            - Economic Growth
          title_public: Number of people employed in agriculture
        display:
          name: Agriculture
          numDecimalPlaces: 0
      number_employed_industry:
        title: Number of people employed in industry
        unit: people
        description_short: Number of people working in industry, including mining, manufacturing and construction.
        description_key:
          - "{definitions.description_key_employment_concepts}"
          - "{definitions.description_key_utilities}"
        description_processing: |-
          {definitions.description_processing_splice}

          For recent years, the number is calculated as the World Bank's industrial share of employment multiplied by the total number of employed people, which is derived in turn from the ILO-modeled employment-to-population ratio and the United Nations estimate of the population aged 15 and over.
        display:
          name: Industry
          numDecimalPlaces: 0
        presentation:
          title_public: Number of people employed in industry
      number_employed_services:
        title: Number of people employed in services
        unit: people
        description_short: Number of people working in services.
        description_key:
          - "{definitions.description_key_employment_concepts}"
          - "{definitions.description_key_utilities}"
        description_processing: |-
          {definitions.description_processing_splice}

          For recent years, the number is calculated as the World Bank's services share of employment multiplied by the total number of employed people, which is derived in turn from the ILO-modeled employment-to-population ratio and the United Nations estimate of the population aged 15 and over.
        display:
          name: Services
          numDecimalPlaces: 0
        presentation:
          title_public: Number of people employed in services
      share_gdp_agriculture:
        title: Share of agriculture in GDP
        unit: "%"
        short_unit: "%"
        description_short: Value added of agriculture, including hunting, forestry and fishing, as a share of GDP, at current prices.
        description_key:
          - Recent estimates are published by the World Bank and measure value added as a share of GDP. Because of taxes, subsidies and measurement differences, the three sectors may not sum to exactly 100%.
          - Historical estimates measure each sector's share of the total value added of the three sectors, at current prices, and sum to 100%.
        description_processing: "{definitions.description_processing_splice}"
        display:
          name: Agriculture
          numDecimalPlaces: 1
        presentation:
          title_public: Share of agriculture in GDP
      share_gdp_industry:
        title: Share of industry in GDP
        unit: "%"
        short_unit: "%"
        description_short: Value added of industry, including mining, manufacturing and construction, as a share of GDP, at current prices.
        description_key:
          - Recent estimates are published by the World Bank and measure value added as a share of GDP. Because of taxes, subsidies and measurement differences, the three sectors may not sum to exactly 100%.
          - Historical estimates measure each sector's share of the total value added of the three sectors, at current prices, and sum to 100%.
          - "{definitions.description_key_utilities}"
        description_processing: "{definitions.description_processing_splice}"
        display:
          name: Industry
          numDecimalPlaces: 1
        presentation:
          title_public: Share of industry in GDP
      share_gdp_services:
        title: Share of services in GDP
        unit: "%"
        short_unit: "%"
        description_short: Value added of services as a share of GDP, at current prices.
        description_key:
          - Recent estimates are published by the World Bank and measure value added as a share of GDP. Because of taxes, subsidies and measurement differences, the three sectors may not sum to exactly 100%.
          - Historical estimates measure each sector's share of the total value added of the three sectors, at current prices, and sum to 100%.
          - "{definitions.description_key_utilities}"
        description_processing: "{definitions.description_processing_splice}"
        display:
          name: Services
          numDecimalPlaces: 1
        presentation:
          title_public: Share of services in GDP
