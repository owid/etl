      children_age_15_who_report_physical_punishment_by_teachers:
        title: Children age 15 who report physical punishment by teachers
        unit: '%'
        description: |-
          Children’s self-reports of teacher’s use of physical punishment in the past week, at age 15. Reports combine the response categories ‘once or twice’ and ‘most/all of the time’.
