          numDecimalPlaces: 1

      mf_tertiary_enrollment_rates:
        title: Gross enrolment ratio, tertiary, both sexes
        description_short: The number of people, regardless of age, enrolled in [tertiary](#dod:tertiary-education) education, expressed as a percentage of the population of typical tertiary education age (around 18–22 years old).
