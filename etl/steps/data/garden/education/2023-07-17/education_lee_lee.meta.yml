  education_lee_lee_enrollment:
    variables:
      mf_primary_enrollment_rates:
        title: Adjusted enrollment ratio, primary, both sexes
        description_short: Share of children enrolled in primary school. Unlike the standard gross enrollment ratio, this measure adjusts for grade repetition, making it a closer approximation of the net enrollment rate and better suited for comparing trends across countries over time.
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1

      f_primary_enrollment_rates:
        title: Adjusted enrollment ratio, primary, female
        description_short: Share of girls enrolled in primary school. Unlike the standard gross enrollment ratio, this measure adjusts for grade repetition, making it a closer approximation of the net enrollment rate and better suited for comparing trends across countries over time.
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1

      m_primary_enrollment_rates:
        title: Adjusted enrollment ratio, primary, male
        description_short: Share of boys enrolled in primary school. Unlike the standard gross enrollment ratio, this measure adjusts for grade repetition, making it a closer approximation of the net enrollment rate and better suited for comparing trends across countries over time.
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1

      mf_secondary_enrollment_rates:
