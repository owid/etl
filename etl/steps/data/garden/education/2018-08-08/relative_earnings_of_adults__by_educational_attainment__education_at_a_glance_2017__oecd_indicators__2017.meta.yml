        title: Earnings of tertiary-educated workers relative to the earnings of workers with upper-secondary education (OECD
          2017)
        unit: '%'
        description: |-
          Earnings of tertiary-educated workers expressed as a percentage of the earnings of workers with upper-secondary education. Estimates correspond to workers ages 25-64. Regular earnings data collection provides information based on an annual, monthly or weekly reference period depending on the country. Data on earnings are before income tax in most countries.
