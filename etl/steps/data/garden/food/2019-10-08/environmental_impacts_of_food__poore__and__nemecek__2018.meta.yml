definitions:
  common:
    presentation:
      attribution: "Poore and Nemecek (2018)"

  title_carbon: "Greenhouse gas emissions"
  title_land_use: "Land use"
  title_water: "Freshwater withdrawals"
  title_water_scarcity: "Scarcity-weighted water use"
  title_eutrophication: "Eutrophying emissions"
  noun_per_kg: "kilogram of food product"
  noun_per_100g_protein: "100 grams of protein"
  noun_per_1000kcal: "1000 kilocalories"
  noun_per_1000kcal_long_1: "1000 kilocalories for a range of food products"
  noun_per_1000kcal_long_2: "1000 kilocalories of a given food product"
  subtitle_carbon: |-
    [Greenhouse gas emissions](#dod:ghgemissions) are measured in kilograms of [carbon dioxide-equivalents](#dod:carbondioxideequivalents).
  subtitle_eutrophication: |-
    Eutrophying emissions represent runoff of excess nutrients into the surrounding environment and waterways, which affect and pollute ecosystems. They are measured in grams of phosphate equivalents (PO₄eq).

dataset:
  title: Environmental impacts of food (Poore & Nemecek, 2018)
tables:
  environmental_impacts_of_food__poore__and__nemecek__2018:
    variables:
      eutrophying_emissions_per_1000kcal__poore__and__nemecek__2018:
        title: Eutrophying emissions per 1000kcal (Poore & Nemecek, 2018)
        unit: gPO₄eq per 1000kcal
        short_unit: g
        display:
          name: Eutrophying emissions per 1000kcal
          numDecimalPlaces: 2
        description_short: |-
          Global average eutrophying emissions per 1000 kilocalories across food products. Eutrophying emissions represent runoff of excess nutrients into the surrounding environment and waterways, which affect and pollute ecosystems with nutrient imbalances. They are measured in grams of phosphate equivalents.
        presentation:
          grapher_config:
            title: "{definitions.title_eutrophication} per {definitions.noun_per_1000kcal}"
            subtitle: "{definitions.subtitle_eutrophication}"
      eutrophying_emissions_per_100g_protein__poore__and__nemecek__2018:
