        title: GHG emissions per 1000kcal (Poore & Nemecek, 2018)
        unit: kgCO₂eq per 1000kcal
        short_unit: kg
        display:
          name: Greenhouse gas emissions per 1000kcal
          numDecimalPlaces: 2
        description_short: |-
          Global average greenhouse gas emissions (GHG) per 1000 kilocalories across different food products. This is measured in kilograms of CO₂-equivalents per 1000kcal (kgCO₂eq per 1000kcal).
        presentation:
          grapher_config:
            title: "{definitions.title_carbon} per {definitions.noun_per_1000kcal}"
            subtitle: "{definitions.subtitle_carbon}"

      ghg_emissions_per_100g_protein__poore__and__nemecek__2018:
        title: GHG emissions per 100g protein (Poore & Nemecek, 2018)
        unit: kgCO₂eq per 100g protein
        short_unit: kg
        display:
          name: Greenhouse gas emissions per 100g protein
          numDecimalPlaces: 2
        description_short: |-
          Global average greenhouse gas emissions (GHG) per 100 grams of protein across different food products. This is measured in kilograms of CO₂-equivalents per 100 grams of protein (kgCO₂eq per 100g protein).
