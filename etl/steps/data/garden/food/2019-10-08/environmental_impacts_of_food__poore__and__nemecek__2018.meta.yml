        unit: m² per kilogram
        short_unit: m²
        display:
          name: Land use per kilogram
          numDecimalPlaces: 2
        description_short: |-
          Global mean land used to produce one kilogram of different food products. This is measured in meters squared per kilogram (m² per kg).
        presentation:
          grapher_config:
            title: "{definitions.title_land_use} per {definitions.noun_per_kg}"
            subtitle: "Land use is measured in meters squared (m²) of land used for 1 year to produce one kilogram of a given food product."

      scarcity_weighted_water_use_per_1000kcal__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per 1000kcal (Poore & Nemecek, 2018)
        unit: liters per 1000 kilocalories
        short_unit: L
        display:
          name: Scarcity-weighted water use per 1000kcal
          numDecimalPlaces: 0
        description_short: |-
          Global average scarcity-weighted water use represents freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater withdrawal. This is measured in liters per 1000 kilocalories across food products.
        presentation:
          grapher_config:
            title: "{definitions.title_water_scarcity} of foods per {definitions.noun_per_1000kcal}"
            subtitle: "Scarcity-weighted water use represents freshwater use weighted by local water scarcity. This is measured in liters per {definitions.noun_per_1000kcal}."

      scarcity_weighted_water_use_per_100g_protein__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per 100g protein (Poore & Nemecek, 2018)
        unit: liters per 100g protein
        short_unit: L
        display:
          name: Scarcity-weighted water use per 100g protein
          numDecimalPlaces: 0
        description_short: |-
          Global average scarcity-weighted water use represent freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater withdrawal. This is measured in liters per 100 grams of protein across food products.
        presentation:
          grapher_config:
            title: "{definitions.title_water_scarcity} per {definitions.noun_per_100g_protein}"
            subtitle: "Average scarcity-weighted water use represents freshwater use weighted by local water scarcity. This is measured in liters per {definitions.noun_per_100g_protein}."

      scarcity_weighted_water_use_per_kilogram__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per kilogram (Poore & Nemecek, 2018)
        unit: liters per kilogram
        short_unit: L
        display:
          name: Scarcity-weighted water use per kilogram
          numDecimalPlaces: 0
        description_short: |-
          Global average scarcity-weighted water use represent freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater use. This is measured in liters per kilogram of food product.
        presentation:
          grapher_config:
            title: "{definitions.title_water_scarcity} per {definitions.noun_per_kg}"
            subtitle: "Scarcity-weighted water use represents freshwater use weighted by local water scarcity. This is measured in liters per {definitions.noun_per_kg}."

