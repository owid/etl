dataset:
  title: Environmental impacts of food (Poore & Nemecek, 2018)
tables:
  environmental_impacts_of_food__poore__and__nemecek__2018:
    variables:
      eutrophying_emissions_per_1000kcal__poore__and__nemecek__2018:
        title: Eutrophying emissions per 1000kcal (Poore & Nemecek, 2018)
        unit: gPO₄eq per 1000kcal
        short_unit: g
        display:
          name: Eutrophying emissions per 1000kcal
          numDecimalPlaces: 2
        description: |-
          Global average eutrophying emissions per 1000 kilocalories across food products. Eutrophying emissions represent runoff of excess nutrients into the surrounding environment and waterways, which affect and pollute ecosystems with nutrient imbalances. They are measured in grams of phosphate equivalents.
      eutrophying_emissions_per_100g_protein__poore__and__nemecek__2018:
        title: Eutrophying emissions per 100g protein (Poore & Nemecek, 2018)
        unit: gPO₄eq per 100 grams protein
        short_unit: g
        display:
          name: Eutrophying emissions per 100g protein
          numDecimalPlaces: 2
        description: |-
          Global average eutrophying emissions per 100 grams of protein across food products. Eutrophying emissions represent runoff of excess nutrients into the surrounding environment and waterways, which affect and pollute ecosystems with nutrient imbalances. They are measured in grams of phosphate equivalents.
      eutrophying_emissions_per_kilogram__poore__and__nemecek__2018:
        title: Eutrophying emissions per kilogram (Poore & Nemecek, 2018)
        unit: gPO₄eq per kilogram
        short_unit: g
        display:
          name: Eutrophying emissions per kilogram
          numDecimalPlaces: 2
        description: |-
          Global average eutrophying emissions per kilogram of food product. Eutrophying emissions represent runoff of excess nutrients into the surrounding environment and waterways, which affect and pollute ecosystems with nutrient imbalances. They are measured in grams of phosphate equivalents.
      freshwater_withdrawals_per_1000kcal__poore__and__nemecek__2018:
        title: Freshwater withdrawals per 1000kcal (Poore & Nemecek, 2018)
        unit: liters per 1000kcal
        short_unit: L
        display:
          name: Freshwater withdrawals per 1000kcal
          numDecimalPlaces: 0
        description: |-
          Global average freshwater withdrawals per 1000 kilocalories across food products. This is measured in liters of freshwater per 1000 kilocalories.
      freshwater_withdrawals_per_100g_protein__poore__and__nemecek__2018:
        title: Freshwater withdrawals per 100g protein (Poore & Nemecek, 2018)
        unit: liters per 100g protein
        short_unit: L
        display:
          name: Freshwater withdrawals per 100g protein
          numDecimalPlaces: 0
        description: |-
          Global average freshwater withdrawals per 100 grams of protein across food products. This is measured in liters of freshwater per 100 grams of protein.
      freshwater_withdrawals_per_kilogram__poore__and__nemecek__2018:
        title: Freshwater withdrawals per kilogram (Poore & Nemecek, 2018)
        unit: liters per kilogram
        short_unit: L
        display:
          name: Freshwater withdrawals per kilogram
          numDecimalPlaces: 0
        description: |-
          Global average freshwater withdrawals per kilogram of food product. This is measured in liters of freshwater per kilogram of food product.
      ghg_emissions_per_1000kcal__poore__and__nemecek__2018:
        title: GHG emissions per 1000kcal (Poore & Nemecek, 2018)
        unit: kgCO₂eq per 1000kcal
        short_unit: kg
        display:
          name: Greenhouse gas emissions per 1000kcal
          numDecimalPlaces: 2
        description: |-
          Global average greenhouse gas emissions (GHG) per 1000 kilocalories across different food products. This is measured in kilograms of CO₂-equivalents per 1000kcal (kgCO₂eq per 1000kcal).
      ghg_emissions_per_100g_protein__poore__and__nemecek__2018:
        title: GHG emissions per 100g protein (Poore & Nemecek, 2018)
        unit: kgCO₂eq per 100g protein
        short_unit: kg
        display:
          name: Greenhouse gas emissions per 100g protein
          numDecimalPlaces: 2
        description: |-
          Global average greenhouse gas emissions (GHG) per 100 grams of protein across different food products. This is measured in kilograms of CO₂-equivalents per 100 grams of protein (kgCO₂eq per 100g protein).
      ghg_emissions_per_kilogram__poore__and__nemecek__2018:
        title: GHG emissions per kilogram (Poore & Nemecek, 2018)
        unit: kgCO₂eq per kilogram
        short_unit: kg
        display:
          name: Greenhouse gas emissions per kilogram
          numDecimalPlaces: 2
        description: |-
          Global average greenhouse gas emissions (GHG) per kilogram of food product. This is measured in kilograms of CO₂-equivalents per kilogram of product (kgCO₂eq per kg).
      land_use_per_1000kcal__poore__and__nemecek__2018:
        title: Land use per 1000kcal (Poore & Nemecek, 2018)
        unit: m² per 1000kcal
        short_unit: m²
        display:
          name: Land use per 1000kcal
          numDecimalPlaces: 2
        description: |-
          Global mean land used to produce 1000 kilocalories of different food products. This is measured in meters squared per 1000kcal (m² per 1000kcal).
      land_use_per_100g_protein__poore__and__nemecek__2018:
        title: Land use per 100g protein (Poore & Nemecek, 2018)
        unit: m² per 100g protein
        short_unit: m²
        display:
          name: Land use per 100g protein
          numDecimalPlaces: 2
        description: |-
          Global mean land used to produce 100 grams of protein across different food products. This is measured in meters squared per 100g protein (m² per 100g protein).
      land_use_per_kilogram__poore__and__nemecek__2018:
        title: Land use per kilogram (Poore & Nemecek, 2018)
        unit: m² per kilogram
        short_unit: m²
        display:
          name: Land use per kilogram
          numDecimalPlaces: 2
        description: |-
          Global mean land used to produce one kilogram of different food products. This is measured in meters squared per kilogram (m² per kg).
      scarcity_weighted_water_use_per_1000kcal__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per 1000kcal (Poore & Nemecek, 2018)
        unit: liters per 1000 kilocalories
        short_unit: L
        display:
          name: Scarcity-weighted water use per 1000kcal
          numDecimalPlaces: 0
        description: |-
          Global average scarcity-weighted water use represents freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater withdrawal. This is measured in liters per 1000 kilocalories across food products.
      scarcity_weighted_water_use_per_100g_protein__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per 100g protein (Poore & Nemecek, 2018)
        unit: liters per 100g protein
        short_unit: L
        display:
          name: Scarcity-weighted water use per 100g protein
          numDecimalPlaces: 0
        description: |-
          Global average scarcity-weighted water use represent freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater withdrawal. This is measured in liters per 100 grams of protein across food products.
      scarcity_weighted_water_use_per_kilogram__poore__and__nemecek__2018:
        title: Scarcity-weighted water use per kilogram (Poore & Nemecek, 2018)
        unit: liters per kilogram
        short_unit: L
        display:
          name: Scarcity-weighted water use per kilogram
          numDecimalPlaces: 0
        description: |-
          Global average scarcity-weighted water use represent freshwater use weighted by local water scarcity. Therefore, these figures place greater weight on food production in areas with high water stress than conventional measures of freshwater use. This is measured in liters per kilogram of food product.
