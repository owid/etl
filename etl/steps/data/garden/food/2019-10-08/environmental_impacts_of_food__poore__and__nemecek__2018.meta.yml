          grapher_config:
            title: "{definitions.title_carbon} per {definitions.noun_per_100g_protein}"
            subtitle: "{definitions.subtitle_carbon}"

      ghg_emissions_per_kilogram__poore__and__nemecek__2018:
        title: GHG emissions per kilogram (Poore & Nemecek, 2018)
        unit: kgCO₂eq per kilogram
        short_unit: kg
        display:
          name: Greenhouse gas emissions per kilogram
          numDecimalPlaces: 2
        description_short: |-
          Global average greenhouse gas emissions (GHG) per kilogram of food product. This is measured in kilograms of CO₂-equivalents per kilogram of product (kgCO₂eq per kg).
        presentation:
          grapher_config:
            title: "{definitions.title_carbon} per {definitions.noun_per_kg}"
            subtitle: "{definitions.subtitle_carbon} This means non-CO₂ gases are weighted by the amount of warming they cause over a 100-year timescale."
            baseColorScheme: owid-distinct

      land_use_per_1000kcal__poore__and__nemecek__2018:
        title: Land use per 1000kcal (Poore & Nemecek, 2018)
        unit: m² per 1000kcal
        short_unit: m²
        display:
          name: Land use per 1000kcal
          numDecimalPlaces: 2
        description_short: |-
          Global mean land used to produce 1000 kilocalories of different food products. This is measured in meters squared per 1000kcal (m² per 1000kcal).
        presentation:
          grapher_config:
            title: "{definitions.title_land_use} of foods per {definitions.noun_per_1000kcal}"
            subtitle: "Land use is measured in meters squared (m²) of land used for 1 year to produce {definitions.noun_per_1000kcal_long_2}."
            note: "The median year of the studies involved in this research was 2010."

      land_use_per_100g_protein__poore__and__nemecek__2018:
        title: Land use per 100g protein (Poore & Nemecek, 2018)
        unit: m² per 100g protein
        short_unit: m²
        display:
          name: Land use per 100g protein
          numDecimalPlaces: 2
        description_short: |-
          Global mean land used to produce 100 grams of protein across different food products. This is measured in meters squared per 100g protein (m² per 100g protein).
        presentation:
          grapher_config:
            title: "{definitions.title_land_use} per {definitions.noun_per_100g_protein}"
            subtitle: "Land use is measured in meters squared (m²) of land used for 1 year to produce {definitions.noun_per_100g_protein} across various food products."

      land_use_per_kilogram__poore__and__nemecek__2018:
