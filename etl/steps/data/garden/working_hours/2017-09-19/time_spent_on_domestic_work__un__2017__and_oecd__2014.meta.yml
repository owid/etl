dataset:
  title: Time spent on domestic work – UN (2017) and OECD (2014)
tables:
  time_spent_on_domestic_work__un__2017__and_oecd__2014:
    variables:
      daily_time_spent_on_domestic_work__women__un__2017:
        title: Daily time spent on domestic work, women (UN (2017))
        unit: Daily hours
        description: |-
          Average daily number of hours spent on paid and unpaid domestic work combined (total work burden). The average is taken with respect to the entire relevant population, including those who devote no time to domestic work. Age brackets differ from country to country, so comparability is imperfect. See Additional Information below for more details.
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
