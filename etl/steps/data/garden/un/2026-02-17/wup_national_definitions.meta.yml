# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      grapher_config:
        note: Because the estimates of city and metropolitan areas are based on national definitions of what constitutes a city or metropolitan area, cross-country comparisons should be made with caution.
      topic_tags:
        - Urbanization
    processing_level: major
  description_key_common: &description_key_common
  - |-
    Countries classify their territory into urban and rural areas using their
    own criteria. Some base this on administrative status; others use
    population thresholds, density, employment structure, or some combination.
    Because these criteria vary so widely, similar places can be classified
    differently from one country to the next.
  - |-
    The UN has historically collected data using each country's own definition,
    which reflects how governments plan and maintain continuity with earlier
    statistics. But it means the figures do not always measure the same thing
    across countries.
  - |-
    For international comparisons, the UN's 2025 revision adopted the
    [Degree of Urbanization (DEGURBA)](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php)
    framework alongside its traditional national-definitions estimates. DEGURBA
    applies the same population density and settlement size thresholds
    everywhere, so that similar places are classified consistently regardless
    of which country they are in. Our charts using
    [DEGURBA data](https://ourworldindata.org/search?datasetProducts=Global+Human+Settlement+Layer+Dataset)
    are a better choice when comparing across countries.
# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 1825  # Every 5 years (UN WUP is typically updated biennially)
  title: World Urbanization Prospects - National Definitions


  owners:
    - Veronika Samborska
tables:
  wup_urban_rural_population:
    variables:
      population:
        title: <% if area_type == "urban" %>Urban population<% elif area_type == "rural" %>Rural population<% else %>Total population<% endif %><% if data_type == "projections" %> (projections)<% elif data_type == "estimates" %> (estimates)<% endif %> by national definition
        unit: people
        short_unit: ''
        description_short: <% if area_type == "urban" %>Population living in areas defined as urban, based on each country's national definition<% elif area_type == "rural" %>Population living in areas defined as rural, based on each country's national definition<% else %>Total population (sum of urban and rural), based on each country's national definition<% endif %>.
        description_key:
          - <% if area_type == "urban" %>The number of people living in areas that a country officially classifies as urban.<% elif area_type == "rural" %>The number of people living in areas that a country officially classifies as rural.<% else %>The total number of people in a country — the sum of those living in urban and rural areas combined.<% endif %>
          - *description_key_common
        display:
          numDecimalPlaces: 0
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban <% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: <% if area_type == "urban" %>Urban population<% elif area_type == "rural" %>Rural population<% else %>Total population<% endif %>
          title_variant: UN national definitions


      share:
        title: <% if area_type == "urban" %>Percentage of population living in urban areas<% elif area_type == "rural" %>Percentage of population living in rural areas<% else %>Share of total population<% endif %><% if data_type == "projections" %> (projections)<% elif data_type == "estimates" %> (estimates)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: <% if area_type == "urban" %>Share of total population living in urban areas, based on each country's national definition<% elif area_type == "rural" %>Share of total population living in rural areas, based on each country's national definition<% else %>Percentage of total population, based on each country's national definition<% endif %>.
        description_key:
          - <% if area_type == "urban" %>The share of a country's population living in areas that are officially classified as urban — a simple measure of how urbanised a country is at a given point in time.<% elif area_type == "rural" %>The share of a country's population living in areas that are officially classified as rural.<% else %>The percentage of a country's population across all areas, urban and rural combined.<% endif %>
          - *description_key_common
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban <% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: <% if area_type == "urban" %>Share of population living in urban areas<% elif area_type == "rural" %>Share of population living in rural areas<% else %>Share of total population<% endif %>
          title_variant: UN national definitions

      growth_rate:
        title: <% if area_type == "urban" %>Average annual rate of change of urban population<% elif area_type == "rural" %>Average annual rate of change of rural population<% else %>Average annual rate of change of total population<% endif %><% if data_type == "projections" %> (projections)<% elif data_type == "estimates" %> (estimates)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: Average annual population growth rate as a percentage<% if area_type == "urban" %> for urban areas<% elif area_type == "rural" %> for rural areas<% endif %>, based on each country's national definition. Positive values indicate population growth; negative values indicate decline.
        description_key:
          - <% if area_type == "urban" %>How fast the urban population is growing each year, expressed as a percentage. A value of 2% means urban residents increased by about 2% per year over the period.<% elif area_type == "rural" %>How fast the rural population is growing each year, expressed as a percentage. A negative value means the number of people in rural areas is declining.<% else %>How fast the total population is growing each year, expressed as a percentage.<% endif %>
          - Each value covers a five-year period. The figure shown for a given year is the average annual growth rate over the preceding five years — for example, the value for 2015 reflects average annual growth from 2010 to 2015.
          - <% if area_type == "urban" %>Urban population growth is driven by three factors — natural increase (births minus deaths among urban residents), net migration from rural to urban areas, and the reclassification of previously rural settlements as urban.<% elif area_type == "rural" %>Rural population change reflects the balance between natural increase, net migration to cities, and the reclassification of rural settlements as urban.<% else %>Total population growth reflects the balance of births, deaths, and international migration.<% endif %> The relative importance of these factors varies by country and period.
          - *description_key_common
        display:
          numDecimalPlaces: 2
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban <% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: <% if area_type == "urban" %>Average annual rate of change of urban population<% elif area_type == "rural" %>Average annual rate of change of rural population<% else %>Average annual rate of change of total population<% endif %>
          title_variant: UN national definitions

      share_growth_rate:
        title: <% if area_type == "urban" %>Average annual rate of change of percentage urban<% elif area_type == "rural" %>Average annual rate of change of percentage rural<% else %>Average annual rate of change of population share<% endif %><% if data_type == "projections" %> (projections)<% elif data_type == "estimates" %> (estimates)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: The average yearly growth rate of the share of the population living in <% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>urban or rural<% endif %> areas, based on each country's national definition. For example, the rate for 2015 represents the average annual growth from 2010 to 2015.
        description_key:
          - <% if area_type == "urban" %>How fast the share of people living in urban areas is changing each year — whether urbanisation is speeding up, slowing down, or going into reverse.<% elif area_type == "rural" %>How fast the share of people living in rural areas is changing each year — whether the rural share of the population is growing or shrinking.<% else %>How fast the overall population share is shifting between urban and rural areas each year.<% endif %>
          - Each value covers a five-year period. For example, the figure shown for 2015 reflects how the share changed on average each year between 2010 and 2015.
          - This is different from the <% if area_type == "rural" %>rural<% else %>urban<% endif %> population growth rate, which measures how fast the number of <% if area_type == "rural" %>rural<% else %>urban<% endif %> residents is growing in absolute terms. This indicator instead shows whether <% if area_type == "rural" %>rural areas are becoming a larger or smaller share of the total population — that share can shrink even while the rural population keeps growing in absolute numbers.<% else %>cities are claiming a larger or smaller share of the total population — urbanisation can slow even while city populations keep growing in absolute numbers.<% endif %>
          - <% if area_type == "rural" %>A positive value means the rural share is rising — a larger fraction of people are living outside cities than before. A negative value means the rural share is falling as more people move to or are born in urban areas.<% else %>A positive value means a growing share of people are living in urban areas. A negative value means the urban share is shrinking — cities are growing more slowly than the rest of the population, or people are moving away from urban areas.<% endif %>
          - *description_key_common
        display:
          numDecimalPlaces: 3
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban <% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: <% if area_type == "urban" %>Average annual rate of change of percentage urban<% elif area_type == "rural" %>Average annual rate of change of percentage rural<% else %>Average annual rate of change of population share<% endif %>
          title_variant: UN national definitions

  urban_share_with_hyde:
    variables:
      share:
        title: Share of population living in urban areas – HYDE and UN national definitions combined
        unit: '%'
        short_unit: '%'
        description_short: Share of total population living in urban areas, based on national definitions, with historical estimates extending back to 10,000 BCE.
        description_key:
          - The share of a country's population living in urban areas. For 1950 onwards, this uses the UN World Urbanization Prospects based on each country's own definition of urban areas. For years before 1950, it uses HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the urban share series as far back as possible. For years before 1950, we use urban population share estimates from HYDE v3.3 (History Database of the Global Environment). From 1950 onward, we use the urban share based on each country's national definition of urban areas from the UN World Urbanization Prospects.
        display:
          numDecimalPlaces: 1
        presentation:
          title_public: Share of population living in urban areas
          title_variant: UN national definitions, HYDE

      urban_population:
        title: Urban population – HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in urban areas, based on national definitions, with historical estimates extending back to 10,000 BCE.
        description_key:
          - The number of people living in urban areas. For 1950 onwards, this uses the UN World Urbanization Prospects based on each country's own definition of urban areas. For years before 1950, it uses HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the urban population series as far back as possible. For years before 1950, we use urban population estimates from HYDE v3.3. From 1950 onward, we use urban population from the UN World Urbanization Prospects based on each country's national definition. The UN source reports population in thousands; we converted to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Urban population
          title_variant: UN national definitions, HYDE

      rural_population:
        title: Rural population – HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in rural areas, based on national definitions, with historical estimates extending back to 10,000 BCE.
        description_key:
          - The number of people living in rural areas. For 1950 onwards, this uses the UN World Urbanization Prospects based on each country's own definition of rural areas. For years before 1950, it uses HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the rural population series as far back as possible. For years before 1950, we use rural population estimates from HYDE v3.3. From 1950 onward, we use rural population from the UN World Urbanization Prospects based on each country's national definition. The UN source reports population in thousands; we converted to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Rural population
          title_variant: UN national definitions, HYDE
