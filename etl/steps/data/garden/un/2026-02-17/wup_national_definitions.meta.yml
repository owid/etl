definitions:
  common:
    presentation:
      grapher_config:
        note: Because the estimates of city and metropolitan areas are based on national definitions of what constitutes a city or metropolitan area, cross-country comparisons should be made with caution.
      topic_tags:
        - Urbanization
    processing_level: major
  description_key_common: &description_key_common
    - Countries define "urban" differently — some use a population threshold, others use density, administrative status, or the type of work people do. This makes these figures most useful for tracking change within a single country over time. Cross-country comparisons should be treated with caution.
    - For comparisons across countries, the UN's 2025 revision adopted the [Degree of Urbanization (DEGURBA)](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php) framework, which applies the same density and settlement-size thresholds everywhere. Our charts using [DEGURBA data](https://ourworldindata.org/search?datasetProducts=Global+Human+Settlement+Layer+Dataset) are a better choice for cross-country comparisons.
dataset:
  update_period_days: 1825
  title: World Urbanization Prospects - National Definitions
  owners:
    - Veronika Samborska

tables:
  wup_urban_rural_population:
    variables:
      population:
        title: |-
          <% if area_type == "urban" %>Urban population
          <% elif area_type == "rural" %>Rural population
          <% else %>Total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %> by national definition
        unit: people
        short_unit: ''
        description_short: |-
          <% if area_type == "urban" %>Number of people living in urban areas, based on each country's national definition.
          <% elif area_type == "rural" %>Number of people living in rural areas, based on each country's national definition.
          <% else %>Total population, based on each country's national definition.
          <% endif %>
        description_key:
          - *description_key_common
        display:
          numDecimalPlaces: 0
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Urban population
            <% elif area_type == "rural" %>Rural population
            <% else %>Total population
            <% endif %>
          title_variant: UN national definitions

      share:
        title: |-
          <% if area_type == "urban" %>Share of population living in urban areas
          <% elif area_type == "rural" %>Share of population living in rural areas
          <% else %>Population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if area_type == "urban" %>Share of the population living in urban areas, based on each country's national definition.
          <% elif area_type == "rural" %>Share of the population living in rural areas, based on each country's national definition.
          <% else %>Population share, based on each country's national definition.
          <% endif %>
        description_key:
          - *description_key_common
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Share of population living in urban areas
            <% elif area_type == "rural" %>Share of population living in rural areas
            <% else %>Share of total population
            <% endif %>
          title_variant: UN national definitions

      growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban population
          <% elif area_type == "rural" %>Average annual rate of change of the rural population
          <% else %>Average annual rate of change of the total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: |-
          Average annual growth rate of the <% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>total<% endif %> population, based on each country's national definition. Positive values indicate growth; negative values indicate decline.
        description_key:
          - Each value covers a five-year period — for example, the figure for 2015 is the average annual rate of change between 2010 and 2015.
          - |-
            <% if area_type == "urban" %>Urban population growth is driven by three factors: natural increase (births minus deaths among urban residents), net migration from rural areas, and the reclassification of previously rural settlements as urban. Countries at different stages of development tend to be dominated by different factors — reclassification matters more early on; migration dominates later.
            <% elif area_type == "rural" %>Rural population change reflects the net balance of natural increase, migration to cities, and the reclassification of rural settlements as urban. In many countries, these forces now combine to produce a shrinking rural population even where birth rates remain relatively high.
            <% else %>Total population growth reflects the balance of births, deaths, and international migration.
            <% endif %>
          - *description_key_common
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban population
            <% elif area_type == "rural" %>Average annual rate of change of the rural population
            <% else %>Average annual rate of change of the total population
            <% endif %>
          title_variant: UN national definitions

      share_growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban share
          <% elif area_type == "rural" %>Average annual rate of change of the rural share
          <% else %>Average annual rate of change of the population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %> by national definition
        unit: '%'
        short_unit: '%'
        description_short: |-
          How quickly the share of people living in <% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>urban or rural<% endif %> areas is changing each year, based on each country's national definition.
        description_key:
          - This measures the momentum of <% if area_type == "urban" %>urbanization<% elif area_type == "rural" %>rural population change<% else %>urban–rural population shift<% endif %> — not how urban a country is, but how fast that is changing. Each value is the average annual change over the preceding five years.
          - |-
            <% if area_type == "urban" %>A positive value means urbanization is accelerating: a growing share of the population lives in cities. A negative value means the urban share is shrinking — which is rare but has occurred in some countries during economic downturns or conflict.
            <% elif area_type == "rural" %>A positive value means the rural share is growing. In most countries this figure is negative, reflecting ongoing urbanization. A return to positive values can signal economic stagnation or displacement from urban areas.
            <% else %>A positive value means the urban share is growing; a negative value means it is shrinking.
            <% endif %>
          - *description_key_common
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban share
            <% elif area_type == "rural" %>Average annual rate of change of the rural share
            <% else %>Average annual rate of change of the population share
            <% endif %>
          title_variant: UN national definitions

  urban_share_with_hyde:
    variables:
      share:
        title: Share of population living in urban areas – HYDE and UN national definitions combined
        unit: '%'
        short_unit: '%'
        description_short: Share of the population living in urban areas, combining UN estimates from 1950 with modelled historical data back to 10,000 BCE.
        description_key:
          - From 1950 onward, this indicator uses the UN World Urbanization Prospects, based on each country's own definition of urban areas. For earlier years, it draws on HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the urban share series as far back as possible. For years before 1950, we use urban population share estimates from HYDE v3.3. From 1950 onward, we use each country's national definition from the UN World Urbanization Prospects.
        display:
          numDecimalPlaces: 1
        presentation:
          title_public: Share of population living in urban areas
          title_variant: UN national definitions, HYDE

      urban_population:
        title: Urban population – HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in urban areas, combining UN estimates from 1950 with modelled historical data back to 10,000 BCE.
        description_key:
          - From 1950 onward, this indicator uses the UN World Urbanization Prospects, based on each country's own definition of urban areas. For earlier years, it draws on HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the urban population series as far back as possible. For years before 1950, we use urban population estimates from HYDE v3.3. From 1950 onward, we use urban population from the UN World Urbanization Prospects based on each country's national definition. The UN source reports population in thousands; we converted to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Urban population
          title_variant: UN national definitions, HYDE

      rural_population:
        title: Rural population – HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in rural areas, combining UN estimates from 1950 with modelled historical data back to 10,000 BCE.
        description_key:
          - From 1950 onward, this indicator uses the UN World Urbanization Prospects, based on each country's own definition of rural areas. For earlier years, it draws on HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction of historical settlement patterns.
          - *description_key_common
        description_processing: |-
          We combined two sources to extend the rural population series as far back as possible. For years before 1950, we use rural population estimates from HYDE v3.3. From 1950 onward, we use rural population from the UN World Urbanization Prospects based on each country's national definition. The UN source reports population in thousands; we converted to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Rural population
          title_variant: UN national definitions, HYDE