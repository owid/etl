definitions:
  common:
    presentation:
      grapher_config:
        note: Because the estimates of city and metropolitan areas are based on national definitions of what constitutes a city or metropolitan area, cross-country comparisons should be made with caution.
      topic_tags:
        - Urbanization
    processing_level: minor

  national_definition_key: &national_definition_key >-
    Countries classify areas as urban or rural using their own criteria. Some use
    administrative boundaries; others use population size, population density, economic
    activity, infrastructure, or a combination of these. This means that similar
    settlements can be classified differently across countries.

  national_definition_breaks_key: &national_definition_breaks_key >-
    Definitions can also change within a country over time. This can create breaks in
    the series that reflect changes in classification rather than real changes in where
    people live.

  national_definition_continuity_key: &national_definition_continuity_key >-
    These estimates follow national definitions to preserve continuity with official
    statistics and earlier editions of the UN World Urbanization Prospects.

  degurba_comparison_key: &degurba_comparison_key >-
    For more comparable cross-country analysis, use the [Degree of Urbanization
    (DEGURBA)](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php)
    framework. DEGURBA classifies settlements using the same population-density and
    settlement-size thresholds everywhere. Our charts using
    [DEGURBA data](https://ourworldindata.org/search?datasetProducts=Global+Human+Settlement+Layer+Dataset)
    use this harmonized standard.

  wup_method_key: &wup_method_key |-
    <% if data_type == "projections" %>For projected years, the UN projects the share of the population living in urban areas and applies it to total country population projections from the medium variant of UN World Population Prospects 2024. Rural population is calculated as the remainder. For some countries, WUP 2025 draws the projected trend from DEGURBA while anchoring the level to the national-definition series.
    <% else %>For historical years, annual values are estimated from census data and official national statistics, with interpolation between observations where needed.
    <% endif %>

  wup_population_growth_key: &wup_population_growth_key |-
    <% if area_type == "urban" %>Urban population growth can reflect several processes, including births and deaths among urban residents, migration between rural and urban areas, and the reclassification of settlements from rural to urban. This indicator does not separate the contribution of these factors.
    <% elif area_type == "rural" %>Rural population change can reflect several processes, including births and deaths among rural residents, migration between rural and urban areas, and the reclassification of settlements from rural to urban. This indicator does not separate the contribution of these factors.
    <% else %>Total population growth reflects births, deaths, and international migration. This indicator does not separate the contribution of these factors.
    <% endif %>

  wup_share_growth_key: &wup_share_growth_key |-
    <% if area_type == "urban" %>A positive value means the share of the population living in areas classified as urban is increasing. A negative value means this share is declining.
    <% elif area_type == "rural" %>A positive value means the share of the population living in areas classified as rural is increasing. A negative value means this share is declining.
    <% else %>A positive value means this population share is increasing. A negative value means it is declining.
    <% endif %>

  hyde_combined_key: &hyde_combined_key >-
    From 1950 onward, this indicator uses the UN World Urbanization Prospects, based on
    each country's own definition of urban and rural areas. For earlier years, it draws
    on HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction
    of historical settlement patterns.


# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 365
  owners:
    - Veronika Samborska

tables:
  wup_urban_rural_population:
    variables:
      population:
        title: |-
          <% if area_type == "urban" %>Urban population by national definition
          <% elif area_type == "rural" %>Rural population by national definition
          <% else %>Total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: people
        short_unit: ''
        description_short: |-
          <% if area_type == "urban" %><% if data_type == "projections" %>Projected number of people living in areas classified as urban, based on each country's national definition.
          <% else %>Number of people living in areas classified as urban, based on each country's national definition.
          <% endif %><% elif area_type == "rural" %><% if data_type == "projections" %>Projected number of people living in areas classified as rural, based on each country's national definition.
          <% else %>Number of people living in areas classified as rural, based on each country's national definition.
          <% endif %><% else %><% if data_type == "projections" %>Projected total population, as reported by the UN World Urbanization Prospects.
          <% else %>Total population, as reported by the UN World Urbanization Prospects.
          <% endif %><% endif %>
        description_key:
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        description_processing: |-
          The UN source reports population in thousands. We converted these values to people.
        display:
          numDecimalPlaces: 0
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Urban population
            <% elif area_type == "rural" %>Rural population
            <% else %>Total population
            <% endif %>
          title_variant: UN national definitions

      share:
        title: |-
          <% if area_type == "urban" %>Share of the population living in urban areas by national definition
          <% elif area_type == "rural" %>Share of the population living in rural areas by national definition
          <% else %>Population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if area_type == "urban" %><% if data_type == "projections" %>Projected share of the population living in areas classified as urban, based on each country's national definition.
          <% else %>Share of the population living in areas classified as urban, based on each country's national definition.
          <% endif %><% elif area_type == "rural" %><% if data_type == "projections" %>Projected share of the population living in areas classified as rural, based on each country's national definition.
          <% else %>Share of the population living in areas classified as rural, based on each country's national definition.
          <% endif %><% else %><% if data_type == "projections" %>Projected share of the total population in this area category, as reported by the UN World Urbanization Prospects.
          <% else %>Share of the total population in this area category, as reported by the UN World Urbanization Prospects.
          <% endif %><% endif %>
        description_key:
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Share of population living in urban areas
            <% elif area_type == "rural" %>Share of population living in rural areas
            <% else %>Share of total population
            <% endif %>
          title_variant: UN national definitions

      growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban population by national definition
          <% elif area_type == "rural" %>Average annual rate of change of the rural population by national definition
          <% else %>Average annual rate of change of the total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if data_type == "projections" %>Projected average annual rate of change of the <% else %>Average annual rate of change of the <% endif %><% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>total<% endif %> population.
        description_key:
          - Each value covers a five-year period. For example, the value shown for 2015 is the average annual rate of change between 2010 and 2015.
          - *wup_population_growth_key
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban population
            <% elif area_type == "rural" %>Average annual rate of change of the rural population
            <% else %>Average annual rate of change of the total population
            <% endif %>
          title_variant: UN national definitions

      share_growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban share by national definition
          <% elif area_type == "rural" %>Average annual rate of change of the rural share by national definition
          <% else %>Average annual rate of change of the population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if data_type == "projections" %>Projected average annual rate of change of the <% else %>Average annual rate of change of the <% endif %><% if area_type == "urban" %>share of the population living in areas classified as urban<% elif area_type == "rural" %>share of the population living in areas classified as rural<% else %>population share<% endif %>.
        description_key:
          - This measures how quickly the <% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>population<% endif %> share is changing, not the level of that share. Each value is the average annual change over the preceding five-year period.
          - *wup_share_growth_key
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban share
            <% elif area_type == "rural" %>Average annual rate of change of the rural share
            <% else %>Average annual rate of change of the population share
            <% endif %>
          title_variant: UN national definitions

  urban_share_with_hyde:
    variables:
      share:
        title: Share of population living in urban areas - HYDE and UN national definitions combined
        unit: '%'
        short_unit: '%'
        description_short: Share of the population living in areas classified as urban, combining UN estimates from 1950 onward with modelled historical data back to 10,000 BCE.
        description_key:
          - *hyde_combined_key
          - Before 1950, values are modelled historical reconstructions from HYDE rather than direct observations.
          - *national_definition_key
          - *national_definition_breaks_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        description_processing: |-
          We combined two sources to extend the urban share series as far back as possible. For years before 1950, we use urban population share estimates from HYDE v3.3. From 1950 onward, we use the urban population share from the UN World Urbanization Prospects, based on each country's national definition.
        display:
          numDecimalPlaces: 1
        presentation:
          title_public: Share of population living in urban areas
          title_variant: UN national definitions, HYDE

      urban_population:
        title: Urban population - HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in areas classified as urban, combining UN estimates from 1950 onward with modelled historical data back to 10,000 BCE.
        description_key:
          - *hyde_combined_key
          - Before 1950, values are modelled historical reconstructions from HYDE rather than direct observations.
          - *national_definition_key
          - *national_definition_breaks_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        description_processing: |-
          We combined two sources to extend the urban population series as far back as possible. For years before 1950, we use urban population estimates from HYDE v3.3. From 1950 onward, we use urban population from the UN World Urbanization Prospects, based on each country's national definition. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Urban population
          title_variant: UN national definitions, HYDE

      rural_population:
        title: Rural population - HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in areas classified as rural, combining UN estimates from 1950 onward with modelled historical data back to 10,000 BCE.
        description_key:
          - *hyde_combined_key
          - Before 1950, values are modelled historical reconstructions from HYDE rather than direct observations.
          - *national_definition_key
          - *national_definition_breaks_key
          - *national_definition_continuity_key
          - *degurba_comparison_key
        description_processing: |-
          We combined two sources to extend the rural population series as far back as possible. For years before 1950, we use rural population estimates from HYDE v3.3. From 1950 onward, we use rural population from the UN World Urbanization Prospects, based on each country's national definition. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          title_public: Rural population
          title_variant: UN national definitions, HYDE
