definitions:
  common:
    presentation:
      grapher_config:
        note: Cross-country comparability is limited because of differences in national definitions.
      topic_tags:
        - Urbanization
    processing_level: minor

  national_definition_key: &national_definition_key >-
    Countries classify areas as urban or rural using their own criteria, such as
    administrative boundaries, population size or density, economic activity, or some
    combination of these. As a result, similar settlements can be classified
    differently across countries.

  national_definition_breaks_key: &national_definition_breaks_key >-
    Definitions can also change within a country over time, creating breaks in the
    series that reflect reclassification rather than real changes in where people live.
    For cross-country comparisons that avoid these issues, we also publish indicators based on the
    [Degree of Urbanization (DEGURBA)](https://human-settlement.emergency.copernicus.eu/degurbaDefinitions.php),
    a harmonized framework that classifies settlements by population density and size
    using consistent criteria across countries. You can find
    [these indicators here](https://ourworldindata.org/search?datasetProducts=Global+Human+Settlement+Layer+Dataset).

  wup_estimation_key: &wup_estimation_key >-
    Values are reported for every year, but the underlying censuses occur roughly once a
    decade; intervening years are interpolated rather than directly observed.

  wup_method_projections_key: &wup_method_projections_key |-
    <% if data_type == "projections" %>The UN produces these projections by applying its modelled urban population share to medium-variant total population projections; rural population is the remainder.<% endif %>

  wup_population_growth_key: &wup_population_growth_key |-
    <% if area_type == "urban" %>Urban population growth can reflect births and deaths among urban residents, rural-to-urban migration, and the reclassification of settlements from rural to urban. This indicator does not separate these factors.
    <% elif area_type == "rural" %>Rural population change can reflect births and deaths among rural residents, rural-to-urban migration, and the reclassification of settlements from rural to urban. This indicator does not separate these factors.
    <% else %>Total population growth reflects births, deaths, and international migration. This indicator does not separate these factors.
    <% endif %>

  wup_share_growth_key: &wup_share_growth_key |-
    <% if area_type == "urban" %>A positive value means the share of the population living in urban areas is increasing; a negative value means it is declining.
    <% elif area_type == "rural" %>A positive value means the share of the population living in rural areas is increasing; a negative value means it is declining.
    <% else %>A positive value means this population share is increasing; a negative value means it is declining.
    <% endif %>

  hyde_combined_key: &hyde_combined_key >-
    From 1950 onward, this indicator uses the UN World Urbanization Prospects, based on
    each country's own definition of urban and rural areas. For earlier years, it draws
    on HYDE v3.3 (History Database of the Global Environment), a modelled reconstruction
    of historical settlement patterns rather than direct observations.

  hyde_combined_with_projections_key: &hyde_combined_with_projections_key >-
    From 1950 to 2025, this indicator uses estimates from the UN World Urbanization
    Prospects, based on each country's own definition of urban and rural areas. From
    2025 onward, it uses UN projections. For years before 1950, it draws on HYDE v3.3
    (History Database of the Global Environment), a modelled reconstruction of
    historical settlement patterns rather than direct observations.


# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 365
  owners:
    - Veronika Samborska

tables:
  wup_urban_rural_population:
    variables:
      population:
        title: |-
          <% if area_type == "urban" %>Urban population by national definition
          <% elif area_type == "rural" %>Rural population by national definition
          <% else %>Total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: people
        short_unit: ''
        description_short: |-
          <% if area_type == "urban" %><% if data_type == "projections" %>Projected number of people living in urban areas, based on each country's national definition.
          <% else %>Number of people living in urban areas, based on each country's national definition.
          <% endif %><% elif area_type == "rural" %><% if data_type == "projections" %>Projected number of people living in rural areas, based on each country's national definition.
          <% else %>Number of people living in rural areas, based on each country's national definition.
          <% endif %><% else %><% if data_type == "projections" %>Projected total population, as reported by the UN World Urbanization Prospects.
          <% else %>Total population, as reported by the UN World Urbanization Prospects.
          <% endif %><% endif %>
        description_key:
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_projections_key

        description_processing: |-
          The UN source reports population in thousands. We converted these values to people. These estimates follow national definitions to preserve continuity with official statistics and earlier editions of the UN World Urbanization Prospects.
        display:
          numDecimalPlaces: 0
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Urban population
            <% elif area_type == "rural" %>Rural population
            <% else %>Total population
            <% endif %>
          title_variant: UN national definitions

      share:
        title: |-
          <% if area_type == "urban" %>Share of the population living in urban areas by national definition
          <% elif area_type == "rural" %>Share of the population living in rural areas by national definition
          <% else %>Population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if area_type == "urban" %><% if data_type == "projections" %>Projected share of the population living in urban areas, based on each country's national definition.
          <% else %>Share of the population living in urban areas, based on each country's national definition.
          <% endif %><% elif area_type == "rural" %><% if data_type == "projections" %>Projected share of the population living in rural areas, based on each country's national definition.
          <% else %>Share of the population living in rural areas, based on each country's national definition.
          <% endif %><% else %><% if data_type == "projections" %>Projected share of the total population in this area category, as reported by the UN World Urbanization Prospects.
          <% else %>Share of the total population in this area category, as reported by the UN World Urbanization Prospects.
          <% endif %><% endif %>
        description_key:
          - *national_definition_key
          - *national_definition_breaks_key
          - *wup_method_projections_key

        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Share of population living in urban areas
            <% elif area_type == "rural" %>Share of population living in rural areas
            <% else %>Share of total population
            <% endif %>
          title_variant: UN national definitions

      growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban population by national definition
          <% elif area_type == "rural" %>Average annual rate of change of the rural population by national definition
          <% else %>Average annual rate of change of the total population
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if data_type == "projections" %>Projected average annual rate of change of the <% else %>Average annual rate of change of the <% endif %><% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>total<% endif %> population.
        description_key:
          - Each value is the average annual rate of change over the preceding five-year period. For example, the value shown for 2015 covers 2010 to 2015.
          - *wup_population_growth_key
          - *national_definition_key
          - *wup_estimation_key
          - *wup_method_projections_key

        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban population
            <% elif area_type == "rural" %>Average annual rate of change of the rural population
            <% else %>Average annual rate of change of the total population
            <% endif %>
          title_variant: UN national definitions

      share_growth_rate:
        title: |-
          <% if area_type == "urban" %>Average annual rate of change of the urban share by national definition
          <% elif area_type == "rural" %>Average annual rate of change of the rural share by national definition
          <% else %>Average annual rate of change of the population share
          <% endif %><% if data_type == "projections" %> (projections)<% endif %>
        unit: '%'
        short_unit: '%'
        description_short: |-
          <% if data_type == "projections" %>Projected average annual rate of change of the <% else %>Average annual rate of change of the <% endif %><% if area_type == "urban" %>share of the population living in urban areas<% elif area_type == "rural" %>share of the population living in rural areas<% else %>population share<% endif %>.
        description_key:
          - This indicator captures the pace at which the <% if area_type == "urban" %>urban<% elif area_type == "rural" %>rural<% else %>population<% endif %> share is shifting. Each value is the average annual change over the preceding five-year period.
          - *wup_share_growth_key
          - *national_definition_key
          - *wup_method_projections_key

        display:
          numDecimalPlaces: 1
          isProjection: <% if data_type == "projections" %>True<% else %>False<% endif %>
          name: <% if area_type == "urban" %>Urban<% elif area_type == "rural" %>Rural<% else %>Total<% endif %>
        presentation:
          title_public: |-
            <% if area_type == "urban" %>Average annual rate of change of the urban share
            <% elif area_type == "rural" %>Average annual rate of change of the rural share
            <% else %>Average annual rate of change of the population share
            <% endif %>
          title_variant: UN national definitions

  urban_share_with_hyde:
    variables:
      share:
        title: Share of population living in urban areas - HYDE and UN national definitions combined
        unit: '%'
        short_unit: '%'
        description_short: Share of the population living in urban areas, combining UN estimates with modelled historical data.
        description_key:
          - *hyde_combined_key
        description_processing: |-
          We combined two sources to extend the urban share series as far back as possible. For years before 1950, we use urban population share estimates from HYDE v3.3. From 1950 onward, we use the urban population share from the UN World Urbanization Prospects, based on each country's national definition.
        display:
          numDecimalPlaces: 1
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Share of population living in urban areas
          title_variant: UN national definitions, HYDE

      urban_population:
        title: Urban population - HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in urban areas, combining UN estimates with modelled historical data.
        description_key:
          - *hyde_combined_key
        description_processing: |-
          We combined two sources to extend the urban population series as far back as possible. For years before 1950, we use urban population estimates from HYDE v3.3. From 1950 onward, we use urban population from the UN World Urbanization Prospects, based on each country's national definition. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Urban population
          title_variant: UN national definitions, HYDE

      rural_population:
        title: Rural population - HYDE and UN national definitions combined
        unit: people
        short_unit: ''
        description_short: Number of people living in rural areas, combining UN estimates with modelled historical data.
        description_key:
          - *hyde_combined_key
        description_processing: |-
          We combined two sources to extend the rural population series as far back as possible. For years before 1950, we use rural population estimates from HYDE v3.3. From 1950 onward, we use rural population from the UN World Urbanization Prospects, based on each country's national definition. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Rural population
          title_variant: UN national definitions, HYDE

  urban_share_with_hyde_and_projections:
    variables:
      share:
        title: Share of population living in urban areas - HYDE, UN national definitions, and projections combined
        unit: '%'
        short_unit: '%'
        description_short: Share of the population living in urban areas, combining UN estimates and projections with modelled historical data.
        description_key:
          - *hyde_combined_with_projections_key
        description_processing: |-
          We combined three sources to extend the urban share series through 2100. For years before 1950, we use urban population share estimates from HYDE v3.3. From 1950 to 2025, we use the urban population share from the UN World Urbanization Prospects, based on each country's national definition. From 2026 onward, we use UN projections.
        display:
          numDecimalPlaces: 1
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Share of population living in urban areas
          title_variant: UN national definitions, HYDE, with projections

      urban_population:
        title: Urban population - HYDE, UN national definitions, and projections combined
        unit: people
        short_unit: ''
        description_short: Number of people living in urban areas, combining UN estimates and projections with modelled historical data.
        description_key:
          - *hyde_combined_with_projections_key
        description_processing: |-
          We combined three sources to extend the urban population series through 2100. For years before 1950, we use urban population estimates from HYDE v3.3. From 1950 to 2025, we use urban population from the UN World Urbanization Prospects, based on each country's national definition. From 2026 onward, we use UN projections. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Urban population
          title_variant: UN national definitions, HYDE, with projections

      rural_population:
        title: Rural population - HYDE, UN national definitions, and projections combined
        unit: people
        short_unit: ''
        description_short: Number of people living in rural areas, combining UN estimates and projections with modelled historical data.
        description_key:
          - *hyde_combined_with_projections_key
        description_processing: |-
          We combined three sources to extend the rural population series through 2100. For years before 1950, we use rural population estimates from HYDE v3.3. From 1950 to 2025, we use rural population from the UN World Urbanization Prospects, based on each country's national definition. From 2026 onward, we use UN projections. The UN source reports population in thousands; we converted these values to people to align with HYDE.
        display:
          numDecimalPlaces: 0
        presentation:
          grapher_config:
            note: UN estimates are based on national definitions of urban and rural areas. Cross-country comparability is limited because of differences in national definitions.
          title_public: Rural population
          title_variant: UN national definitions, HYDE, with projections
