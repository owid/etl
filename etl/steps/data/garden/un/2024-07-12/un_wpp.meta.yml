definitions:
  global:
    projections: |-
      <% if (variant is defined) and (variant != 'estimates') -%>
      Future projections are based on the [UN's << variant >> scenario](#dod:un-projection-scenarios).
      <%- endif -%>
    # Noun for population/deaths titles, based on sex × age.
    # Outputs e.g. "infants", "girls", "adolescent boys", "adult women", "people".
    # Use with {definitions.global.pop_noun} — produces extra whitespace that
    # collapses when the title is rendered (Jinja strips are avoided so that
    # dynamic_yaml substitution doesn't break spacing).
    pop_noun: |-
      <% if age == '0' %><% if sex == 'all' %>infants<% elif sex == 'female' %>infant girls<% else %>infant boys<% endif %><% elif age == '1' %><% if sex == 'all' %>1-year-olds<% elif sex == 'female' %>1-year-old girls<% else %>1-year-old boys<% endif %><% elif age == '18+' %><% if sex == 'all' %>adults<% elif sex == 'female' %>adult women<% else %>adult men<% endif %><% elif age in ('0-4', '0-14', '1-4', '5-9', '10-14') %><% if sex == 'all' %>children<% elif sex == 'female' %>girls<% else %>boys<% endif %><% elif age == '15-19' %><% if sex == 'all' %>adolescents<% elif sex == 'female' %>adolescent girls<% else %>adolescent boys<% endif %><% else %><% if sex == 'all' %>people<% elif sex == 'female' %>women<% else %>men<% endif %><% endif %>
    # Age label for population titles. Outputs e.g. "under 5", "aged 15 to 19",
    # "aged 100 and over". Empty for age=all, age=0, age=1, age=18+ (handled specially).
    pop_age_label: |-
      <% if age.startswith('0-') and age != '0-24' %>under << age.split('-')[1]|int + 1 >><% elif age == '0-24' %>under 25<% elif '+' in age and age != '18+' %>aged << age.replace('+', '') >> and over<% elif '-' in age %>aged << age.replace('-', ' to ') >><% endif %>
    dimensions:
      title: |-
        <% if sex == 'all' and age == 'all' and variant == 'estimates' %>
        total
        <%- else %>
        <%- if sex != 'all' %>
         << sex >>s<% if age != 'all' or variant != 'estimates' %>, <%endif %>
        <%- endif %>
        <%- if age == '0' %>
        at birth<% if variant != 'estimates' %>, <%endif %>
        <%- elif '-' in age|string or '+' in age|string %>
        ages << age >><%- if variant != 'estimates' %>, <%endif %>
        <%- elif age != 'all' %>
        age << age >><%- if variant != 'estimates' %>, <%endif %>
        <%- endif %>
        <%- if variant != 'estimates' %>
        << variant >> projection
        <%- endif %>
        <%- endif %>
      description_short: |-
        <% if not (sex == 'all' and age == 'all') %>
        This only includes
        <%- if sex == 'all' %>
         people<%- elif sex == 'female' %> women<%- else %> men<%- endif %>
        <%- if age == '0' %> at birth<%- elif age != 'all' %> aged << age >><%- endif %>.
        <%- endif %> {definitions.global.projections}

      description_short_births: |-
        <% if sex is defined %>
        <% if not (sex == 'all' and age == 'all') %>
        This only includes
        <%- if sex == 'female' %> baby girls<% if age != 'all' %>, and<% endif %>
        <%- elif sex == 'male' %> baby boys<% if age != 'all' %>, and<% endif %>
        <%- endif %>
        <%- if age != 'all' %>
         mothers aged << age >>
        <%- endif %>.
        <%- endif %>
        <%- endif %> {definitions.global.projections}

  common:
    presentation:
      attribution_short: UN WPP
      # Inherited by every variable; sets a clean, projection-aware variant
      # so data pages render "Indicator (UN WPP)" or
      # "Indicator (UN WPP, medium scenario)".
      title_variant: |-
        <% if variant == 'estimates' -%>
        UN WPP
        <%- else -%>
        UN WPP, << variant >> scenario
        <%- endif -%>
      grapher_config:
        subtitle: "{definitions.global.projections}"
        originUrl: "https://ourworldindata.org/population-growth"

  # Used in variable display blocks to mark projection variants so the grapher
  # renders them with a dashed line. Reference with `isProjection: *projection`.
  projection: &projection <% if (variant is defined) and (variant != 'estimates') -%> true <%- else -%> false <%- endif -%>

  # Note flagging vital-registration uncertainty. Reference with `note: *crvs_note`.
  # Used by deaths, death_rate, and mortality_rate.
  crvs_note: &crvs_note |-
    Estimates may be uncertain for countries with poor [vital registration systems](#dod:crvs).

  # Note explaining the expected biological sex ratio at birth. Renders only
  # when age == '0'. Reference with `note: *sex_ratio_birth_note`.
  sex_ratio_birth_note: &sex_ratio_birth_note |-
    <% if age == '0' -%>
    It's considered that 105 is the biologically expected sex ratio at birth.
    <%- endif %>

# this metadata file is not used in garden step, but in grapher step
tables:
  population:
    variables:
      population:
        title: Population
        unit: people
        description_short: |-
          The total population, measured on 1 July of the year shown. {definitions.global.dimensions.description_short}
        description_processing: |-
          The UN publishes population by single year of age. We aggregate these into the broader age groups shown here (e.g. 0–14, 15–64, 65+, 18+, 15–49). Our continental aggregates (Africa, Asia, Europe, North America, South America, Oceania) are computed by summing across countries, and may differ slightly from regional aggregates the UN publishes directly, which use a different country grouping.
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 4
        presentation:
          title_public: |-
            <%- if (age is defined) and (sex is defined) %>
            <%- if age == 'all' %>
            <%- if sex == 'all' %>Population<%- elif sex == 'female' %>Female population<%- else %>Male population<%- endif %>
            <%- else %>
            Number of {definitions.global.pop_noun} {definitions.global.pop_age_label}
            <%- endif %>
            <%- endif %>
          grapher_config:
            note: ""
            subtitle: |-
              <%- if (age is defined) and (sex is defined) %>
              <%- if age == '0' %>
              <%- if sex == 'all' %>Children under 1 year old.<%- elif sex == 'female' %>Girls under 1 year old.<%- else %>Boys under 1 year old.<%- endif %>
              <%- elif age == '18+' %>
              <%- if sex == 'all' %>People aged 18 and over.<%- elif sex == 'female' %>Women aged 18 and over.<%- else %>Men aged 18 and over.<%- endif %>
              <%- endif %>
              <%- endif %> {definitions.global.projections}

      population_change:
        title: Population change
        unit: people
        description_short: |-
          Annual change in population, calculated as the difference between population on 1 July of consecutive years. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            This is the *net* change in population. It reflects births, deaths, and migration combined. To see only the contribution of births and deaths, look at the [natural population growth rate](https://ourworldindata.org/grapher/natural-population-growth).
        description_processing: |-
          We compute population change as the difference between the population in two consecutive years, using the UN's published population counts.
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 4
        presentation:
          title_public: |-
            <%- if (age is defined) and (sex is defined) %>
            <%- if age == 'all' %>
            <%- if sex == 'all' %>Annual change in population<%- elif sex == 'female' %>Annual change in the female population<%- else %>Annual change in the male population<%- endif %>
            <%- else %>
            Annual change in the number of {definitions.global.pop_noun} {definitions.global.pop_age_label}
            <%- endif %>
            <%- endif %>
          grapher_config:
            note: ""
            subtitle: |-
              <%- if (age is defined) and (sex is defined) %>
              <%- if age == '0' %>
              <%- if sex == 'all' %>Children under 1 year old.<%- elif sex == 'female' %>Girls under 1 year old.<%- else %>Boys under 1 year old.<%- endif %>
              <%- elif age == '18+' %>
              <%- if sex == 'all' %>People aged 18 and over.<%- elif sex == 'female' %>Women aged 18 and over.<%- else %>Men aged 18 and over.<%- endif %>
              <%- endif %>
              <%- endif %> {definitions.global.projections}

      population_density:
        title: Population density
        unit: people per square kilometer
        short_unit: people/km²
        description_short: |-
          The number of people per square kilometre of land area. {definitions.global.dimensions.description_short}
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 3
        presentation:
          title_public: |-
            Population density
          grapher_config:
            subtitle: |-
              Number of people per km² of land area. {definitions.global.projections}
      # population_doubling_time:
      #   title: Population doubling time
      #   unit: years
      #   short_unit: years
      #   description_short: &pop2_description_short |-
      #     Years required for the population to double if the current growth rate continues. When population is declining, negative values indicate years needed for the population to halve if it is declining. {definitions.global.dimensions.description_short}
      #   description_key:
      #     - It is calculated as ln(2)/r where r is the annual population growth rate.
      #     - Doubling time is computed only for fast growing populations with growth rates exceeding 0.5 per cent.
      #   presentation:
      #     title_public: |-
      #       Population doubling time, {definitions.global.dimensions.title}
      #     grapher_config:
      #       subtitle: *pop2_description_short

  growth_rate:
    variables:
      growth_rate:
        title: Population growth rate
        short_unit: "%"
        unit: "%"
        description_short: |-
          The annual rate at which the population is growing, expressed as a percentage. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            The growth rate combines births, deaths, and net migration. The [natural population growth rate](https://ourworldindata.org/grapher/natural-population-growth) reflects only the balance of births and deaths.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Population growth rate
          grapher_config:
            subtitle: |-
              Annual population change determined by births, deaths, and migration, expressed as a percentage of the population. {definitions.global.projections}

  natural_change_rate:
    variables:
      natural_change_rate:
        title: Natural population growth rate
        short_unit: "%"
        unit: "%"
        description_short: |-
          Births minus deaths, as a share of the population. This is the part of population change that comes only from births and deaths, ignoring migration. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            Migration is *not* included. To see how births, deaths, and migration combine, look at the [overall population growth rate](https://ourworldindata.org/grapher/population-growth-rates).
        description_processing: |-
          The UN publishes the rate of natural change per 1,000 people. We divide by 10 to express it as a percentage.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Natural population growth rate
          grapher_config:
            subtitle: |-
              Annual population change determined by births and deaths. Migration is not included. {definitions.global.projections}

  fertility_rate:
    variables:
      fertility_rate:
        title: Fertility rate
        unit: |-
          <% if age == 'all' %>
          live births per woman
          <%- else %>
          live births per 1,000 women aged << age >>
          <%- endif %>
        description_short: |-
          <% if age == 'all' %>
          The [total fertility rate](#dod:fertility-rate): the average number of children a woman would have if she experienced today's age-specific birth rates throughout her childbearing years. {definitions.global.dimensions.description_short}
          <%- elif age in ('10-14', '15-19') %>
          The [age-specific fertility rate](#dod:age-specific-fertility-rate) for girls aged << age|replace('-', ' to ') >>: the annual number of live births in this age group per 1,000 girls.
          <%- else %>
          The [age-specific fertility rate](#dod:age-specific-fertility-rate) for women aged << age|replace('-', ' to ') >>: the annual number of live births in this age group per 1,000 women.
          <%- endif %>
        description_key:
          - |-
            <% if age == 'all' -%>
            The UN's projections come in three scenarios: medium, high, and low. The medium scenario is the central estimate; the high and low scenarios are designed to fully reach 0.5 births per woman above and below the medium from the mid-2030s onward (e.g. medium 2.1 → high 2.6, low 1.6). In the first decade of the projection the gap is narrower (about ±0.25 in 2024–2028, ±0.4 in 2029–2033).
            <%- else -%>
            The UN's high and low scenarios for age-specific fertility are derived from the corresponding total-fertility scenario, which runs roughly 0.5 births per woman above or below the medium in the long run.
            <%- endif -%>
        description_processing: |-
          <% if age == 'all' -%>
          The UN doesn't publish a total fertility rate for our continental aggregates (Africa, Asia, Europe, North America, South America, Oceania), since its own regional groupings differ. We derive these by summing the age-specific fertility rates across the 5-year reproductive age groups (15–19 to 45–49) and multiplying by 5, where each age-specific rate uses regional totals for births and female population.
          <%- endif -%>
        display:
          isProjection: *projection
          numDecimalPlaces: "<% if age == 'all' %>2<%- endif %>"
          roundingMode: "<% if age != 'all' %>significantFigures<%- endif %>"
          numSignificantFigures: "<% if age != 'all' %>2<%- endif %>"
        presentation:
          title_public: |-
            <% if age == 'all' %>
            Fertility rate
            <%- elif age == '10-14' %>
            Fertility rate among girls aged 10 to 14
            <%- elif age == '15-19' %>
            Fertility rate among adolescent girls aged 15 to 19
            <%- else %>
            Fertility rate among women aged << age|replace('-', ' to ') >>
            <%- endif %>
          grapher_config:
            subtitle: |-
              <% if age == 'all' %>
              The [total fertility rate](#dod:fertility-rate) summarizes the total number of births a woman would have if she experienced the birth rates seen in women of each age group in one particular year across her childbearing years.
              <%- elif age == '10-14' %>
              The [age-specific fertility rate](#dod:age-specific-fertility-rate) for girls aged << age|replace('-', ' to ') >>, measured as the number of live births per 1,000 girls in this age group.
              <%- elif age == '15-19' %>
              The [age-specific fertility rate](#dod:age-specific-fertility-rate) for adolescent girls aged 15 to 19, measured as the number of live births per 1,000 girls in this age group.
              <%- else %>
              The [age-specific fertility rate](#dod:age-specific-fertility-rate) for women aged << age|replace('-', ' to ') >>, measured as the number of live births per 1,000 women in this age group.
              <%- endif %> {definitions.global.projections}
            # note: |-
            #   <% if age == 'all' %>
            #   The total fertility rate is the number of children that would be born to a woman if she were to live to the end of her child-bearing years and give birth to children at the current age-specific fertility rates.
            #   <%- endif %>

  fertility_single:
    variables:
      fertility_rate:
        title: "Fertility rate, by age - Year: << year_as_dimension >>"
        description_short: |-
          The average number of children a woman would have at each age if she experienced the fertility rates of year << year_as_dimension >>.
        unit: "births per woman"

  migration:
    variables:
      net_migration:
        title: Net migration
        unit: migrants
        description_short: |-
          The number of immigrants minus the number of emigrants. Positive values mean more people moved into the country than left it. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            Net migration is the most uncertain component of population change — flows are volatile and historical data is patchy. The UN adjusts country values so the global net migration each year sums to zero.
        description_processing: |-
          We compute continental aggregates (Africa, Asia, Europe, North America, South America, Oceania) by summing across constituent countries. We set the world total to zero — every immigrant in one country is an emigrant from another.
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 4
          numDecimalPlaces: 0
        presentation:
          title_public: |-
            Annual net migration
          grapher_config:
            subtitle: |-
              Total number of immigrants minus the number of emigrants. Positive values mean more people moved in than out. {definitions.global.projections}

      net_migration_rate:
        title: Annual net migration rate
        unit: migrants per 1,000 people
        description_short: |-
          The number of immigrants minus the number of emigrants, per 1,000 people in the population. Positive values mean more people moved into the country than left it. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            Expressing migration per 1,000 people makes it comparable across countries of very different sizes.
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 2
        presentation:
          title_public: |-
            Annual net migration rate
          grapher_config:
            subtitle: |-
              Total number of immigrants minus the number of emigrants, per 1,000 people in the population. Positive values mean more people moved in than out. {definitions.global.projections}

  deaths:
    variables:
      deaths:
        title: Deaths
        unit: deaths
        description_short: |-
          The number of deaths in a calendar year. {definitions.global.dimensions.description_short}
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 4
          numDecimalPlaces: 0
        presentation:
          title_public: |-
            <%- if age == 'all' %>
            <%- if sex == 'all' %>Number of deaths<%- elif sex == 'female' %>Number of deaths among women<%- else %>Number of deaths among men<%- endif %>
            <%- elif age in ('0', '0-4') %>
            <%- if sex == 'all' %>
            <%- if age == '0' %>Number of infants who die before age 1<%- else %>Number of children who die before age 5<%- endif %>
            <%- else %>
            Number of<%- if sex == 'female' %> girls<%- else %> boys<%- endif %> who die before age <%- if age == '0' %> 1<%- else %> 5<%- endif %>
            <%- endif %>
            <%- else %>
            Number of deaths among {definitions.global.pop_noun} {definitions.global.pop_age_label}
            <%- endif %>
          grapher_config:
            note: *crvs_note

      death_rate:
        title: Death rate
        unit: deaths per 1,000 people
        description_short: |-
          The number of deaths in a year per 1,000 people in the population. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            This is a *crude* death rate — it is not adjusted for differences in age structure between countries. Even when two countries have similar mortality at each age, the country with an older population will report a higher crude death rate.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Death rate
          grapher_config:
            subtitle: Annual number of deaths per 1,000 people in the total population. {definitions.global.projections}
            note: *crvs_note

  births:
    variables:
      births:
        title: Births
        unit: births
        description_short: |-
          The number of live births in a calendar year. {definitions.global.dimensions.description_short_births}
        display:
          isProjection: *projection
          roundingMode: significantFigures
          numSignificantFigures: 4
          numDecimalPlaces: 0
        presentation:
          title_public: |-
            <% if age == 'all' %>
            Number of births
            <%- elif age == '10-14' %>
            Number of births to girls aged 10 to 14
            <%- elif age == '15-19' %>
            Number of births to adolescent girls aged 15 to 19
            <%- else %>
            Number of births to women aged << age|replace('-', ' to ') >>
            <%- endif %>

      birth_rate:
        title: Birth rate
        unit: births per 1,000 people
        description_short: |-
          The number of live births in a year per 1,000 people in the population. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            This is a *crude* birth rate — it is not adjusted for differences in age structure, so countries with younger populations tend to show higher rates even when individual women have the same number of children.
          - |-
            We also publish a [long-run birth rate indicator](https://ourworldindata.org/grapher/long-run-birth-rate) covering earlier years.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Birth rate
          grapher_config:
            subtitle: Annual number of live births per 1,000 people in the total population. {definitions.global.projections}

  median_age:
    variables:
      median_age:
        title: Median age
        unit: years
        description_short: |-
          The age that divides the population into two halves of equal size — half are younger and half are older. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            Median age tends to rise as people live longer and as fewer children are born. It is a common way to describe how "old" or "young" a country's population is.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Median age
          grapher_config:
            subtitle: |-
              The median age is the age that divides the population into two equal halves — half of the population is younger, and half is older. {definitions.global.projections}

  mean_age_childbearing:
    variables:
      mean_age_childbearing:
        title: Mean age at childbearing
        unit: years
        description_short: |-
          The average age at which women give birth, calculated from a single year's age-specific fertility rates. {definitions.global.dimensions.description_short}
        description_key:
          - |-
            This figure is calculated from a single year's [age-specific fertility rates](#dod:age-specific-fertility-rate) — it does not track real groups of women through their lives.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            Mean age at childbearing
          grapher_config:
            subtitle: |-
              Average age of mothers at the birth of their children, calculated under each year's age-specific fertility rates. {definitions.global.projections}

  life_expectancy:
    variables:
      life_expectancy:
        title: Life expectancy
        unit: years
        short_unit: years
        description_short: |-
          <%- if age|string == '0' -%>
          Period life expectancy at birth.
          <%- elif sex == 'all' -%>
          Period life expectancy for people who have reached age << age >>, shown as the expected age at death (not the years remaining).
          <%- elif sex == 'female' -%>
          Period life expectancy for << 'girls' if age|int < 18 else 'women' >> who have reached age << age >>, shown as the expected age at death (not the years remaining).
          <%- else -%>
          Period life expectancy for << 'boys' if age|int < 18 else 'men' >> who have reached age << age >>, shown as the expected age at death (not the years remaining).
          <%- endif %> {definitions.global.projections}
        description_key:
          - |-
            This is [period life expectancy](#dod:period-life-expectancy) — a snapshot of mortality rates in a single year. It does *not* follow a real generation of people; it tells you how long someone would live if today's age-specific death rates stayed the same for the rest of their life.
          - |-
            Future values are the mean of thousands of trajectories simulated by the UN. When fitting its projection model, the UN excluded values for 2020 and 2021 so COVID-19's temporary drop wouldn't distort the long-run trend.
        description_processing: |-
          For ages above 0, the UN reports life expectancy as the years a person at that age has left to live. We add the starting age back so the chart shows the *expected age at death* — for example, a 65-year-old with 17 years remaining is shown as 82.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            <% if sex != 'all' %><< sex|capitalize >> life<%- else %>Life<%- endif %> expectancy <%- if age|string == '0' %> at birth<%- else %> at age << age >><%- endif %>
          grapher_config:
            subtitle: |-
              The [period life expectancy](#dod:period-life-expectancy) is the age to which
              <%- if sex == 'all' %>
              <%- if age|string == '0' %> a newborn
              <%- elif age|string == '80' %> an << age >>-year-old
              <%- else %> a << age >>-year-old
              <%- endif %>
              <%- else %>
              <%- set noun = ('girl' if sex == 'female' else 'boy') if age|int < 18 else ('woman' if sex == 'female' else 'man') %>
              <%- if age|string == '0' %> a newborn << noun >>
              <%- elif age|string == '80' %> an << age >>-year-old << noun >>
              <%- else %> a << age >>-year-old << noun >>
              <%- endif %>
              <%- endif %> can expect to live, if age-specific mortality rates in the current year were to stay the same throughout their life. {definitions.global.projections}
            # note: |-
            #   <% if sex == 'all' %>
            #   <%- set sex_name='' %>
            #   <%- else %>
            #   <%- set sex_name=' for ' + sex+'s' %>
            #   <%- endif %>
            #   <%- if age == '0' %>
            #   Shown is the 'period life expectancy'<< sex_name >> at birth<< sex_name >>. This is the average number of years a newborn would live if age-specific mortality rates in the current year were to stay the same throughout its life.
            #   <%- else %>
            #   Shown is the 'period life expectancy'<< sex_name >> at age << age >>. This is the expected age at death, if age-specific mortality rates in the current year were to stay the same throughout its life.
            #   <%- endif %>

  sex_ratio:
    variables:
      sex_ratio:
        title: Sex ratio
        unit: "males per 100 females"
        description_short: |-
          <% if age == '0' %>
          The number of male births per 100 female births. The biological norm typically falls in the range 103–107, with small variations across populations.
          <%- elif age == 'all' %>
          The number of males per 100 females in the population.
          <%- else %>
          The number of males per 100 females at age << age >>.
          <%- endif %> {definitions.global.projections}
        description_key:
          - |-
            <% if age == '0' -%>
            Persistent values well above 105 usually indicate sex-selective practices, since the biological ratio at birth is consistent across populations.
            <%- elif age == 'all' -%>
            Two opposing pressures shape this ratio: slightly more boys than girls are born, but women on average live longer than men. Migration can pull it in either direction.
            <%- else -%>
            Sex ratios drop with age because women on average live longer than men. Migration can pull the ratio in either direction at any age.
            <%- endif -%>
        description_processing: |-
          We compute this from the UN's population by sex and single year of age, as males divided by females, multiplied by 100.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            <% if age == 'all' %>
            Sex ratio
            <%- elif age == '0' %>
            Sex ratio at birth
            <%- elif age == '100+' %>
            Sex ratio at age 100 and over
            <%- else %>
            Sex ratio at age << age >>
            <%- endif %>
          grapher_config:
            subtitle: |-
              <% if age == 'all' %>
              Number of men per 100 women. Values above 100 mean there are more men than women.
              <%- elif age == '0' %>
              Number of boys born per 100 girls. Values above 100 mean more boys are born than girls.
              <%- elif age == '100+' %>
              Number of men per 100 women at age 100 and over. Values above 100 mean there are more men than women.
              <%- elif age|int <= 15 %>
              Number of boys per 100 girls at age << age >>. Values above 100 mean there are more boys than girls.
              <%- else %>
              Number of men per 100 women at age << age >>. Values above 100 mean there are more men than women.
              <%- endif %> {definitions.global.projections}
            note: *sex_ratio_birth_note

  dependency_ratio:
    variables:
      dependency_ratio:
        title: |-
          <% if age == "total" %>
          Total dependency ratio - Sex: << sex >> - Variant: << variant >>
          <%- elif age == "youth" %>
          Child dependency ratio - Sex: << sex >> - Variant: << variant >>
          <%- else %>
          Old-age dependency ratio - Sex: << sex >> - Variant: << variant >>
          <%- endif %>
        unit: "%"
        description_short: |-
          <%- if age == "total" -%>
          The number of children (under 15) and people aged 65 and over per 100 working-age people (aged 15 to 64).
          <%- elif age == "youth" -%>
          The number of children under 15 per 100 working-age people (aged 15 to 64).
          <%- else -%>
          The number of people aged 65 and over per 100 working-age people (aged 15 to 64).
          <%- endif -%>
        description_key:
          - |-
            <% if age == 'total' -%>
            The total dependency ratio compares "dependents" — those under 15 and those aged 65 and over — with the "working-age" population aged 15 to 64.
            <%- elif age == 'youth' -%>
            The youth dependency ratio compares those under 15 with the working-age population (aged 15 to 64).
            <%- else -%>
            The old-age dependency ratio compares those aged 65 and over with the working-age population (aged 15 to 64).
            <%- endif -%>
          - |-
            This is a purely demographic measure. It does *not* count who is actually working or financially dependent — many people aged 15–64 are not in the labour force, and many people over 65 still are.
        description_processing: |-
          We compute the dependency ratios from the UN's population by age. The total dependency ratio is (population aged 0–14 plus population aged 65 and over) divided by population aged 15–64, multiplied by 100. The youth and old-age ratios use only the under-15 or 65+ numerators, respectively.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            <% if sex != 'all' %><< sex|capitalize >> <%- endif %>
            <%- if age == "total" %>
            <% if sex == 'all' %>T<%- else %> t<%- endif %>otal dependency ratio
            <%- elif age == "youth" %>
            <% if sex == 'all' %>Y<%- else %> y<%- endif %>outh dependency ratio
            <%- else %>
            <% if sex == 'all' %>O<%- else %> o<%- endif %>ld-age dependency ratio
            <%- endif %>
          grapher_config:
            subtitle: |-
              <% if sex == 'all' %>
              <%- set young = 'people' %><%- set adult = 'people' %><%- set old = 'people' %>
              <%- elif sex == 'female' %>
              <%- set young = 'girls' %><%- set adult = 'women' %><%- set old = 'women' %>
              <%- else %>
              <%- set young = 'boys' %><%- set adult = 'men' %><%- set old = 'men' %>
              <%- endif %>
              <%- if age == "total" %>
              Number of << young >> aged 0-14 and<% if sex != 'all' %> << old >> aged<% endif %> 65+ per 100 << adult >> aged 15-64.
              <%- elif age == "youth" %>
              Number of << young >> aged 0-14 per 100 << adult >> aged 15-64.
              <%- else %>
              Number of << old >> aged 65+ per 100 << adult >> aged 15-64.
              <%- endif %> {definitions.global.projections}

  mortality_rate:
    variables:
      mortality_rate:
        title: |-
          <% if age == '0' %>
          Infant mortality rate - Sex: << sex >> - Variant: << variant >>
          <%- else %>
          Child mortality rate - Sex: << sex >> - Variant: << variant >>
          <%- endif %>
        unit: |-
          <% if age == '0' %>
          % of infants
          <%- else %>
          % of children
          <%- endif %>
        description_short: |-
          <% if age == '0' %>
          The share of newborns who die before reaching the age of one.
          <%- else %>
          The share of children who die before reaching the age of 5.
          <%- endif %> {definitions.global.projections}
        description_key:
          - |-
            <% if age == '0' -%>
            This is the *probability* a newborn would die before reaching the age of one if today's age-specific mortality rates stayed unchanged. It is not the share of an actual cohort that has been observed dying.
            <%- else -%>
            This is the *probability* a newborn would die before reaching the age of five if today's age-specific mortality rates stayed unchanged. It is not the share of an actual cohort that has been observed dying.
            <%- endif -%>
        description_processing: |-
          The UN publishes infant and under-five mortality as deaths per 1,000 live births. We divide by 10 to express the values as a percentage of newborns.
        display:
          isProjection: *projection
          numDecimalPlaces: 1
        presentation:
          title_public: |-
            <% if age == '0' %>
            Infant mortality rate
            <%- else %>
            Child mortality rate
            <%- endif %>
          grapher_config:
            subtitle: |-
              <% if age == '0' %>
              Share of newborns who die before reaching the age of 1.
              <%- else %>
              Share of newborns who die before reaching the age of 5.
              <%- endif %> {definitions.global.projections}
            # note: |-
            #   <% if age == '0' %>
            #   This is the probability of a child born in a specific year or period dying before reaching the age of one, if subject to age-specific mortality rates of that period. This is given as the share of live births.
            #   <%- else %>
            #   This is the probability of a child born in a specific year or period dying before reaching the age of 5, if subject to age-specific mortality rates of that period. This is given as the share of live births.
            #   <%- endif %> {definitions.global.projections}
