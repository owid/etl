definitions:
  common:
    processing_level: minor
    presentation:
      topic_tags:
        - Transport

dataset:
  update_period_days: 365

tables:
  air_traffic:
    variables:
      passenger_load_factor:
        title: Passenger load factor
        unit: "%"
        short_unit: "%"
        description_short: The share of airline seats filled by paying passengers, also known as the passenger load factor.
        description_key:
          - Passenger load factor shows how full flights were, on average.
          - It is calculated by comparing passenger traffic with the total available passenger seating capacity airlines provided.
          - A load factor of 80% means that, on average, 80 out of every 100 available seats were filled by paying passengers.
        presentation:
          title_public: Share of airline seats filled by paying passengers
        display:
          numDecimalPlaces: 1
          name: Seats filled

      share_empty_seats:
        title: Share of empty airline seats
        unit: "%"
        short_unit: "%"
        description_short: The share of airline seats that flew empty.
        description_key:
         - This indicator shows the share of available passenger seats that were not filled by paying passengers.
          - A value of 20% means that, on average, 1 in 5 available seats flew empty.
        processing_level: major
        presentation:
          title_public: Share of airline seats that flew empty
        display:
          numDecimalPlaces: 1
          name: Empty seats
        description_processing: Calculated by subtracting the passenger load factor from 100%.

      revenue_passenger_kilometers:
        title: Revenue passenger-kilometres
        unit: passenger-kilometres
        short_unit: passenger-km
        description_short: A measure of passenger air traffic – also known as revenue passenger-kilometres – calculated as the number of paying passengers multiplied by the distance they fly.
        description_key:
          - Revenue passenger-kilometres measure total passenger traffic by air.
          - One revenue passenger-kilometre equals one paying passenger traveling one kilometre.
          - A flight carrying 150 paying passengers over 1,000 kilometres generates 150,000 revenue passenger-kilometres.
          - This metric combines passenger numbers and distances traveled, so it is more informative than passenger counts alone.
          - "It is not a simple count of passengers: long-distance travel contributes more than short-distance travel."
        presentation:
          title_public: Passenger air traffic
        display:
          numDecimalPlaces: 0
          name: Passenger-km

      available_seat_kilometers:
        title: Available seat-kilometres
        unit: seat-kilometres
        short_unit: km
        description_short: The total seating capacity provided by airlines, also known as available seat-kilometres.
        description_key:
          - Available seat-kilometres measure how much passenger-carrying capacity airlines offered.
          - One available seat-kilometre equals one seat flown one kilometre, whether it was filled or empty.
          - A flight with 200 seats flying 1,000 kilometres generates 200,000 available seat-kilometres.
          - This metric combines seat numbers and distances flown, so it is more informative than flight counts alone.
          - It measures capacity offered, not how many passengers actually traveled.
        presentation:
          title_public: Total seating capacity provided by airlines
        display:
          numDecimalPlaces: 0
          name: Available seat-km