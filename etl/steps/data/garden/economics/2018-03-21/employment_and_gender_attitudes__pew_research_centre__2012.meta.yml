dataset:
  title: Employment and Gender attitudes - Pew Research Centre (2012)
tables:
  employment_and_gender_attitudes__pew_research_centre__2012:
    variables:
      share_who_agree__pew_research_centre__2012:
        title: Share who agree (Pew Research Centre (2012))
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1
          unit: '%'
        description: |-
          Statement posed in the survey: Please tell me whether you completely agree, mostly agree, mostly disagree, or completely disagree with the following statements...When jobs are scarce, men should have more right to a job than women.

          To arrive at the 'agree' estimate, we have added the shares corresponding to 'completely agree' and 'mostly agree' for the statement above.
      share_who_disagree__pew_research_centre__2012:
        title: Share who disagree (Pew Research Centre (2012))
        unit: '%'
        display:
          unit: '%'
        description: |-
          Statement posed in the survey: Please tell me whether you completely agree, mostly agree, mostly disagree, or completely disagree with the following statements...When jobs are scarce, men should have more right to a job than women.

          To arrive at the 'disagree' estimate, we have added the shares corresponding to 'completely disagree' and 'mostly disagree' for the statement above.
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
