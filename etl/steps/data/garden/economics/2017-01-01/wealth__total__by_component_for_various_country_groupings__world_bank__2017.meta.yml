dataset:
  title: Wealth (total) by component for various country groupings - World Bank (2017)
tables:
  wealth__total__by_component_for_various_country_groupings__world_bank__2017:
    variables:
      human_capital:
        title: Human capital
        unit: $
        description: |-
          Total human capital is calculated as the discounted value of lifetime earnings. This method takes into account estimates of years of schooling and experience. Values are in million constant 2014 USD.
      natural_capital__timber__non_timber__protected_areas__land__sub_soil_assets:
        title: Natural capital (timber, non-timber, protected areas, land, sub-soil assets)
        unit: $
        description: |-
          Sum of values of timber, non-timber, protected areas, land, and sub-soil assets. Each of these components is calculated separately by the World Bank, usually as the net present value of future returns. Data on each wealth component - i.e. market exchange rates - comes from various sources. Values are in million constant 2014 USD.
      net_foreign_assets:
        title: Net foreign assets
        unit: $
        description: |-
          Net foreign assets (NFA) are a measure of the cross-border assets and liabilities held by a country’s residents. A country’s external asset position, or net foreign assets (NFA), is calculated as: NFA = FA - FL. Values are in million constant 2014 USD.
      produced_capital__including_urban_land:
        title: Produced capital (including urban land)
        unit: $
        description: |-
          Physical capital estimates include the value of structures, machinery, and equipment, since the value of the stocks is derived (using the perpetual inventory method) from gross capital formation data that account for these elements. Urban land is also accounted for, however, in the investment figures only land improvements are captured. Thus, the final capital estimates do not entirely reflect the value of urban land. Values are in million constant 2014 USD.
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
