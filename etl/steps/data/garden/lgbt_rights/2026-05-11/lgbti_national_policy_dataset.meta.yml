        unit: ""
        short_unit: ""
        display:
          name: LGBT military service (legal status only)
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Open service permitted
          - Allowed for LGB only
          - Allowed for transgender only
          - Mixed (LGB allowed, transgender banned)
          - No policy
          - Banned for LGB only
          - Service banned
        processing_level: major
        description_processing: '{definitions.derivation_lgb_military_join} We then combined the resulting `LGB military service` categorical with the parallel `Transgender military service` categorical into a single LGBT-military indicator, with one label per real combination of LGB and transgender status. The enforcement refinement carried by the standalone LGB and transgender indicators is collapsed here ("Banned but not enforced" folds into "Banned") so this combined view stays at the legal-status level.'

