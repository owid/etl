        title: LGBT military service
        description_short: |-
          Whether lesbian, gay, bisexual, and transgender people are allowed to serve openly in the military, banned from serving, or whether no policy exists.
        description_key:
          - "{definitions.description_key_dataset}"
          - "This indicator combines `LGB military service` and `Transgender military service` into a single categorical, with one label per real combination that occurs in the data. **_Open service permitted_** (both can serve openly), **_Allowed for LGB only_** (LGB can serve openly, no national policy on transgender service), **_Allowed for transgender only_** (transgender can serve openly, no national policy on LGB service), **_Mixed (LGB allowed, transgender banned but not enforced)_** (the United States in 2025 — LGB can serve openly while the transgender service ban is on the books but enforcement is halted), **_No policy_** (no national policy on either group), **_Banned for LGB only, not enforced_** (LGB ban is on the books but not enforced; no national policy on transgender service), **_Banned for LGB only_** (LGB banned, no national policy on transgender service) and **_Service banned_** (both banned)."
