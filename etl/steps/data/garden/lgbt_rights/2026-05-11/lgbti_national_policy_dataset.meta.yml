# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    processing_level: minor
    presentation:
      topic_tags:
        - LGBT+ Rights
        - Human Rights
      attribution_short: Velasco
    description_key:
      - "{definitions.description_key_dataset}"

  description_key_dataset: |-
    This data comes from the LGBTI National Policy Dataset, compiled by Kristopher Velasco at Princeton University. It tracks the adoption, scope, and enforcement of 27 LGBTI-related policies across 197 countries, with annual data starting in 1991.

  proportion_methodology: |-
    The score ranges from 0 (the policy does not exist in any jurisdiction) to 1 (the policy is in effect at the national level). Fractional values reflect subnational adoption in federal or decentralized countries (e.g., the United States, Australia, Brazil, India), weighted by constant 2000/2001 Census population shares so that changes over time reflect policy shifts rather than demographic change.

  description_regions_processing: |-
    Regional aggregates are computed from country-level data using [Our World in Data's region definitions](https://ourworldindata.org/world-region-map-definitions), the [World Bank's income group classification](https://ourworldindata.org/world-bank-income-groups-explained), and our [consolidated population data](https://ourworldindata.org/population-sources). A country is counted as having full implementation when the policy proportion equals 1.

  description_key_full_implementation: |-
    A country is counted as having full implementation when the policy score equals 1. Subnational adoption (scores below 1 in countries with federal or decentralized systems such as the United States, Australia, Canada, Mexico, Brazil, or the United Kingdom) is treated as not fully implemented.

  # Reusable derivation snippets for description_processing.
  derivation_age_of_consent: |-
    From the original dataset, we combined two indicators — age of consent equal and age of consent unequal — into a single categorical indicator (Equal, Varies by region, No legal provisions, Unequal) based on the proportion scores of both directions. Country-years where either direction shows partial subnational implementation are classified as "Varies by region".
  derivation_marriage: |-
    From the original dataset, we combined three indicators — marriage equality (legal direction), marriage equality (illegal direction, i.e. constitutional or statutory bans), and civil unions — into a single categorical indicator (Legal, Civil unions only, Varies by region, No legal provisions, Banned) based on the proportion scores of all three. Country-years where marriage equality, the ban, or civil unions are only partially in effect across subnational jurisdictions are classified as "Varies by region"; country-years where a national civil union or registered partnership is recognized but same-sex marriage is not are classified as "Civil unions only".
  derivation_lgb_military_join: |-
    From the original dataset, we combined two indicators — LGB allowed in the military and LGB banned from the military — into a single categorical indicator (Allowed, No policy, Banned) based on the proportion scores of both directions.

  derivation_enforcement_refinement: |-
    We added a "but not enforced" category for country-years where the policy is on the books but the dataset records it as not enforced.
  derivation_binary_two_direction: |-
    From the original dataset, we combined the two opposing direction indicators (the progressive direction, e.g. legal, and the regressive direction, e.g. illegal) into a single categorical indicator. We bucketed each proportion into 0, partial (between 0 and 1), or 1, and then assigned a category from the bucket combination. Countries where either direction shows partial subnational implementation are classified as "Varies by region".
  derivation_single_direction: |-
    From the original dataset's single-direction proportion (0 = no policy, 1 = fully implemented, intermediate values = partial subnational adoption), we coded countries into three categories: the substantive direction in effect, partial subnational implementation ("Varies by region"), or no policy in effect.
  derivation_so_gi_pair: |-
    From the original dataset's two separate indicators — one for sexual orientation and one for gender identity — we combined them into a single categorical indicator with five categories: both protected, sexual orientation only, gender identity only, no protection, and "Varies by region" (any partial subnational coverage in either dimension).

  description_key_so_gi_partial_note: |-
    "Varies by region" also covers asymmetric cases where one dimension is fully unprotected and the other is partially protected across subnational jurisdictions — e.g. a federal country where some states have hate-crime protections for sexual orientation but none for gender identity.
  derivation_gac: |-
    From the original dataset's four indicators for gender-affirming care (adults covered, adults restricted, minors covered, minors restricted), we combined them into a single categorical indicator capturing whether care is publicly funded or legally restricted for adults and for minors. Each single, definite national policy combination gets a dedicated category (covered or restricted, for adults and/or minors); only country-years with subnational variation or contradictory same-year coding are grouped as "Varies by region or other".
  derivation_gmc: |-
    From the original dataset, we combined the gender-marker-change proportion (the legal direction) with the recorded legal-pathway requirement to produce a single categorical indicator. When legal change of the gender marker is fully in effect, we classify countries by their procedural requirement ("Self-declaration is enough", "Diagnosis required", "Surgery required", "Surgery and sterilization required", or "Legally possible, requirement unknown" when the requirement is not recorded). Otherwise the country is classified as "Varies by region" (legal change is only partially in effect across subnational jurisdictions) or "Not legally possible" (no legal procedure exists).

  # Per-law short description (used for description_short and as building block for title)
  law_short: |-
    <% if law == "age_of_consent" %>
    Whether the minimum age of consent for same-sex sexual activity equals that for different-sex sexual activity.
    <% elif law == "blood_donations" %>
    Whether men who have sex with men may donate blood without restriction. Both lifetime bans and temporary deferrals are coded as restrictions.
    <% elif law == "civil_unions" %>
    Whether same-sex couples have access to a legally recognized partnership distinct from marriage (civil union, domestic partnership, or registered partnership).
    <% elif law == "constitutional_protections_gender_identity" %>
    Whether gender identity is explicitly named in the national constitution or established as a protected characteristic through binding constitutional court interpretation.
    <% elif law == "constitutional_protections_sexual_orientation" %>
    Whether sexual orientation is explicitly named in the national constitution or established as a protected characteristic through binding constitutional court interpretation.
    <% elif law == "conversion_therapies" %>
    Whether conversion therapy is banned by law, executive order, or judicial ruling.
    <% elif law == "death_penalty" %>
    Whether the death penalty is a codified or de facto punishment for same-sex sexual acts.
    <% elif law == "employment_discrimination_gender_identity" %>
    Whether national law prohibits employment discrimination based on gender identity.
    <% elif law == "employment_discrimination_sexual_orientation" %>
    Whether national law prohibits employment discrimination based on sexual orientation.
    <% elif law == "gender_affirming_care_adults" %>
    Whether gender-affirming healthcare for adults is publicly funded, or explicitly restricted or banned by national law.
    <% elif law == "gender_affirming_care_minors" %>
    Whether gender-affirming healthcare for minors under 18 is publicly funded, or explicitly restricted or banned by national law.
    <% elif law == "gender_assignment_surgeries_on_children" %>
    Whether non-consensual gender assignment surgeries on intersex children are banned.
    <% elif law == "gender_marker_change" %>
    Whether a legal process exists to change the gender marker on official identity documents.
    <% elif law == "goods_services_discrimination_gender_identity" %>
    Whether national law prohibits discrimination in the provision of goods and services based on gender identity.
    <% elif law == "goods_services_discrimination_sexual_orientation" %>
    Whether national law prohibits discrimination in the provision of goods and services based on sexual orientation.
    <% elif law == "hate_crime_protections_gender_identity" %>
    Whether gender identity is included as a protected characteristic in hate crime legislation that imposes enhanced penalties.
    <% elif law == "hate_crime_protections_sexual_orientation" %>
    Whether sexual orientation is included as a protected characteristic in hate crime legislation that imposes enhanced penalties.
    <% elif law == "incitement_to_hatred" %>
    Whether incitement to hatred based on sexual orientation or gender identity is prohibited.
    <% elif law == "joint_adoption" %>
    Whether same-sex couples may jointly adopt children.
    <% elif law == "lgb_military" %>
    Whether lesbian, gay, and bisexual people may serve openly in the military.
    <% elif law == "lgbtq_civil_society_restrictions" %>
    Whether national law explicitly restricts the formation, registration, operation, or funding of LGBTQ+ civil society organizations.
    <% elif law == "marriage_equality" %>
    Whether same-sex couples can legally marry, or whether constitutional amendments or statutes ban same-sex marriage.
    <% elif law == "morality_propaganda" %>
    Whether national law restricts the promotion, advocacy, or public expression of LGBTI identities (so-called "gay propaganda" or morality provisions).
    <% elif law == "religious_exemption_laws" %>
    Whether national law allows individuals, businesses, or organizations to refuse services to LGBTQ+ people on religious or conscientious grounds, beyond standard clergy exemptions.
    <% elif law == "same_sex_acts" %>
    Whether consensual same-sex sexual acts between adults are legal, or whether they are criminalized under national law.
    <% elif law == "third_gender_recognition" %>
    Whether a third gender marker or non-binary category is legally recognized on official identity documents.
    <% elif law == "transgender_military" %>
    Whether transgender people may serve openly in the military.
    <% endif %>

  # Per-(law, status) descriptive title — what the score actually measures for this row.
  status_title: |-
    <% if law == "age_of_consent" and status == "equal" %>
    Age of consent is equal for same-sex and different-sex partners
    <% elif law == "age_of_consent" and status == "unequal" %>
    Age of consent is higher for same-sex than different-sex partners
    <% elif law == "blood_donations" and status == "legal" %>
    Men who have sex with men can donate blood without restriction
    <% elif law == "blood_donations" and status == "illegal" %>
    Men who have sex with men face a deferral or ban on blood donation
    <% elif law == "civil_unions" and status == "legal" %>
    Civil unions or registered partnerships for same-sex couples are legally recognized
    <% elif law == "constitutional_protections_gender_identity" and status == "legal" %>
    Gender identity is a constitutionally protected characteristic
    <% elif law == "constitutional_protections_sexual_orientation" and status == "legal" %>
    Sexual orientation is a constitutionally protected characteristic
    <% elif law == "conversion_therapies" and status == "illegal" %>
    Conversion therapy is banned
    <% elif law == "death_penalty" and status == "legal" %>
    Death penalty applies to same-sex sexual acts
    <% elif law == "employment_discrimination_gender_identity" and status == "illegal" %>
    Employment discrimination on the basis of gender identity is prohibited
    <% elif law == "employment_discrimination_sexual_orientation" and status == "illegal" %>
    Employment discrimination on the basis of sexual orientation is prohibited
    <% elif law == "gender_affirming_care_adults" and status == "covered" %>
    Gender-affirming healthcare for adults is publicly funded
    <% elif law == "gender_affirming_care_adults" and status == "restricted" %>
    Gender-affirming healthcare for adults is restricted or banned
    <% elif law == "gender_affirming_care_minors" and status == "covered" %>
    Gender-affirming healthcare for minors is publicly funded
    <% elif law == "gender_affirming_care_minors" and status == "restricted" %>
    Gender-affirming healthcare for minors is restricted or banned
    <% elif law == "gender_assignment_surgeries_on_children" and status == "illegal" %>
    Non-consensual gender assignment surgeries on intersex children are banned
    <% elif law == "gender_assignment_surgeries_on_children" and status == "legal" %>
    Non-consensual gender assignment surgeries on intersex children are permitted
    <% elif law == "gender_marker_change" and status == "legal" %>
    A legal process exists to change the gender marker on identity documents
    <% elif law == "goods_services_discrimination_gender_identity" and status == "illegal" %>
    Discrimination in goods and services on the basis of gender identity is prohibited
    <% elif law == "goods_services_discrimination_sexual_orientation" and status == "illegal" %>
    Discrimination in goods and services on the basis of sexual orientation is prohibited
    <% elif law == "hate_crime_protections_gender_identity" and status == "legal" %>
    Hate crime protections cover gender identity
    <% elif law == "hate_crime_protections_sexual_orientation" and status == "legal" %>
    Hate crime protections cover sexual orientation
    <% elif law == "incitement_to_hatred" and status == "legal" %>
    Incitement to hatred based on sexual orientation or gender identity is prohibited
    <% elif law == "joint_adoption" and status == "legal" %>
    Same-sex couples may jointly adopt children
    <% elif law == "lgb_military" and status == "legal" %>
    Lesbian, gay, and bisexual people may serve openly in the military
    <% elif law == "lgb_military" and status == "illegal" %>
    Lesbian, gay, and bisexual people are banned from the military
    <% elif law == "lgbtq_civil_society_restrictions" and status == "legal" %>
    National law restricts LGBTQ+ civil society organizations
    <% elif law == "marriage_equality" and status == "legal" %>
    Same-sex couples can legally marry
    <% elif law == "marriage_equality" and status == "illegal" %>
    Same-sex marriage is banned by constitution or statute
    <% elif law == "morality_propaganda" and status == "legal" %>
    National law restricts the public expression of LGBTI identities
    <% elif law == "religious_exemption_laws" and status == "legal" %>
    Religious exemptions allow refusal of services to LGBTQ+ people
    <% elif law == "same_sex_acts" and status == "legal" %>
    Same-sex sexual acts are legal
    <% elif law == "same_sex_acts" and status == "illegal" %>
    Same-sex sexual acts are criminalized
    <% elif law == "third_gender_recognition" and status == "legal" %>
    A third gender marker is legally recognized on identity documents
    <% elif law == "transgender_military" and status == "legal" %>
    Transgender people may serve openly in the military
    <% elif law == "transgender_military" and status == "illegal" %>
    Transgender people are banned from the military
    <% endif %>

dataset:
  update_period_days: 365

tables:
  lgbti_national_policy_dataset:
    variables:
      proportion:
        title: |-
          {definitions.status_title}
        description_short: |-
          {definitions.law_short}
        description_key:
          - "{definitions.description_key_dataset}"
          - "{definitions.proportion_methodology}"
        unit: ""
        short_unit: ""
        display:
          name: |-
            {definitions.status_title}
          numDecimalPlaces: 2
          tolerance: 0

  lgbti_national_policy_dataset_regions:
    variables:
      n_countries_yes:
        title: |-
          {definitions.status_title} — Full implementation (number of countries)
        description_short: |-
          The number of countries in the region with full implementation (policy score equal to 1) of: {definitions.status_title}.
        description_key:
          - "{definitions.description_key_dataset}"
          - "{definitions.description_key_full_implementation}"
        processing_level: major
        description_processing: |-
          From the country-level policy scores, we classified each country-year as having full implementation when the score equals 1, then counted these countries within each region. {definitions.description_regions_processing}
        unit: countries
        short_unit: ""
        display:
          name: Full implementation
          numDecimalPlaces: 0
          tolerance: 0
      n_countries_no:
        title: |-
          {definitions.status_title} — No or partial implementation (number of countries)
        description_short: |-
          The number of countries in the region without full implementation (policy score below 1) of: {definitions.status_title}.
        description_key:
          - "{definitions.description_key_dataset}"
          - "{definitions.description_key_full_implementation}"
        processing_level: major
        description_processing: |-
          From the country-level policy scores, we classified each country-year as not fully implemented when the score is below 1 (no policy, or subnational adoption only), then counted these countries within each region. {definitions.description_regions_processing}
        unit: countries
        short_unit: ""
        display:
          name: No or partial implementation
          numDecimalPlaces: 0
          tolerance: 0
      pop_yes:
        title: |-
          {definitions.status_title} — Full implementation (population)
        description_short: |-
          Total population of countries in the region with full implementation (policy score equal to 1) of: {definitions.status_title}.
        description_key:
          - "{definitions.description_key_dataset}"
          - "{definitions.description_key_full_implementation}"
        processing_level: major
        description_processing: |-
          From the country-level policy scores, we identified countries where the score equals 1 (full national implementation) and summed their populations within each region. {definitions.description_regions_processing}
        unit: people
        short_unit: ""
        display:
          name: Full implementation
          numDecimalPlaces: 0
          tolerance: 0
      pop_no:
        title: |-
          {definitions.status_title} — No or partial implementation (population)
        description_short: |-
          Total population of countries in the region without full implementation (policy score below 1) of: {definitions.status_title}.
        description_key:
          - "{definitions.description_key_dataset}"
          - "{definitions.description_key_full_implementation}"
        processing_level: major
        description_processing: |-
          From the country-level policy scores, we identified countries where the score is below 1 (no policy, or subnational adoption only) and summed their populations within each region. {definitions.description_regions_processing}
        unit: people
        short_unit: ""
        display:
          name: No or partial implementation
          numDecimalPlaces: 0
          tolerance: 0

  lgbti_national_policy_dataset_combined:
    variables:
      age_of_consent:
        title: Age of consent
        description_short: |-
          Whether the minimum age of consent for same-sex sexual activity equals that for different-sex sexual activity.
        description_key:
          - "{definitions.description_key_dataset}"
          - "The indicator is coded as follows: **_Equal_** (age of consent is equal for same-sex and different-sex partners under national law), **_Varies by region_** (rules differ between subnational jurisdictions), **_No legal provisions_** (no national law regulating the age of consent for same-sex and different-sex partners) and **_Unequal_** (age of consent is higher for same-sex than different-sex partners under national law)."
        processing_level: major
        description_processing: "{definitions.derivation_age_of_consent}"
        unit: ""
        short_unit: ""
        display:
          name: Age of consent
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Equal
          - Varies by region
          - No legal provisions
          - Unequal

      marriage:
        title: Marriage equality
        description_short: |-
          Whether same-sex couples can legally marry, whether civil unions or registered partnerships are recognized instead, or whether same-sex marriage is banned.
        description_key:
          - "{definitions.description_key_dataset}"
          - "The indicator is coded as follows: **_Legal_** (marriage equality is fully implemented under national law; civil unions may also exist), **_Civil unions only_** (a national civil union or registered partnership is recognized, but same-sex marriage is not), **_Varies by region_** (marriage equality, the marriage ban, or civil unions are only partially in effect across subnational jurisdictions), **_No legal provisions_** (no national law regulating same-sex marriage or civil unions) and **_Banned_** (marriage equality is banned and the ban is fully implemented, with no civil unions)."
        processing_level: major
        description_processing: "{definitions.derivation_marriage}"
        unit: ""
        short_unit: ""
        display:
          name: Marriage equality
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Legal
          - Civil unions only
          - Varies by region
          - No legal provisions
          - Banned

      lgb_military_join:
        title: LGB military service
        description_short: |-
          Whether lesbian, gay, and bisexual people are allowed to serve in the military, banned from serving, or whether no policy exists.
        description_key:
          - "{definitions.description_key_dataset}"
          - "The indicator is coded as follows: **_Allowed_** (LGB people are allowed to serve in the military), **_No policy_** (no national policy allowing or banning LGB military service), **_Banned but not enforced_** (LGB people are banned from serving but the dataset records the ban as not enforced) and **_Banned_** (LGB people are banned from serving in the military)."
          - "{definitions.derivation_enforcement_refinement}"
        processing_level: major
        description_processing: "{definitions.derivation_lgb_military_join} {definitions.derivation_enforcement_refinement}"
        unit: ""
        short_unit: ""
        display:
          name: LGB military
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Allowed
          - No policy
          - Banned but not enforced
          - Banned

      same_sex_acts:
        title: Same-sex sexual acts
        description_short: |-
          Whether consensual same-sex sexual acts between adults are legal or criminalized under national law.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Legal_** (consensual same-sex sexual acts are legal under national law), **_Varies by region_** (laws differ between subnational jurisdictions), **_No legal provisions_** (no national law specifically addresses consensual same-sex sexual acts), **_Criminalized but not enforced_** (consensual same-sex sexual acts are criminalized under national law but the dataset records the criminalization as not enforced) and **_Criminalized_** (consensual same-sex sexual acts are criminalized under national law).'
          - "{definitions.derivation_enforcement_refinement}"
        unit: ""
        short_unit: ""
        display:
          name: Same-sex sexual acts
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Legal
          - Varies by region
          - No legal provisions
          - Criminalized but not enforced
          - Criminalized
        processing_level: major
        description_processing: '{definitions.derivation_binary_two_direction} {definitions.derivation_enforcement_refinement}'

      blood_donations:
        title: Blood donations by men who have sex with men
        description_short: |-
          Whether men who have sex with men may donate blood without restriction. Any deferral or lifetime ban is coded as a restriction.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_No MSM restrictions_** (men who have sex with men may donate blood without specific restriction), **_No policy_** (no national rule on blood donation by men who have sex with men) and **_Deferral or ban_** (men who have sex with men face a deferral period or a lifetime ban on blood donation).'
        unit: ""
        short_unit: ""
        display:
          name: Blood donations by men who have sex with men
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - No MSM restrictions
          - No policy
          - Deferral or ban
        processing_level: major
        description_processing: '{definitions.derivation_binary_two_direction}'

      transgender_military:
        title: Transgender military service
        description_short: |-
          Whether transgender people may serve openly in the military.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Allowed_** (transgender people may serve openly in the military), **_No policy_** (no national policy allowing or banning transgender military service), **_Banned but not enforced_** (transgender people are banned from serving openly but the dataset records the ban as not enforced) and **_Banned_** (transgender people are banned from serving openly in the military).'
          - "{definitions.derivation_enforcement_refinement}"
        unit: ""
        short_unit: ""
        display:
          name: Transgender military service
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Allowed
          - No policy
          - Banned but not enforced
          - Banned
        processing_level: major
        description_processing: '{definitions.derivation_binary_two_direction} {definitions.derivation_enforcement_refinement}'

      civil_unions:
        title: Civil unions or registered partnerships
        description_short: |-
          Whether same-sex couples have access to a legally recognized partnership (civil union, domestic partnership, or registered partnership).
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Legally recognized_** (same-sex couples have access to a legally recognized partnership distinct from marriage), **_Varies by region_** (recognition differs between subnational jurisdictions) and **_Not recognized_** (no legal recognition of same-sex partnerships at the national level).'
        unit: ""
        short_unit: ""
        display:
          name: Civil unions or registered partnerships
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Legally recognized
          - Varies by region
          - Not recognized
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      joint_adoption:
        title: Joint adoption by same-sex couples
        description_short: |-
          Whether same-sex couples may jointly adopt children.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Allowed_** (same-sex couples may jointly adopt children under national law), **_Varies by region_** (rules differ between subnational jurisdictions) and **_Not allowed_** (national law does not permit joint adoption by same-sex couples).'
        unit: ""
        short_unit: ""
        display:
          name: Joint adoption by same-sex couples
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Allowed
          - Varies by region
          - Not allowed
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      constitutional_protections_sexual_orientation:
        title: Constitutional protections based on sexual orientation
        description_short: |-
          Whether sexual orientation is explicitly named in the constitution or established through binding constitutional court interpretation.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Constitutionally protected_** (sexual orientation is named in the constitution or established as a protected characteristic through binding constitutional court interpretation) and **_Not protected_** (no national constitutional protection for sexual orientation).'
        unit: ""
        short_unit: ""
        display:
          name: Constitutional protections based on sexual orientation
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Constitutionally protected
          - Not protected
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      constitutional_protections_gender_identity:
        title: Constitutional protections based on gender identity
        description_short: |-
          Whether gender identity is explicitly named in the constitution or established through binding constitutional court interpretation.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Constitutionally protected_** (gender identity is named in the constitution or established as a protected characteristic through binding constitutional court interpretation) and **_Not protected_** (no national constitutional protection for gender identity).'
        unit: ""
        short_unit: ""
        display:
          name: Constitutional protections based on gender identity
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Constitutionally protected
          - Not protected
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      hate_crime_protections_sexual_orientation:
        title: Hate crime protections based on sexual orientation
        description_short: |-
          Whether sexual orientation is a protected characteristic in hate crime legislation with enhanced penalties.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Covered by hate crime laws_** (sexual orientation is a protected characteristic in national hate crime legislation that imposes enhanced penalties), **_Varies by region_** (coverage differs between subnational jurisdictions) and **_Not covered_** (sexual orientation is not covered by national hate crime legislation).'
        unit: ""
        short_unit: ""
        display:
          name: Hate crime protections based on sexual orientation
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Covered by hate crime laws
          - Varies by region
          - Not covered
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      hate_crime_protections_gender_identity:
        title: Hate crime protections based on gender identity
        description_short: |-
          Whether gender identity is a protected characteristic in hate crime legislation with enhanced penalties.
        description_key:
          - '{definitions.description_key_dataset}'
          - 'The indicator is coded as follows: **_Covered by hate crime laws_** (gender identity is a protected characteristic in national hate crime legislation that imposes enhanced penalties), **_Varies by region_** (coverage differs between subnational jurisdictions) and **_Not covered_** (gender identity is not covered by national hate crime legislation).'
        unit: ""
        short_unit: ""
        display:
          name: Hate crime protections based on gender identity
          numDecimalPlaces: 0
        type: ordinal
        sort:
          - Covered by hate crime laws
          - Varies by region
          - Not covered
        processing_level: major
        description_processing: '{definitions.derivation_single_direction}'

      incitement_to_hatred:
        title: Incitement to hatred protections
        description_short: |-
          Whether incitement to hatred based on sexual orientation or gender identity is prohibited.
