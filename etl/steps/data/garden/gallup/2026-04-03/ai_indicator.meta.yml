# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    processing_level: minor
    presentation:
      topic_tags:
        - Artificial Intelligence

  # See the Survey Methods sections in Gallup's workplace articles for more detail: https://www.gallup.com/workplace/691643/work-nearly-doubled-two-years.aspx.
  description_key_methodology: &methodology
    - Based on online surveys of adults aged 18 and older who work full time or part time for organizations in the United States.
    - Gallup surveys members of its panel using a sampling method designed to give people in the target population a known chance of being selected, rather than relying only on volunteers who choose to take part.
    - Responses are weighted to reflect the U.S. employed adult population by gender, age, race, ethnicity, education, and region.
    - Each survey round covered around 19,000 to 23,000 employed U.S. adults.
dataset:
  update_period_days: 90

tables:
  ai_indicator:
    variables:
      daily_ai_users:
        title: Share of U.S. employees who use AI at work daily
        unit: "%"
        short_unit: "%"
        description_short: The share of U.S. employees who say they use artificial intelligence at work every day.
        description_key:
          - This indicator measures daily use of artificial intelligence at work.
          - *methodology
        display:
          numDecimalPlaces: 0
          name: Daily AI users

      frequent_ai_users:
        title: Share of U.S. employees who use AI at work a few times a week or more
        unit: "%"
        short_unit: "%"
        description_short: The share of U.S. employees who say they use artificial intelligence at work a few times a week or more.
        description_key:
          - Gallup defines frequent users as employees who say they use artificial intelligence at work a few times a week or more.
          - *methodology
        display:
          numDecimalPlaces: 0
          name: Weekly AI users

      total_ai_users:
        title: Share of U.S. employees who use AI at work a few times a year or more
        unit: "%"
        short_unit: "%"
        description_short: The share of U.S. employees who say they use artificial intelligence at work a few times a year or more.
        description_key:
          - Gallup defines total users as employees who say they use artificial intelligence at work daily, a few times a week, a few times a month, or a few times a year.
          - *methodology
        display:
          numDecimalPlaces: 0
          name: Total users