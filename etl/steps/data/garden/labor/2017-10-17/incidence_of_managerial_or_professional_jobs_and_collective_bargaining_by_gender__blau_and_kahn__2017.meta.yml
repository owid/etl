dataset:
  title: Incidence of managerial or professional jobs and collective-bargaining by gender - Blau and Kahn (2017)
tables:
  incidence_of_managerial_or_professional_jobs_and_collective_bargaining_by_gender__blau_and_kahn__2017:
    variables:
      gap_between_men_and_women_in_male_professional_jobs__blau_and_kahn__2017:
        title: Gap between men and women in "male" professional jobs (Blau and Kahn (2017))
        unit: '%'
        description: |-
          This variable is calculated as % men minus % women in managerial jobs. The sample – from PSID PSID (Michigan Panel Study of Income Dynamics) – includes full time non-farm wage and salary workers ages 25–64 with at least twenty-six weeks of employment. “Male” professional jobs are professional jobs excluding nurses and K–12, and other non-college teachers.
      gap_between_men_and_women_in_collective_bargaining_coverage__blau_and_kahn__2017:
        title: Gap between men and women in collective-bargaining coverage (Blau and Kahn (2017))
        unit: ''
        description: |-
          This variable is calculated as % men minus % women in collective-bargaining coverage. The sample – from PSID PSID (Michigan Panel Study of Income Dynamics) – includes full time non-farm wage and salary workers ages 25–64 with at least twenty-six weeks of employment.
      gap_between_men_and_women_in_managerial_jobs__blau_and_kahn__2017:
        title: Gap between men and women in managerial jobs (Blau and Kahn (2017))
        unit: '%'
        description: |-
          This variable is calculated as % men minus % women in managerial jobs. The sample – from PSID PSID (Michigan Panel Study of Income Dynamics) – includes full time non-farm wage and salary workers ages 25–64 with at least twenty-six weeks of employment.
      gap_between_men_and_women_in_professional_jobs__blau_and_kahn__2017:
        title: Gap between men and women in professional jobs (Blau and Kahn (2017))
        unit: '%'
        description: |-
          This variable is calculated as % men minus % women in professional jobs. The sample – from PSID PSID (Michigan Panel Study of Income Dynamics) – includes full time non-farm wage and salary workers ages 25–64 with at least twenty-six weeks of employment.
