    variables:
      gender_wage_gap__oecd_2017:
        title: Gender wage gap (OECD 2017)
        unit: '%'
        description: |-
          The gender wage gap is unadjusted and is defined as the difference between median earnings of men and women relative to median earnings of men. Data refer to full-time employees and to self-employed.
