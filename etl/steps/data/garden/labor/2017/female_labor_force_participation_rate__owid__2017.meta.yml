        unit: '%'
        short_unit: '%'
        description: |-
          Proportion of the female population ages 15 and over that is economically active. Estimates combine various sources. For some observations before 1960, the participation rate is taken with respect to the female population 14 and over. (See complete source for more details). Data is available for OECD member countries, as well as for non-member countries publishing statistics in OECD.stats.
