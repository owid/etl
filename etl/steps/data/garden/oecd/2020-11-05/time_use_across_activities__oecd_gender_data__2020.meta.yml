        unit: ''
        description: |-
          Average minutes spent on unpaid work out of 24 hours (1440 minutes) for individuals in the population aged 15-64. Average minutes spent in different activities includes both weekdays and weekends.

          Includes routine housework, shopping, care for household members, child care, adult care, care for non-household members, volunteering, travel related to household activities, other unpaid work.
      minutes_spent_on_unpaid_work__women__oecd_gender_data__2020:
        title: Minutes spent on unpaid work - women (OECD Gender data (2020))
        unit: ''
        description: |-
          Average minutes women spent on unpaid work out of 24 hours (1440 minutes). Average minutes spent in different activities includes both weekdays and weekends.

          Includes routine housework, shopping, care for household members, child care, adult care, care for non-household members, volunteering, travel related to household activities, other unpaid work.
