dataset:
  title: Educational attainment – long-run estimates
  description: |-
    Long-run educational attainment indicators combining recent observed data with Lee & Lee (2016) historical estimates.

tables:
  education_attainment_distribution:
    variables:
      share_tertiary_education:
        title: Share of adults with tertiary education
        unit: "%"
        short_unit: "%"
        description_short: Share of adults aged 25-64 who have attained tertiary education (ISCED 5-8).
        description_key:
          - This data combines two sources. Recent data for OECD countries comes from the OECD's Education at a Glance, based on national labour force surveys. Historical estimates come from Lee & Lee (2016), based on census and survey data.
          - For each OECD country, OECD data is used from its earliest available year (as early as 1981, with annual frequency). Lee & Lee estimates fill in the earlier period (at 5-year intervals, from as early as 1870).
          - For countries not covered by the OECD, only the Lee & Lee series is available, ending in 2010.
          - Tertiary education covers ISCED levels 5 through 8, including short-cycle tertiary programs, bachelor's, master's, and doctoral degrees.
          - The OECD measures completed tertiary education, while Lee & Lee measures attainment of tertiary education (partial or completed). The two are broadly comparable, though they may diverge for countries where many people start but do not complete a degree.
          - The age group covered is 25 to 64 years old, for both sexes combined.
        description_processing: |-
          For each country, we use OECD data from its earliest available year onward. For years before the first OECD observation, we use the Lee & Lee (2016) historical estimates. Countries without any OECD data retain the full Lee & Lee series up to 2010. The Barro & Lee projections (2015-2040) previously used have been dropped because they significantly underestimated tertiary attainment in many countries compared to observed data.
        presentation:
          grapher_config:
            hasMapTab: true
            tab: map
            note: For OECD countries, recent data is based on observed OECD survey data. For all other countries, the series ends in 2010 with Lee & Lee historical estimates.

      average_years_of_schooling:
        title: Average years of schooling
        unit: years
        description_short: Average number of years of schooling received by adults, combining UNDP and Lee & Lee historical estimates.
        description_key:
          - This data combines two sources. Recent data comes from the UNDP Human Development Report (1990 onward, annual), which measures mean years of schooling for adults aged 25 and older. Historical estimates come from Lee & Lee (2016), measuring average years of education for the 15-64 age group.
          - For each country, UNDP data is used from its earliest available year. Lee & Lee estimates fill in the earlier period (at 5-year intervals, from as early as 1870).
          - The UNDP covers the 25+ age group, while Lee & Lee covers 15-64. The two overlap broadly but may differ at the margins because they weight younger and older cohorts differently.
        description_processing: |-
          For each country, we use UNDP data from its earliest available year (typically 1990) onward. For years before that, we use Lee & Lee (2016) historical estimates. The Barro & Lee projections (2015-2040) previously used have been dropped.
        presentation:
          grapher_config:
            hasMapTab: true
            tab: map
            note: Recent data is from the UNDP Human Development Report (ages 25+). Historical data is from Lee & Lee (ages 15-64).
