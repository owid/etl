dataset:
  title: A Millennium of Macroeconomic Data - Bank of England (2016)
tables:
  a_millennium_of_macroeconomic_data__bank_of_england__2016:
    variables:
      dollar_oil_prices:
        title: $ Oil prices
        unit: $ per barrel
      dollar_ps_exchange_rate:
        title: $/£ exchange rate
        unit: Calendar year average
      _10_year_medium_term_government_bond_yields:
        title: 10 year/medium-term government bond yields
        unit: '%, calendar year average'
      average_weekly_hours_worked:
        title: Average weekly hours worked
        unit: hours
      bank_rate__pct_calendar_year_average:
        title: Bank Rate (% calendar year average)
        unit: '% calendar year average'
      bank_rate__pct_end_period:
        title: Bank Rate (% end period)
        unit: '% end period'
      bank_of_england_balance_sheet__using_consolidated_balance_sheet:
        title: Bank of England Balance sheet, using consolidated balance sheet
        unit: '% of nominal GDP'
        description: Using consolidated balance sheet and GB+NI nominal GDP
      bank_of_england_balance_sheet__using_unconsolidated_balance_sheet:
        title: Bank of England Balance sheet, using unconsolidated balance sheet
        unit: '% of nominal GDP'
        description: Using unconsolidated balance sheet and GB+NI nominal GDP
      broad_money:
        title: Broad Money
        unit: Year end, £
        description: Spliced break-adjusted broad money measure based on M3/M4/M4x
      capital_services__whole_economy:
        title: Capital Services, whole economy
        unit: 2013 prices
      central_government_gross_debt__market_value:
        title: Central Government Gross Debt (market value)
        unit: Financial year end, market value £
        description: Includes estimated capital value of terminable annuities
      central_government_gross_debt__nominal_par_value:
        title: Central Government Gross Debt (nominal par value)
        unit: Financial year end, nominal par value £
        description: Includes estimated capital value of terminable annuities
      coin_in_circulation_outside_the_bank_of_england:
        title: Coin in circulation outside the Bank of England
        unit: Year end, £
