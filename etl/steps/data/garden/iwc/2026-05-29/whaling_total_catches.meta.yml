# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      topic_tags:
        - Biodiversity
        - Fish & Overfishing
    unit: whales
    short_unit: ""
    processing_level: minor
    description_from_producer: |-
      - The year is the "defined catch year," usually the year in which all catches were taken. For Antarctic operations it is defined as the start of the season (e.g. for the 1985/86 Antarctic Season the year is 1985).
      - The country is the country of the operating company.
      - All numbers include lost whales (whales that were injured or killed but then lost at sea).
  catch_types: &catch_types
    - "*Commercial* catches are those taken for commercial purposes, including those taken under objection or reservation."
    - "*Aboriginal substinence* catches are those taken by indigenous peoples for subsistence. This means the meat and other products from the whales are used for food, shelter, clothing, and tools, and are not sold or traded."
    - "*Illegal* catches are those taken in violation of IWC regulations, such as by non-member countries or in protected areas."
    - "*Special permit* catches are those taken under a special permit issued by the IWC for scientific research or other purposes."
    - "*Commercial under objection* catches are those taken by countries that have lodged an objection to the moratorium on commercial whaling, but are still subject to IWC regulations."
    - "*Commercial under reservation* catches are those taken by countries that have lodged a reservation to the moratorium on commercial whaling, but are still subject to IWC regulations."
    - "*No catch* indicates that no whales were caught."


