dataset:
  title: Global wildlife trade (Harfoot et al. 2018)
tables:
  global_wildlife_trade__harfoot_et_al__2018:
    variables:
      captive_exported_organisms:
        title: Captive exported organisms
        unit: whole organism equivalents (WOE)
        display:
          name: Wildlife exports of captive species
        description: |-
          Wildlife trade is quantified in terms of whole organism equivalents (WOE). For example, five skulls represent five WOEs, whereas it's assumed that four ears are sourced from two animals and so represent two WOEs.
      captive_imported_organisms:
        title: Captive imported organisms
        unit: whole organism equivalents (WOE)
        display:
