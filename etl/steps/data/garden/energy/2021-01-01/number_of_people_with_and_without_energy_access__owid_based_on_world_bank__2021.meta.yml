dataset:
  title: Number of people with and without energy access (OWID based on World Bank, 2021)
tables:
  number_of_people_with_and_without_energy_access__owid_based_on_world_bank__2021:
    variables:
      number_of_people_with_access_to_electricity:
        title: Number of people with access to electricity
        unit: people with electricity
        display:
          name: Number of people with access to electricity
          numDecimalPlaces: 0
        description: |-
          The absolute number of people globally, regionally or in a country with access to electricity. This is calculated based on the share of the population with access to electricity and total population estimates.
      number_of_people_without_access_to_electricity:
        title: Number of people without access to electricity
        unit: people without electricity access
        display:
          name: Number of people without access to electricity
          numDecimalPlaces: 0
        description: |-
          The absolute number of people globally, regionally or in a country without access to electricity. This is calculated based on the share of the population with access to electricity and total population estimates.
      number_with_clean_fuels_cooking:
        title: number_with_clean_fuels_cooking
        unit: people
        display:
          name: Number of people with clean fuels for cooking and heating
          numDecimalPlaces: 0
        description: The absolute number of people with access to clean fuels for cooking and heating.
      number_without_clean_fuels_cooking:
        title: number_without_clean_fuels_cooking
        unit: people
        display:
          name: Number of people without clean fuels for cooking and heating
          numDecimalPlaces: 0
        description: The absolute number of people without access to clean fuels for cooking and heating.
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
