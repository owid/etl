definitions:
  common:
    processing_level: major
    presentation:
      topic_tags:
        - Energy
  # Short description for fossil fuels.
  description_short_twh: &description_short_twh |-
    Measured in [terawatt-hours](#dod:watt-hours).
  # Short description for non-fossil sources in terms of direct primary energy.
  description_short_twh_direct: &description_short_twh_direct |-
    Measured in [terawatt-hours](#dod:watt-hours) of direct [primary energy](#dod:primaryenergy).
  # Short description for non-fossil sources in terms of primary energy using the substitution method.
  description_short_twh_equivalent: &description_short_twh_equivalent |-
    Measured in [terawatt-hours](#dod:watt-hours), using the [substitution method](#dod:substitutionmethod).
  # Short description for any sources in terms of direct primary energy.
  description_short_pct_direct: &description_short_pct_direct |-
    Measured as a percentage of the total (direct) [primary energy](#dod:primaryenergy).
  # Short description for any sources in terms of primary energy using the substitution method.
  description_short_pct_equivalent: &description_short_pct_equivalent |-
    Measured as a percentage of the total [primary energy](#dod:primaryenergy), using the [substitution method](#dod:substitutionmethod).
  # Short description for all per capita variables.
  description_short_per_capita: &description_short_per_capita |-
    Measured in [kilowatt-hours](#dod:watt-hours) per person.
  # Key description item for any sources used for electricity generation.
  description_key_gross_generation: &description_key_gross_generation |-
    Figures are based on gross generation and do not account for cross-border electricity supply.
  # Key description item for non-fossil sources in terms of direct primary energy.
  description_key_primary_energy_direct: &description_key_primary_energy_direct |-
    Direct [primary energy](#dod:primaryenergy) of non-fossil electricity sources corresponds to electricity generation.
  # Key description item for any sources in terms of primary energy using the substitution method.
  description_key_primary_energy_equivalent: &description_key_primary_energy_equivalent |-
    Primary energy is measured using the "substitution method" (also called "input-equivalent" primary energy). This method is used for non-fossil sources of electricity (namely renewables and nuclear), and measures the amount of fossil fuels that would be required by thermal power stations to generate the same amount of non-fossil electricity.
    For example, if a country's nuclear power generated 100 TWh of electricity, and assuming that the efficiency of a standard thermal power plant is 38%, the input-equivalent primary energy for this country would be 100 TWh / 0.38 = 263 TWh = 0.95 EJ. This input-equivalent primary energy takes account of the inefficiencies in energy production from fossil fuels and provides a better approximation of each source's share of energy consumption. You can find more details in [the Statistical Review of World Energy's methodology document](https://www.energyinst.org/__data/assets/pdf_file/0003/1055541/Methodology.pdf).
  # Key description item for biofuels.
  description_key_biofuels: &description_key_biofuels |-
    Includes biogasoline (such as ethanol) and biodiesel. Volumes have been adjusted for energy content.
  # Processing description for all quantities measuring annual change.
  description_processing_annual_change: &description_processing_annual_change |-
    The annual change in energy consumption by source is calculated as the difference with respect to the previous year.
  # Processing description for all per capita quantities.
  description_processing_per_capita: &description_processing_per_capita |-
    Per capita figures are calculated by dividing by a population dataset that is built and maintained by Our World in Data, based on [different sources](https://ourworldindata.org/population-sources).
  # Title variant for non-fossil sources in terms of direct primary energy.
  title_variant_direct: &title_variant_direct |-
    In terms of direct primary energy
  # Title variant for non-fossil sources in terms of primary energy using the substitution method.
  title_variant_equivalent: &title_variant_equivalent |-
    Using the substitution method

