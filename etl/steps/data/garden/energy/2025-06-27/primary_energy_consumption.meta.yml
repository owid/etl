                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                legendDescription: Energy use per capita (kg oil equivalent)
              timeTolerance: 3
      source:
        title: Source of data
        short_unit: ""
        unit: ""
