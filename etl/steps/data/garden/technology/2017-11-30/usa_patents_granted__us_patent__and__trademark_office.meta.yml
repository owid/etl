dataset:
  title: USA patents granted - US Patent & Trademark Office
tables:
  usa_patents_granted__us_patent__and__trademark_office:
    variables:
      chemical:
        title: Chemical
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: '''Chemical'' patents include agriculture, food, textiles, coatings, gas, organic compounds, and resins.'
      computers__and__communications:
        title: Computers & Communications
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: |-
          'Computers & communications' include communications, computer hardware and software, peripherals, information storage, electronic business methods, and software.
      electronics:
        title: Electronics
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: |-
          'Electrical & electronics' includes electrical devices, lighting, measuring, testing, nuclear, x-rays, power systems, and semiconductors.
      mechanical:
        title: Mechanical
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: '''Mechanical'' includes materials processing & handling, metalworking, motors, engines, parts, optics,
          and transportation.'
      medical:
        title: Medical
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: '''Medical'' includes drugs, surgery, medical instruments, and biotechnology.'
      other:
        title: Other
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: |-
          'Others' includes agriculture, farming, food, amusement devices, apparel & textile, earth working & wells, furniture, house fixtures, heating, pipes & joints, and receptacles.
      total_patents_granted:
        title: Total patents granted
        unit: patents granted
        display:
          numDecimalPlaces: 0
        description: |-
          Total patents granted from 1790-1839, as well as 2015, based on the US Patent and Trademark Office's reported "Utility Patents" which refers to "patents for inventions." Available at: https://www.uspto.gov/web/offices/ac/ido/oeip/taf/h_counts.htm
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
