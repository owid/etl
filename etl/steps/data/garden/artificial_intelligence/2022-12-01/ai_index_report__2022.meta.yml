      total_corporate_investment:
        title: total_corporate_investment
        unit: current US$
        short_unit: $
        description: |-
          According to the AI Index: "NetBase Quid... aggregates over 6 million global public and private company profiles, updated on a weekly basis, including metadata on investments, location of headquarters, and more. NetBase Quid also applies natural language processing technology to search, analyze, and identify patterns in large, unstructured datasets, like aggregated blogs, company and patent databases."
      total_corporate_investment_by_activity:
        title: total_corporate_investment_by_activity
        unit: current US$
        short_unit: $
        display:
          numDecimalPlaces: 0
        description: |-
          According to the AI Index: "NetBase Quid... aggregates over 6 million global public and private company profiles, updated on a weekly basis, including metadata on investments, location of headquarters, and more. NetBase Quid also applies natural language processing technology to search, analyze, and identify patterns in large, unstructured datasets, like aggregated blogs, company and patent databases."

          Merger/acquisition: refers to a buyer acquiring more than 50% of the existing ownership stake in entities, asset product, and business divisions.

          Private investment: a private placement is a private sale of newly issued securities (equity or debt) by a company to a selected investor or a selected group of investors. The stakes that buyers take in private placements are often minority stakes (under 50%), although it is possible to take control of a company through a private placement as well, in which case the private placement would be a majority stake investment.

          Minority stake: These refer to minority stake acquisitions in Quid, which take place when the buyer acquires less than 50% of the existing ownership stake in entities, asset product, and business divisions.
      total_corporate_investment_by_activity_inflation_adjusted:
        title: total_corporate_investment_by_activity_inflation_adjusted
        unit: constant 2021 US$
        short_unit: $
        description: |-
          We have adjusted this data for inflation using the US Consumer Price Index (CPI).

          Reporting a time series of AI investments in nominal prices (i.e., without adjusting for inflation) means it makes little sense to compare observations across time; it is therefore not very useful. To make comparisons across time possible, one has to take into account that prices change (e.g., there is inflation).

          It is not obvious how to adjust this time series for inflation, and we debated it at some length within our team.

          It would be straightforward to adjust the time series for price changes if we knew the prices of the specific goods and services that these investments purchased. This would make it possible to calculate a volume measure of AI investments, and it would tell us how much these investments bought. But such a metric is not available.

          (While a comprehensive price index is not available, we know that the cost for some crucial AI technology has fallen rapidly in price. For example, it has become much cheaper to <a href="https://ourworldindata.org/grapher/imagenet-training-cost" target=”_blank”>train an AI system</a>.)

          In the absence of a comprehensive price index that captures the price of AI-specific goods and services, one has to rely on one of the available metrics for the price of a bundle of goods and services. In the end we decided to use the US Consumer Price Index (CPI).

          The US CPI does not provide us with a volume measure of AI goods and services, but it does capture the opportunity costs of these investments. The inflation adjustment of this time series of AI investments therefore lets us understand the size of these investments relative to whatever else these sums of money could have purchased.

          According to the AI Index: "NetBase Quid... aggregates over 6 million global public and private company profiles, updated on a weekly basis, including metadata on investments, location of headquarters, and more. NetBase Quid also applies natural language processing technology to search, analyze, and identify patterns in large, unstructured datasets, like aggregated blogs, company and patent databases."

          Merger/acquisition: refers to a buyer acquiring more than 50% of the existing ownership stake in entities, asset product, and business divisions.

          Private investment: a private placement is a private sale of newly issued securities (equity or debt) by a company to a selected investor or a selected group of investors. The stakes that buyers take in private placements are often minority stakes (under 50%), although it is possible to take control of a company through a private placement as well, in which case the private placement would be a majority stake investment.

          Minority stake: These refer to minority stake acquisitions in Quid, which take place when the buyer acquires less than 50% of the existing ownership stake in entities, asset product, and business divisions.
