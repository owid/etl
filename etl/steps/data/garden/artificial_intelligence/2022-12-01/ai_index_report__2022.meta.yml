dataset:
  title: AI Index Report (2022)
tables:
  ai_index_report__2022:
    variables:
      ai_job_postings:
        title: ai_job_postings
        unit: '%'
        short_unit: '%'
        display:
          conversionFactor: 100
        description: |-
          According to the AI Index: "Emsi Burning Glass delivers job market analytics that empower employers, workers, and educators to make data-driven decisions. The company’s artificial intelligence technology analyzes hundreds of millions of job postings and real-life career transitions to provide insight into labor market patterns."
      casp_median_accuracy_gdt_ts:
        title: casp_median_accuracy_gdt_ts
        unit: ''
        description: |-
          This data is from the 2021 AI Index Report. It was extracted from Figure 2.7.3 using <a href="https://apps.automeris.io/wpd/" target=”_blank”>WebPlotDigitizer</a>.
      conference_attendance:
        title: conference_attendance
        unit: ''
        display:
          numDecimalPlaces: 0
        description: |-
          The 16 major conferences included are:
          • International Conference on Machine Learning (ICML)
          • Conference and Workshop on Neural Information Processing Systems (NeurIPS)
          • IEEE Conference on Computer Vision and Pattern Recognition (CVPR)
          • International Conference on Learning Representations (ICLR)
          • International Conference on Computer Vision (ICCV)
          • Association for the Advancement of Artificial Intelligence (AAAI)
          • Conference on Empirical Methods in Natural Language Processing (EMNLP)
          • International Conference on Intelligent Robots and Systems (IROS)
          • Conference on Uncertainty in Artificial Intelligence (UAI)
          • International Joint Conference on Artificial Intelligence (IJCAI)
          • ACM Conference on Fairness, Accountability, and Transparency (ACM FAccT)
          • International Conference on Autonomous Agents and Multi-agent Systems (AAMAS)
          • International Conference on Robotics and Automation (ICRA)
          • International Conference on Principles of Knowledge Representation and Reasoning (KR)
          • International Conference on Automated Planning and Scheduling (ICAPS)
          • Annual Meeting of the Association for Computational Linguistics (ACL)
      growth_ai_hiring:
        title: growth_ai_hiring
        unit: ''
        description: |-
          The overall hiring rate is the number of LinkedIn members who added a new employer in the same period the job began, divided by the total number of LinkedIn members in the corresponding location.

          The hiring rate for AI jobs is the number of LinkedIn members with AI skills on their profile or working in AI-related occupations who added a new employer in the same period the job began, divided by the total number of LinkedIn members in the corresponding location.
      growth_ai_hiring_smoothed:
        title: growth_ai_hiring_smoothed
        unit: ''
        display:
          yearIsDay: true
          zeroDay: '2020-01-01'
        description: |-
          The overall hiring rate is the number of LinkedIn members who added a new employer in the same period the job began, divided by the total number of LinkedIn members in the corresponding location.

          The hiring rate for AI jobs is the number of LinkedIn members with AI skills on their profile or working in AI-related occupations who added a new employer in the same period the job began, divided by the total number of LinkedIn members in the corresponding location.
      imagenet_extra_training_data:
        title: imagenet_extra_training_data
        unit: ''
      imagenet_training_cost_usd:
        title: imagenet_training_cost_usd
        unit: current US$
        short_unit: $
        description: |-
          Top-5 accuracy measures how often any one of the system's five most probable labels (out of 1000 possible labels) matches the target label.

          Additional source information according to the AI Index: "DAWNBench is a benchmark suite for end-to-end deep-learning training and inference. DAWNBench provides a reference set of common deep learning workloads for quantifying training time, training cost, inference latency, and inference cost across different optimization strategies, model architectures, software frameworks, clouds, and hardware. More details available at <a href="https://dawn.cs.stanford.edu/" target=”_blank”>DAWNBench</a>. Because DAWNBench was deprecated after March 2020, data on the training cost for the most recent round of... submissions was manually collected by Deepak Narayanan."
