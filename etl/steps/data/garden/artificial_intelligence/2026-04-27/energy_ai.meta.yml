definitions:
  common:
    processing_level: minor
    presentation:
      topic_tags:
        - Artificial Intelligence
        - Energy
  base_case: &base_case
    - The Base Case looks at how electricity use in data centers is expected to change if today's regulations stay the same and the industry develops as currently projected.
    - In the short term, the main factor shaping this outlook is industry forecasts for server shipments up to 2028, with similar trends assumed to continue beyond that point.
    - Improvements in energy efficiency are expected to play a key role in keeping electricity use from rising too quickly, even as demand for digital services continues to grow.
  data_centers_description: &data_centers_description
    - It covers total data-center electricity use (including cooling and other support systems), across both general-purpose and AI-specialized servers.
  eurasia_note: &eurasia_note
    - The IEA does not publish a regional aggregate for Eurasia, which includes Russia.

# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 365

tables:
  energy_ai:
    variables:
      total_electricity_consumption__twh__historical:
        title: Total electricity consumption by data centers
        unit: terawatt-hours
        short_unit: TWh
        description_short: Electricity consumption by data centers, measured in [terawatt-hours](#dod:watt-hours). Data centers run the full spectrum of internet services from shopping to streaming, not solely AI. The exact split between AI and other uses is not available.
        description_key:
          - *data_centers_description
          - *eurasia_note
        display:
          numDecimalPlaces: 0

      total_installed_capacity__gw__historical:
        title: Total installed capacity for data centers
        unit: gigawatts
        short_unit: GW
        description_short: Total installed power capacity of data centers worldwide and by region.
        description_key:
          - *data_centers_description
          - *eurasia_note
        display:
          numDecimalPlaces: 1

      total_electricity_consumption__share_of_total_electricity_demand__historical:
        title: Share of total electricity demand coming from data centers
        unit: "%"
        short_unit: "%"
        processing_level: major
        description_short: Data center electricity consumption as a share of total electricity demand of the country or region. Data centers power a wide range of online services beyond AI, such as streaming services and cloud storage. The data does not allow a separate estimate for AI use.
        description_key:
          - This indicator shows what share of a country’s or region’s total electricity demand comes from data centers.
          - *data_centers_description
          - *eurasia_note
        description_processing: |-
          We combine two sources: data center electricity consumption from the IEA (the numerator) and total electricity demand from [Ember](https://ember-energy.org/data/electricity-data-explorer/?tab=main&chart=trend&data=demand&fuel=total) (the denominator).

          For each region, we build the denominator by summing Ember's electricity demand across the IEA member countries in that region. For the global estimate, we use Ember's world total directly rather than summing across the IEA's regional aggregates. The IEA does not publish a Eurasia aggregate in this dataset, and Eurasia includes Russia — one of the world's largest electricity consumers — so summing across the IEA regions would exclude Eurasia entirely and undercount global electricity demand.

          This produces a global share of approximately 1.5% in 2025, consistent with the IEA's own reporting.
        display:
          numDecimalPlaces: 1

      total_installed_capacity__gw__base:
        title: Projected total installed capacity for data centers
        unit: gigawatts
        short_unit: GW
        description_short: Projected total installed power capacity of data centers in 2030 under the IEA's base scenario, measured in [gigawatts](#dod:watt).
        description_key:
          - *data_centers_description
          - *eurasia_note
          - *base_case
        display:
          numDecimalPlaces: 1
          isProjection: True

      total_electricity_consumption__twh__base:
        title: Projected total electricity consumption by data centers
        unit: terawatt-hours
        short_unit: TWh
        description_short: Projected electricity consumption by data centers in 2030 under the IEA's base scenario, measured in [terawatt-hours](#dod:watt-hours).
        description_key:
          - *data_centers_description
          - *eurasia_note
          - *base_case
        display:
          numDecimalPlaces: 0
          isProjection: True

