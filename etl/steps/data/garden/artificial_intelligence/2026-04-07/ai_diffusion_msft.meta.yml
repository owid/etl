tables:
  ai_diffusion_msft:
    variables:
      ai_user_share:
        title: Share of working-age population using selected generative AI tools
        unit: "%"
        short_unit: "%"
        description_short: Estimated share of the working-age population (aged 15–64) who used a [generative AI](#dod:generative-ai) tool, such as ChatGPT or Gemini, in the second half of 2025.
        description_key:
          # Source: Section 2, p. 2; Section 2.1, p. 2–3; Appendix A, p. 14 | AI-Usage-Technical-Report.pdf
          - This is a modelled estimate, not survey data. It estimates the share of the working-age population (aged 15–64) who visited any of 19 selected AI websites and apps, based on anonymized data collected by Microsoft software and services.

          # Source: Section 2.2, p. 3–5; Section 2.1, p. 3 | AI-Usage-Technical-Report.pdf
          - The estimates start from Microsoft's data on visits to AI websites and apps on Windows desktops and tablets. They are then adjusted to account for device access, mobile use, and differences in how many users share data with Microsoft.

          # Source: Section 2.1, p. 2–3 | AI-Usage-Technical-Report.pdf
          - Only users with at least 90 minutes of usage time in a given month are included, to filter out very infrequent users.

          # Source: Section 2.2, p. 4–5 | AI-Usage-Technical-Report.pdf
          - These adjustments rely on assumptions about device access, mobile use, and how much overlap there is between people who use AI on desktop and mobile.

          # Source: Section 2.1, p. 3 | AI-Usage-Technical-Report.pdf
          - In countries where fewer users share data with Microsoft, estimates are partly blended with the global average. This makes the results more stable but less country-specific.

          # Source: Section 2.4, p. 5; Table 2, p. 14–18 | AI-Usage-Technical-Report.pdf
          - Some countries do not have enough data for a country-specific estimate and are assigned a regional average instead. This is why some countries share identical values.

          # Source: Data Coverage Disclaimer, p. 5 | AI-Usage-Technical-Report.pdf
          - Coverage is limited in some countries. Estimates for Russia, Iran, and parts of China should be treated with extra caution.

          # Source: Appendix A, p. 14 | AI-Usage-Technical-Report.pdf
          - This indicator captures visits to selected AI websites and apps only. It does not include AI features built into other software, such as productivity tools or enterprise systems.
        display:
          numDecimalPlaces: 1
          name: Share of working-age population using selected generative AI tools
        presentation:
          title_public: Estimated share of working-age population using selected generative AI tools