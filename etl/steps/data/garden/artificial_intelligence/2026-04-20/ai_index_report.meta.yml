# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      topic_tags:
        - Artificial Intelligence


  note_inflation: &note_inflation |-
    This data is expressed in constant 2021 US$. Inflation adjustment is based on the US Consumer Price Index (CPI).

  desc_processing_inflation: &desc_processing_inflation |-
    - Reporting a time series of AI investments in nominal prices would make it difficult to compare observations across time. To make these comparisons possible, one has to take into account that prices change (inflation).
    - It is not obvious how to adjust this time series for inflation, and our team discussed the best solutions at our disposal.
    - It would be straightforward to adjust the time series for price changes if we knew the prices of the specific goods and services purchased through these investments. This would make it possible to calculate a volume measure of AI investments and tell us how much these investments bought. But such a metric is not available. While a comprehensive price index is not available, we know that the cost of some crucial AI technology has fallen rapidly in price.
    - In the absence of a comprehensive price index that captures the price of AI-specific goods and services, one has to rely on one of the available metrics for the price of a bundle of goods and services. Ultimately, we decided to use the US Consumer Price Index (CPI).
    - The US CPI does not provide us with a volume measure of AI goods and services, but it does capture the opportunity costs of these investments. The inflation adjustment of this time series of AI investments, therefore, lets us understand the size of these investments relative to whatever else these sums of money could have purchased.

  desc_short_generative: &desc_short_generative |-
    Money put into privately held [generative](#dod:generative-ai) AI companies by private investors. This excludes publicly traded companies (e.g., public Big Tech companies) and companies’ own internal spending, such as R&D, wages, or infrastructure. Expressed in US dollars, adjusted for inflation.
  desc_short_private: &desc_short_private |-
    Money put into privately held AI companies that raised more than $1.5 million from private investors. This excludes publicly traded companies (e.g., public Big Tech companies) and companies’ own internal spending, such as R&D or infrastructure. Expressed in US dollars, adjusted for inflation.
  desc_short_corporate: &desc_short_corporate |-
    Annual corporate-finance transactions involving privately held AI companies, broken down by type. This excludes publicly traded companies (e.g., Big Tech companies) and companies’ internal spending, such as R&D or infrastructure. Expressed in US dollars, adjusted for inflation.


  desc_key_corporate: &desc_key_corporate
  - This data focuses on transactions involving privately held AI companies,.
  - It does not include internal corporate R&D, capital expenditure (CapEx), or public-sector funding. Publicly traded companies, including large tech firms, are excluded.
  - Because this data covers only one form of financing, it underestimates total global spending on AI.
  - Large single deals can cause spikes in specific years. Broader economic conditions (interest rates, investor sentiment) can also drive changes that are not specific to AI.
  - |-
    This data includes four types of corporate deals:
      - A merger is a corporate strategy involving two companies joining together to form a new company. An acquisition is a corporate strategy involving one company buying another company.
      - Private investment is defined as investment in AI companies of more than $1.5 million (in current US dollars).
      - A public offering is the sale of equity shares or other financial instruments to the public in order to raise capital.
      - A minority stake is an ownership interest of less than 50% of the total shares of a company.

  desc_key_private: &desc_key_private
    - This data focuses on external private-market investment, such as venture-capital and private-equity deals.
    - It does not include internal corporate R&D, capital expenditure (CapEx), or public-sector funding. Publicly traded companies, including large tech firms, are excluded.
    - Because this data covers only one form of financing, it underestimates total global spending on AI.
    - Large single deals can cause spikes in specific years. Broader economic conditions (interest rates, investor sentiment) can also drive changes that are not specific to AI.
    - AI firms are identified by the source based on keywords and industry tags; some misclassification is possible.

  desc_key_generative: &desc_key_generative
    - This data focuses on external private-market investment, such as venture-capital and private-equity deals.
    - It does not include internal corporate R&D, capital expenditure (CapEx), or public-sector funding. Publicly traded companies, including large tech firms, are excluded.
    - Because this data covers only one form of financing, it underestimates total global spending on AI.
    - Large single deals can cause spikes in specific years. Broader economic conditions (interest rates, investor sentiment) can also drive changes that are not specific to AI.
    - Generative AI firms are identified by the source based on keywords and industry tags; some misclassification is possible.

  description_short_industrial: &desc_industrial Industrial robots are defined by the source as automatically controlled, reprogrammable, and multipurpose machines that can move in three or more directions and perform a variety of tasks in industrial settings.
  description_short_professional: &desc_professional Professional service robots are semi- or fully autonomous machines that perform useful tasks in a professional setting outside of industrial applications, such as in cleaning or medical surgery. Consumer service robots are not included.

  desc_key_industrial_robots: &desc_key_industrial
    - Industrial robots are machines used in factories to automate tasks like welding, assembly, and packaging.
    - They are defined as automatically controlled, reprogrammable, and multipurpose machines that can move in three or more directions.
    - Reprogrammable means their functions can be changed through software without altering their physical parts.
    - Multipurpose means they can be adapted for different tasks with mechanical changes.
    - Robots are becoming easier to install and more flexible, which means even small production runs can be automated.
    - Companies use robots to improve product quality, increase speed, reduce waste, and cut costs.


dataset:
  update_period_days: 365

tables:
  ai_adoption:
    variables:
      pct_of_respondents:
        title: Organizations reporting having adopted AI
        description_short: Share of companies using AI technology (e.g., machine learning, computer vision, or natural language processing) in at least one business function.
        description_key:
          - The McKinsey survey asked organizations in which business functions they had adopted AI technologies, such as machine learning, computer vision, or natural language processing.
          - An organization was considered to be using AI if it had adopted it in at least one of these areas.
          - The regional groupings, as defined by McKinsey & Company, classify countries into specific categories.
          - The data is adjusted to account for differences in response rates and to ensure that each country's economic contribution to global GDP is properly represented.
        unit: '%'
        short_unit: '%'
        processing_level: minor
        display:
          numDecimalPlaces: 0
        presentation:
          attribution: McKinsey & Company Survey via AI Index Report
          grapher_config:
            note: Companies represent a range of industries, sizes, functional specialties, and tenures. To adjust for differences in response rates, the data are weighted by the contribution of each respondent's nation to global GDP.

  ai_bills:
    variables:
      number_of_ai_related_bills_passed_into_law:
        title: Cumulative AI-related bills passed into law since 2016, as of 2025
        unit: 'bills'
        short_unit: ''
        description_short: The total number of AI-related laws enacted in Group of Twenty (G20) countries between 2016 and 2025.
        description_key:
          - AI-related laws are identified through automated searches of legislative websites, combined with AI-based analysis of legal texts and manual checks.
          - The system searches for terms such as “artificial intelligence” and “machine learning” to identify relevant laws.
          - Each law is counted once, even if it includes several AI-related provisions. This means the total may underestimate the extent of policymaking.
          - Only laws that have been enacted are included. Proposed or pending legislation is not counted.
          - "The number of laws does not capture their importance: one broad law can be more impactful than many narrower ones."
        presentation:
          attribution: Digital Policy Alert via AI Index Report
          grapher_config:
            note: For example, the [TAKE IT DOWN Act](https://www.govinfo.gov/content/pkg/PLAW-119publ12/html/PLAW-119publ12.htm) passed into law by the US Congress.
        processing_level: minor
        display:
            numDecimalPlaces: 0

  ai_incidents:
    variables:
      number_of_ai_incidents:
        title: Annual reported artificial intelligence incidents and controversies
        unit: 'incidents'
        short_unit: ''
        description_short: Notable incidents include "deepfake" videos and facial recognition systems leading to wrongful arrests.
        description_key:
          - The AI Incident Database (AIID) tracks cases of ethical misuse of AI, such as fatal accidents or wrongful arrests caused by AI systems.
          - It relies on public media reports, so the actual number of incidents is likely underreported.
          - The number of AI incidents is continuously updated, including for past years, so the numbers reported here may differ from the latest figures on the AI Incident Database.
        presentation:
          grapher_config:
            note: As awareness grows, incident tracking and reporting also improve, indicating that earlier incidents may have been underreported.

  ai_conferences:
    variables:
      attendees:
        title: Number of attendees
        unit: 'attendees'
        short_unit: ''
        description_short: Thirteen major AI conferences are included.
        description_key:
          - AI conferences serve as essential platforms for researchers to present their findings and network with peers and collaborators.
          - Attendance data should be interpreted with caution, as many conferences in recent years have adopted virtual or hybrid formats.
          - The AI Index reports total attendance, including virtual, hybrid, and in-person participation, across conferences such as AAAI, NeurIPS, ICML, CVPR, EMNLP, ICLR, and others.
        presentation:
          grapher_config:
            note: Most conferences in 2020–2021 were held virtually due to the COVID-19 pandemic.

  ai_jobs:
    variables:
      ai_job_postings_share:
        title: Share of artificial intelligence jobs among all job postings
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 2
        description_short: A job posting is considered an AI job if it requests one or more AI skills, e.g., "natural language processing", "neural networks", "machine learning", or "robotics".
        description_key:
          - Lightcast classifies a job as an AI job if it mentions at least one AI-related skill in the posting text.
          - AI-related skills are grouped into categories like machine learning and neural networks, natural language processing, generative AI, robotics and autonomous systems, computer vision, and AI ethics and governance.

  ai_investment_generative:
    variables:
      generative_ai:
        title: Global investment in generative AI
        description_short: *desc_short_generative
        description_key: *desc_key_generative
        description_processing: *desc_processing_inflation
        unit: 'constant 2021 US$'
        short_unit: '$'
        presentation:
          grapher_config:
            note: *note_inflation

  ai_new_companies:
    variables:
      companies:
        title: Newly founded AI companies
        unit: 'companies'
        short_unit: ''
        processing_level: minor
        description_short: Newly-funded AI companies in each year that received an investment of more than $1.5 million (not adjusted for inflation).
        description_key:
          - AI companies are identified using keyword searches in company descriptions and websites.
          - The data focuses on AI and machine learning companies that raised over $1.5 million (not adjusted for inflation).

  ai_private_investment:
    variables:
      private_investment:
        title: Private investment in AI by region
        description_short: *desc_short_private
        description_key: *desc_key_private
        description_processing: *desc_processing_inflation
        unit: 'constant 2021 US$'
        short_unit: '$'
        presentation:
          grapher_config:
            note: *note_inflation

  ai_corporate_investment:
    variables:
      corporate_investment:
        title: Global corporate investment in AI
        description_short: *desc_short_corporate
        description_key: *desc_key_corporate
        description_processing: *desc_processing_inflation
        unit: 'constant 2021 US$'
        short_unit: '$'
        presentation:
          grapher_config:
            note: *note_inflation

  industrial_robots:
    variables:
      industrial_robot_installations:
        title: Annual industrial robots installed
        unit: 'robots'
        short_unit: ''
        description_short: *desc_industrial
        description_key: *desc_key_industrial
        presentation:
          grapher_config:
            note: "Example machines that are not classified as robots: software (e.g., voice assistants), remote-controlled drones, self-driving cars, \"smart\" washing machines."

      industrial_robot_stock:
        title: Total industrial robots in operation
        unit: 'robots'
        short_unit: ''
        description_short: *desc_industrial
        description_key:
          - The operational stock of robots refers to the number of robots currently in use.
          - The IFR estimates the stock by summing robot installations over the past 12 years, assuming robots are withdrawn after 12 years of service.
        presentation:
          grapher_config:
            note: "Example machines that are not classified as robots: software (e.g., voice assistants), remote-controlled drones, self-driving cars, \"smart\" washing machines."

  professional_robots:
    variables:
      number_of_professional_robots_installed:
        title: Number of professional robots installed
        unit: 'robots'
        short_unit: ''
        description_short: *desc_professional
        description_key:
          - Agriculture category includes robots used for tasks such as plowing, seeding, harvesting, weeding, fertilizing, and pesticide spraying.
          - Professional cleaning category includes robots designed to clean floors, windows, walls, and other surfaces in professional environments.
          - Transportation and logistics category includes robots that transport goods and manage inventory in warehouses, hospitals, hotels, and other settings.
          - Medical and health care category includes robots used in clinical and care settings for diagnostics, surgery, rehabilitation, and non-invasive therapy.
          - Hospitality category includes robots that prepare and serve food or drinks, and those providing information or guidance in customer-facing environments.
        presentation:
          grapher_config:
            note: "Example machines that are not classified as robots: software (e.g., voice assistants), remote-controlled drones, self-driving cars, \"smart\" washing machines."
