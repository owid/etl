# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    processing_level: major
    presentation:
      topic_tags:
        - Artificial Intelligence

  desc_processing_carriers: &desc_processing_carriers |-
    We summed values across all approved robotaxi carriers operating in California to produce monthly totals. Both Cruise and Waymo reported actual trip data through November 2023. After that, only Waymo data is included, as Cruise suspended its robotaxi service following a safety incident in October 2023. Cruise continued to file regulatory reports with zero trips through at least mid-2024.

# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 90


tables:
  robotaxis:
    variables:
      totaltrips:
        title: Monthly completed trips by robotaxis
        unit: trips
        description_processing: *desc_processing_carriers
        description_short: The total number of completed passenger trips each month in California's paid driverless taxi services.
        description_key:
          - This counts completed passenger trips in California's paid robotaxi services that are approved to operate.
          - Only includes trips where passengers actually rode in the vehicle and paid for the service.
          - Excludes empty cars driving between pickups, test rides, and any non-passenger travel.
          - Both Cruise and Waymo reported data until October 2023, when California regulators made Cruise suspend its service following a safety incident. Waymo has been the sole reporter since then.
        display:
          numDecimalPlaces: 0

      totalpassengerscarried:
        title: Monthly number of people who rode in robotaxis
        unit: passengers
        description_processing: *desc_processing_carriers
        description_short: The total number of passengers traveling each month in California's paid driverless taxi services.
        description_key:
          - This counts all passengers who rode in California's paid robotaxi services that are approved to operate.
          - Each person is counted once per trip, so if someone takes multiple trips, they're counted multiple times.
          - For shared rides, each passenger in the vehicle is counted separately. Safety drivers (when present) are not counted as passengers.
          - Excludes empty cars driving between pickups, test rides, and any non-passenger travel.
          - Both Cruise and Waymo reported data until October 2023, when California regulators made Cruise suspend its service following a safety incident. Waymo has been the sole reporter since then.
        display:
          numDecimalPlaces: 0

      totalpmt:
        title: Monthly distance traveled by robotaxi passengers
        unit: kilometers
        short_unit: km
        description_short: Monthly passenger kilometers traveled in California’s paid driverless taxis, summing the kilometers actually traveled by individual passengers across all trips.
        description_processing: |-
          The original data reports distance in miles. We converted to kilometers by multiplying by 1.60934.

          We summed values across all approved robotaxi carriers operating in California to produce monthly totals. Both Cruise and Waymo reported actual trip data through November 2023. After that, only Waymo data is included, as California regulators made Cruise suspend its robotaxi service following a safety incident in October 2023. Cruise continued to file regulatory reports with zero trips through at least mid-2024.
        description_key:
          - This indicator tracks the total distance traveled by paying passengers in robotaxi trips operated by licensed services in California, expressed in passenger-kilometers.
          - A passenger-kilometer is one kilometer traveled by one passenger. For example, a five-kilometer trip with two passengers equals ten passenger-kilometers. If passengers join or leave during a trip, each segment is counted separately based on the number of passengers in the vehicle.
          - Only passenger-carrying trips are included. Empty vehicles traveling between pickups and test rides are excluded.
          - Both Cruise and Waymo reported data until October 2023, when California regulators made Cruise suspend its service following a safety incident. Waymo has been the sole reporter since then.
        display:
          numDecimalPlaces: 0
