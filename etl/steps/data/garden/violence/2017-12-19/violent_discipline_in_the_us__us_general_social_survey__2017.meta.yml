      favor_spanking_to_discipline_child__agree__us_general_social_survey__2017:
        title: Favor spanking to discipline child - Agree (US General Social Survey (2017))
        unit: ''
        description: |-
          The General Social Survey in the US asks: Do you strongly agree, agree, disagree, or strongly disagree that it is sometimes necessary to discipline a child with a good, hard spanking? This variable records the number of survey responses stating 'Agree'
