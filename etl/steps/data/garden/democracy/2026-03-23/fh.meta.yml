# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      attribution: Freedom House (2026)
      topic_tags:
        - Democracy

# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/
dataset:
  update_period_days: 365

tables:
  fh:
    variables:
      total_score:
        title: Total democracy score
        unit: ""
        description_short: |-
          Freedom House's total democracy score is a 0-to-100 aggregate that adds up a country's points on 25 indicators of political rights (max 40) and civil liberties (max 60), creating a single snapshot of the freedoms people actually enjoy.

        description_key:
          - It distills a detailed checklist—10 political-rights and 15 civil-liberties questions—into one intuitive figure, making complex governance data easy to grasp.
          - The number is the gateway to Freedom House's headline categories Free, Partly Free, Not Free, so a small point swing can shift a country's global status.
          - "Scores are re-evaluated each year: analysts adjust points only when real-world events warrant, allowing the metric to flag both rapid crackdowns and gradual reforms."

      civlibs:
        title: Civil liberties rating
        unit: ""
        description_short: |-
          Identifies the extent of freedom of expression and association, the rule of law, and personal autonomy. Lower ratings indicate more liberties.
        description_key:
          - It is measured on a one-to-seven scale, with one representing the highest degree of Freedom and seven the lowest.

        presentation:
          grapher_config:
            title: Civil Liberties Rating
            subtitle: Data by [Freedom House](#dod:freedom-house). It captures the extent of freedom of expression and association, the rule of law, and personal autonomy. Lower ratings indicate more liberties.
            hasMapTab: true
            tab: map
            yAxis:
              max: 7
              min: 1
            map:
              colorScale:
                baseColorScheme: Greens
                binningStrategy: manual
                colorSchemeInvert: true
                customNumericColors:
                  - 
                customNumericLabels:
                  - '1'
                  - '2'
                  - '3'
                  - '4'
                  - '5'
                  - '6'
                  - '7'
                customNumericValues:
                  - 1
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
              columnSlug: grapher/democracy/2026-03-23/fh/fh#civlibs
        display:
          numDecimalPlaces: 0
      polrights:
        title: Political rights rating
        unit: ""
        description_short: |-
          Identifies the extent of free and fair elections, political pluralism and participation, and a functioning government. Lower ratings indicate more rights.
        description_key:
          - It is measured on a one-to-seven scale, with one representing the highest degree of Freedom and seven the lowest.

        presentation:
          grapher_config:
            title: Political Rights Rating
            subtitle: Data by [Freedom House](#dod:freedom-house). It captures the extent of free and fair elections, political pluralism and participation, and a functioning government. Lower ratings indicate more rights.
            hasMapTab: true
            tab: map
            yAxis:
              max: 7
              min: 1
            map:
              colorScale:
                baseColorScheme: Blues
                binningStrategy: manual
                colorSchemeInvert: true
                customNumericColors:
                  - 
                customNumericLabels:
                  - '1'
                  - '2'
                  - '3'
                  - '4'
                  - '5'
                  - '6'
                  - '7'
                customNumericValues:
                  - 1
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
              columnSlug: grapher/democracy/2026-03-23/fh/fh#polrights
        display:
          numDecimalPlaces: 0
      regime:
        title: Political regime
        unit: ""
        description_short: |-
          The variable identifies the political regime of a country. It distinguishes between free countries (score 2), partly free countries (score 1), and not free countries (score 0).

        description_key:
          - Free countries are understood as countries in which citizens have many political rights (free and fair elections, political pluralism and participation, functioning government) and civil liberties (freedoms of expression and association, rule of law, personal autonomy).
          - Partly free country are countries in which citizens have some political rights and civil liberties.
          - Not free country are countries in which citizens have few political rights and civil liberties.
        description_processing: |-
          score 0: Not free
          Score 1: Partly free
          Score 2: Free

        presentation:
          grapher_config:
            title: Free country
            subtitle: '[Data](#dod:regimes-fh) by [Freedom House](#dod:freedom-house). Free countries are those in which citizens have many political rights (free and fair elections, political pluralism and participation, functioning government) and civil liberties (freedoms of expression and association, rule of law, personal autonomy).'
            hasMapTab: true
            tab: map
            yAxis:
              max: 2
              min: 0
            selectedFacetStrategy: entity
            map:
              colorScale:
                baseColorScheme: RdYlBu
                binningStrategy: manual
                customNumericColors:
                  - '#a588c3'
                  - '#e8b864'
                  - '#58ac8c'
                customNumericLabels:
                  - Not free
                  - Partly free
                  - Free
                  - Liberal democracy
                customNumericValues:
                  - 0
                  - 0
                  - 1
                  - 2
                customNumericColorsActive: true
              columnSlug: grapher/democracy/2026-03-23/fh/fh#regime
              tooltipUseCustomLabels: true
        display:
          numDecimalPlaces: 0
      country_flag:
        title: Entity considered a country by Freedom House
        unit: ""
        description_short: |-
          Identifies whether Freedom House consider the entity a country or territory.

      electprocess:
        title: Democratic electoral institutions
        unit: ""
        description_short: |-
          The variable identifies the extent to which the chief executive and legislature are chosen in free and fair elections under universal suffrage. Higher scores indicate a freer electoral process.

        presentation:
          grapher_config:
            title: Democratic Electoral Institutions Score
            subtitle: Data by [Freedom House](#dod:freedom-house). The score captures the extent to which the chief executive and legislature are chosen in free and fair elections under universal suffrage. It ranges from 0 to 12 (most democratic).
            hasMapTab: true
            tab: map
            yAxis:
              max: 12
              min: 0
            map:
              colorScale:
                baseColorScheme: YlGn
                binningStrategy: manual
                customNumericColors:
                  - 
                customNumericLabels:
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                customNumericValues:
                  - 0
                  - 1
                  - 3
                  - 5
                  - 7
                  - 9
                  - 11
                  - 12
              columnSlug: grapher/democracy/2026-03-23/fh/fh#electprocess
        display:
          numDecimalPlaces: 0
      polrights_score:
        title: Political rights score
        unit: ""
        description_short: |-
          Identifies the fine-grained extent of free and fair elections, political pluralism and participation, and a functioning government. Higher scores indicate more rights.

        presentation:
          grapher_config:
            title: Political Rights Score
            subtitle: Data by [Freedom House](#dod:freedom-house). The score captures the extent of free and fair elections, political pluralism and participation, and a functioning government. Higher scores indicate more rights.
            hasMapTab: true
            tab: map
            yAxis:
              max: 40
              min: -3
            map:
              colorScale:
                baseColorScheme: Blues
                binningStrategy: manual
                customNumericColors:
                  - 
                  - 
                customNumericLabels:
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - 
                customNumericValues:
                  - 0
                  - 0
                  - 5
                  - 10
                  - 15
                  - 20
                  - 25
                  - 30
                  - 35
                  - 40
              columnSlug: grapher/democracy/2026-03-23/fh/fh#polrights_score
        display:
          numDecimalPlaces: 0
      civlibs_score:
        title: Civil liberties score
        unit: ""
        description_short: |-
          The variable identifies the fine-grained extent of freedom of expression and association, the rule of law, and personal autonomy. Higher scores indicate more liberties.

        presentation:
          grapher_config:
            title: Civil Liberties Score
            subtitle: Data by [Freedom House](#dod:freedom-house). The score captures the extent of freedom of expression and association, the rule of law, and personal autonomy. Higher scores indicate more liberties.
            hasMapTab: true
            tab: map
            yAxis:
              max: 60
              min: 0
            map:
              colorScale:
                baseColorScheme: Greens
                binningStrategy: manual
                customNumericLabels:
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - ''
                  - 53-60
                  - 
                customNumericValues:
                  - 0
                  - 10
                  - 20
                  - 30
                  - 40
                  - 50
                  - 60
              columnSlug: grapher/democracy/2026-03-23/fh/fh#civlibs_score
        display:
