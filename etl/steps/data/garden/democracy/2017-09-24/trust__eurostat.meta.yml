dataset:
  title: Trust – Eurostat
tables:
  trust__eurostat:
    variables:
      trust_in_others__eurostat__2015:
        title: Trust in others (Eurostat (2015))
        unit: Scale of 0 (You do not trust any other person) to 10  (Most people can be trusted)
        display:
          numDecimalPlaces: 1
          unit: ''
        description: |-
          Variable of a general nature and refers to the respondent's opinion/feeling. Trust in others does not refer to a specific group of people. On the scale of 0 (You do no trust any other person) to 10 (Most people can be trusted).
      trust_in_police__eurostat__2015:
        title: Trust in police (Eurostat (2015))
        unit: 0 (No trust at all) to 10 (Complete trust)
        description: |-
          Trust in institutions (the police), 0 corresponds to 'No trust at all' and 10 'Complete trust' in the concerned institution. The term police refers to the police as an institution.
    dimensions:
      - name: year
        slug: year
      - name: entity_name
        slug: entity_name
      - name: entity_id
        slug: entity_id
      - name: entity_code
        slug: entity_code
