definitions:
  common:
    presentation:
      topic_tags:
      - Animal Welfare
    description_processing: |-
      For the UK, the share of hens in each housing type is approximated by the share of eggs produced in that housing type, due to limited data availability.

dataset:
  title: "Share of egg-laying hens in cage-free systems"

tables:
  share_of_cage_free_eggs:
    variables:
      share_of_eggs_cage_free:
        title: Share of egg-laying hens in cage-free systems
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1
        description_short: |-
          Cage-free housing systems include barns, pasture, and free-range (non-organic and organic) farms.
      share_of_eggs_in_cages:
        title: Share of egg-laying hens in cages
        unit: '%'
        short_unit: '%'
        display:
          numDecimalPlaces: 1
        description_short: |-
          Share of egg-laying hens kept in cages. This includes conventional as well as enriched cages, which are larger, furnished cages that provide slightly more space.
