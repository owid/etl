        unit: hens
        short_unit: ''
        display:
          numDecimalPlaces: 0
        description_processing: *description_processing_hens
      number_of_hens_free_range_not_organic:
        title: Number of egg-laying hens in non-organic, free-range farms
        unit: hens
        short_unit: ''
        display:
          numDecimalPlaces: 0
        description_processing: *description_processing_hens
      number_of_hens_free_range_organic:
