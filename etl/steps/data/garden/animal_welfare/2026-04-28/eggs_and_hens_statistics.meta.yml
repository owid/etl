definitions:
  common:
    presentation:
      topic_tags:
      - Animal Welfare
  description_processing_hens: &description_processing_hens |-
    - Data for the UK, US, and EU member states are sourced from official statistics. Data for other countries are taken from a compilation by the Welfare Footprint Institute, which combines national statistics and industry reports.
    - For the UK, hen housing counts and shares are approximated from the share of eggs produced in each housing type, due to limited data availability.
    - For the US, pastured hens are included under free-range, and organic hens not reported as free-range or pastured are included under barn or aviary.
    - For countries from the Welfare Footprint Institute compilation, detailed hen counts by housing type are calculated from reported shares and total laying hens. For countries marked as having unknown housing systems, housing-system counts and shares are left blank, while total laying-hen counts are retained.
  description_processing_backfill: &description_processing_backfill
    Data for 2006-2011 was suppressed in the 2026 release of UK egg statistics. Values from an earlier 2023 release were used to fill this gap.

dataset:
  title: "Eggs and hens statistics"

tables:
  egg_statistics:
    title: UK egg statistics
    variables:
      number_of_eggs_all:
        title: Total number of eggs produced in the UK
        unit: eggs
        short_unit: ''
        display:
          numDecimalPlaces: 0
        description: |
          The total number of eggs packed in the UK, as reported by Defra. This total is available for all years even when breakdowns by production type are suppressed or unavailable.
      number_of_eggs_from_hens_cage_free:
        title: Number of eggs from cage-free hens
        unit: eggs
        short_unit: ''
        display:
          numDecimalPlaces: 0
        description_short: |-
          Cage-free housing systems include barns and free-range (non-organic and organic) farms.
      number_of_eggs_from_hens_in_barns:
        title: Number of eggs from hens in barns
        unit: eggs
        short_unit: ''
        display:
          numDecimalPlaces: 0
        description_processing: *description_processing_backfill
      number_of_eggs_from_hens_in_cages:
