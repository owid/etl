        title: Number in child labor in << sector >> - << sex >>, age << age_group >>
        unit: people
        short_unit: ""
      share:
        title: Share in child labor in << sector >> - << sex >>, age << age_group >>
        unit: "%"
        short_unit: "%"
  denmark:
