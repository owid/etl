dataset:
  update_period_days: 365

tables:
  air_quality_life_index:
    variables:
      pm:
        title: Exposure to human-caused particulate matter air pollution
        description_short: Annual population-weighted average concentration of [fine particulate matter (PM2.5)](#dod:particulate_matter_pollution) in the air, measured in micrograms per cubic meter (µg/m³). Fine particulate matter (PM2.5) are particles with a diameter of 2.5 micrometers or less, which can pose significant health risks. This data excludes natural sources of PM2.5, such as dust and sea salt, to focus on human-caused pollution.
        description_key:
          - Outdoor air pollution, specifically PM2.5, is a major environmental risk factor for health issues such as respiratory and cardiovascular diseases. It is estimated to contribute to millions of premature deaths globally each year.
          - The World Health Organization (WHO) recommends that annual average PM2.5 levels should be below 5 µg/m³ to minimize health impacts.
          - The Air Quality Life Index (AQLI) uses satellite-derived data to estimate PM2.5 levels, which may differ from local ground monitor readings.
          - This data uses population-weighted averages to reflect the exposure of people in a region. It also excludes natural sources of PM2.5, such as dust and sea salt, to focus on human-caused pollution.
          - You can learn more about the data and methodology in the [AQLI methodology and research design document](https://aqli.epic.uchicago.edu/about/methodology/).
        description_from_producer: *description_aqli
        display:
          roundingMode: significantFigures
          numSignificantFigures: 2
        presentation:
          grapher_config:
            note: The [WHO's Air Quality Guidelines](#dod:who-air-quality-guidelines) suggest annual average PM2.5 exposure should be less than 5 µg/m³ in order to minimize the impacts of PM2.5 on human health.
      whostandard:
        title: WHO PM2.5 guideline
        description_short: The WHO annual PM2.5 guideline value (5 µg/m³ as of the 2021 guidelines).
        display:
          roundingMode: significantFigures
          numSignificantFigures: 2
      natstandard:
        title: National PM2.5 standard
        description_short: The national limit for PM2.5 pollution levels, as set by each country's regulatory authority.
        display:
          roundingMode: significantFigures
          numSignificantFigures: 2
        presentation:
          grapher_config:
            note: The [WHO's Air Quality Guidelines](#dod:who-air-quality-guidelines) suggest annual average PM2.5 exposure should be less than 5 µg/m³ in order to minimize the impacts of PM2.5 on human health.
      llpp_who:
        title: Life expectancy gain if WHO guideline met
        unit: years
        short_unit: years
        description_short: Potential gain in life expectancy (in years) if PM2.5 pollution were reduced to meet the WHO annual guideline of 5 µg/m³.
        display:
          roundingMode: decimalPlaces
          numDecimalPlaces: 1
      llpp_nat:
        title: Life expectancy gain if national standard met
        unit: years
        short_unit: years
        description_short: Potential gain in life expectancy (in years) if PM2.5 pollution were reduced to meet the country's national air quality standard.
        display:
          roundingMode: decimalPlaces
          numDecimalPlaces: 1
