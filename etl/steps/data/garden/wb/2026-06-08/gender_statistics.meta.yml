# NOTE: To learn more about the fields, hover over their names.
definitions:
  common:
    presentation:
      topic_tags:
        - Women's Rights
        - Global Education

  desc_standardized_assumptions: &desc_standardized_assumptions
    - This indicator uses standardized assumptions, like the woman having one child and residing in the largest business city, to ensure comparability, though this approach may not capture variations in laws affecting women in different states, rural areas, or minority groups.

# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/dataset/
dataset:
  update_period_days: 365


# Learn more about the available fields:
# http://docs.owid.io/projects/etl/architecture/metadata/reference/tables/
  owners:
    - Veronika Samborska
tables:
  gender_statistics:
    # Learn more about the available fields:
    # http://docs.owid.io/projects/etl/architecture/metadata/reference/indicator/
    variables:

      sl_agr_empl_zs:
        title: Share of people employed in agricultural sector
        description_short: The share of people employed in agriculture includes working-age people with a job in farming, forestry, fishing, and related activities, including those temporarily absent.
        description_key:
          - This measures the percentage of all workers who are employed in agriculture.
          - Agriculture includes farming, forestry, fishing, and related activities.
          - People are counted even if they are temporarily absent from work due to sickness, leave, or seasonal factors.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      sg_own_ldal_ma_zs:
        title: Share of men who own land alone
        description_short: The share of men aged 15–49 with land registered in their name or requiring their signature to sell.
        description_key:
          - This measures the proportion of men aged 15–49 who are the sole owners of land.
          - Sole ownership means the land is legally registered in their name or cannot be sold without their approval.
          - Land ownership gives men economic security and influence within households and communities.
          - The indicator does not include land held jointly with others.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      sg_own_ldal_fe_zs:
        title: Share of women who own land alone
        description_short: The share of women aged 15–49 with land registered in their name or requiring their signature to sell.
        description_key:
          - This measures the proportion of women aged 15–49 who are the sole owners of land.
          - Sole ownership means the land is legally registered in their name or cannot be sold without their approval.
          - Land ownership gives women economic security and a stronger role in decision-making.
          - Women often face barriers to ownership due to inheritance laws, marital rules, or social customs.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      gd_wbl_saf_law_domviol:
        title: Comprehensiveness of domestic violence legislation
        description_short: Score measuring how comprehensively the law addresses domestic violence, from 0 (no legislation) to 1 (full coverage across all key dimensions).
        description_key:
          - "This score assesses four dimensions of domestic violence legislation, each worth 0.25 — a country scores 1.0 if all four are in place."
          - "The four dimensions are: criminal penalties, protection orders, broad scope of abuse (including marital rape), and a specific domestic violence law."
          - A score of 0 means no domestic violence legislation exists; a score of 1 means the law covers all four dimensions.
          - Partial scores reflect coverage of some but not all dimensions.
          - *desc_standardized_assumptions
        unit: "score (0–1)"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      ic_frm_femm_zs:
        title: Share of firms with a female top manager
        description_short: Top manager refers to the highest ranking manager or CEO of the establishment. This may be the owner if she works as the manager of the firm.
        description_key:
          - This measures the percentage of firms where the top manager is a woman.
          - The top manager is usually the CEO or highest-ranking executive, but may also be the owner if she manages the firm.
          - Female leadership is important for gender equality in business and decision-making.
        unit: "% of firms"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_mar_law_obedience:
        title: Is there no legal requirement for wives to obey their husbands?
        description_short: Indicates whether the law does not require a married woman to obey her husband.
        description_key:
          - Equals 1 if there is no legal provision requiring a married woman to obey her husband, or if the law explicitly grants spouses equal rights and duties.
          - Equals 0 if family law explicitly requires wives to obey husbands, or imposes penalties such as loss of maintenance rights for disobedience.
          - *desc_standardized_assumptions
        unit: "(1=yes; 0=no)"
        display:
          numDecimalPlaces: 0
          tolerance: 5

      sg_gen_mnst_zs:
        title: Share of women in ministerial positions
        description_short: Deputy prime ministers and prime ministers or heads of government that hold ministerial portfolios are included, vice-presidents and heads of governmental or public agencies are excluded.
        description_key:
          - This measures the percentage of ministerial positions held by women.
          - It includes deputy prime ministers and prime ministers if they also hold a ministerial role.
          - It excludes vice-presidents and leaders of public agencies that are not part of the cabinet.
          - A higher share indicates greater representation of women in senior government positions.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_wrk_law_nondiscemp:
        title: Does the law prohibit gender-based discrimination in employment?
        description_short: Indicates whether the law prohibits gender discrimination broadly across employment — not only in one aspect such as pay or dismissal.
        description_key:
          - Equals 1 if the law prohibits gender-based discrimination broadly across employment and mandates equal treatment.
          - Equals 0 if no gender anti-discrimination protections in employment exist.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_wrk_law_getjob:
        title: Can women get a job in the same way as men?
        description_short: Indicates whether the law allows women to seek and obtain employment without restrictions that don't apply to men.
        description_key:
          - Equals 1 if women face no legal barriers to working — no husband's consent is required, no extra documentation, and working is not penalized as disobedience.
          - Equals 0 if the law imposes barriers such as requiring a husband's or guardian's approval for women to work.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_saf_law_sexharass:
        title: Comprehensiveness of sexual harassment legislation
        description_short: Score measuring how broadly the law addresses sexual harassment across different settings, from 0 (no legislation) to 1 (full coverage across all key settings).
        description_key:
          - This score assesses four dimensions of sexual harassment law, each worth 0.25 — a country scores 1.0 if all four are in place.
          - The four dimensions are whether the law addresses sexual harassment in employment; in education or schools; in public places or transport; and cyber-harassment or cyber-stalking.
          - A score of 0 means no sexual harassment legislation exists; a score of 1 means the law covers all four settings.
          - Partial scores reflect coverage of some but not all settings.
          - *desc_standardized_assumptions
        unit: “score (0–1)”
        display:
          numDecimalPlaces: 2
          tolerance: 5

      sl_tlf_cact_fm_zs:
        title: Female-to-male labor force participation ratio
        description_short: The female-to-male labor force participation ratio compares the share of women and men aged 15+ who are working or actively looking for work.
        description_key:
          - This measures the ratio of women’s to men’s labor force participation rates.
          - Labor force participation includes people who are working or actively seeking work.
          - A value of 100% means equal participation between women and men.
          - A lower value means fewer women are in the labor force relative to men.
          - This indicator highlights gender gaps in access to and participation in employment.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_ast_law_ownership:
        title: Do women and men have equal ownership rights to immovable property?
        description_short: Indicates whether the law grants women and men equal ownership rights and administrative authority over immovable property, including land.
        description_key:
          - Equals 1 if the law grants women and men equal ownership rights and administrative authority over immovable property, including land.
          - Equals 0 if the law does not grant women equal property rights, or gives husbands special authority over marital property.
          - *desc_standardized_assumptions
        unit: "(1=yes; 0=no)"
        display:
          numDecimalPlaces: 0
          tolerance: 5

      sl_uem_neet_fe_zs:
        title: Share of young women not in education, employment or training
        description_short: The share of women aged 15–24 who are not in education, employment, or vocational training.
        description_key:
          - This measures the percentage of young women aged 15–24 who are not studying, working, or in training.
          - It shows how many are outside both the education system and the labor market.
          - High rates can reflect limited opportunities, social barriers, or economic challenges.
          - Being out of education or work can affect future earnings and independence.
          - Reducing NEET rates is important for supporting youth development and gender equality.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      sl_uem_neet_ma_zs:
        title: Share of young men not in education, employment or training
        description_short: The share of men aged 15–24 who are not in education, employment, or vocational training.
        description_key:
          - This measures the percentage of young men aged 15–24 who are not studying, working, or in training.
          - It captures how many are excluded from both education and the labor market.
          - High NEET rates suggest barriers to learning or employment that affect young men.
          - Being outside education and work can lead to long-term disadvantages.
          - Monitoring NEET rates helps track youth inclusion and economic opportunities.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      gd_wbl_saf_enf_sexharass_e:
        title: Perceived enforcement of sexual harassment legislation
        description_short: Expert perception score of how effectively public authorities enforce sexual harassment legislation in practice, from 0 (no enforcement) to 1 (full enforcement).
        description_key:
          - This score reflects expert perceptions of how effectively authorities enforce sexual harassment laws, rated on a 0–4 Likert scale and normalized to 0–1.
          - A score of 1 (4 on the raw scale) indicates full enforcement — police, courts, and labor authorities actively implement protections.
          - A score of 0 indicates no enforcement in practice, even where laws formally exist.
          - This is a perception-based measure reflecting the views of country experts, not an objective count of cases prosecuted.
          - The gap between legal framework scores and enforcement scores reveals where laws exist on paper but are not upheld in practice.
          - *desc_standardized_assumptions
        unit: “score (0–1)”
        display:
          numDecimalPlaces: 2
          tolerance: 5

      gd_wbl_ast_law_inherchld:
        title: Do sons and daughters have equal inheritance rights?
        description_short: Indicates whether the law grants sons and daughters equal inheritance rights from their parents.
        description_key:
          - Equals 1 if the law explicitly grants sons and daughters equal inheritance rights, mandates equal shares, or does not distinguish between boys and girls in inheritance.
          - Equals 0 if the law grants sons and daughters unequal inheritance rights when no will is left.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_mob_sfr_passport:
        title: Are passport application procedures the same for women and men?
        description_short: Indicates whether passport application procedures are the same for women and men.
        description_key:
          - Equals 1 if application forms and procedures are uniform for both sexes, with no additional document requirements or procedural barriers for women.
          - Equals 0 if women face extra requirements — such as a husband’s or guardian’s permission — not required of men.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_ent_law_credisc:
        title: Does the law prohibit gender discrimination in access to credit?
        description_short: Indicates whether the law explicitly prohibits gender-based discrimination in access to credit and financial services.
        description_key:
          - Equals 1 if the law explicitly prohibits gender-based discrimination in credit and financial services, or mandates equal access for women and men.
          - Equals 0 if no such legal protection exists, allowing lenders to discriminate by gender.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_ent_law_entactv:
        title: Can women sign contracts and register businesses in the same way as men?
        description_short: Indicates whether the law allows women to undertake entrepreneurial activities on equal legal terms as men.
        description_key:
          - Equals 1 if women have the same legal capacity as men to sign contracts, register a business, and operate a business without gender-based restrictions.
          - Equals 0 if women face legal barriers to entrepreneurship, such as requiring a husband’s consent to register or run a business.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_mar_law_divorce:
        title: Can women obtain a divorce in the same way as men?
        description_short: Indicates whether the law allows women to initiate and obtain a divorce on the same terms as men.
        description_key:
          - Equals 1 if either spouse can initiate divorce proceedings under equal conditions, with the same evidentiary rules and process for women and men.
          - Equals 0 if women face additional legal barriers to divorce, such as requiring a husband’s consent, unequal evidentiary rules, or prohibition from filing.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_mar_law_remarry:
        title: Do women and men have the same right to remarry?
        description_short: Indicates whether the law grants women the same right to remarry as men.
        description_key:
          - Equals 1 if women and men can remarry under the same conditions, with no waiting periods or other restrictions applied only to women.
          - Equals 0 if women face legal restrictions on remarriage that do not apply to men, such as mandatory waiting periods, pregnancy certification requirements, or bans on remarriage.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      sg_dmk_prch_fn_zs:
        title: Share of women involved in major household purchases
        description_short: The share of currently married women aged 15-49 who say that they alone or jointly have a say in major household purchase decisions.
        description_key:
          - This measures the percentage of married women aged 15–49 involved in making major household purchases.
          - Women are counted if they decide alone or together with their spouse.
          - Participation in spending decisions reflects women’s influence within the household.
          - Greater involvement suggests stronger bargaining power and autonomy.
          - Low involvement highlights gender gaps in family decision-making.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      gd_wbl_mob_law_chooselive:
        title: Can women choose where to live in the same way as men?
        description_short: Indicates whether the law allows women to choose where to live on the same terms as men.
        description_key:
          - Equals 1 if women face no legal restrictions on choosing their residence, or the law explicitly recognizes women’s right to freely decide where to live.
          - Equals 0 if the law gives husbands greater authority over the family’s place of residence, limiting women’s freedom of movement.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_ast_law_nonmoncon:
        title: Does the law recognize nonmonetary contributions in property division upon divorce?
        description_short: Indicates whether the law recognizes nonmonetary contributions — such as caregiving and household work — when dividing assets at the end of a marriage.
        description_key:
          - Equals 1 if the law explicitly recognizes nonmonetary contributions when dividing marital assets, through equal or equitable property division, a lump sum, or a community property regime.
          - Equals 0 if the law does not recognize unpaid contributions such as caregiving or household work when dividing assets at divorce.
          - *desc_standardized_assumptions
        unit: “(1=yes; 0=no)”
        display:
          numDecimalPlaces: 0
          tolerance: 5

      sg_dmk_hlth_wf_zs:
        title: Share of married women making their own health care decisions
        description_short: Share of married women aged 15–49 reporting that they themselves are the main decision-makers for their health care.
        description_key:
          - This measures the percentage of married women aged 15–49 who decide on their own health care.
          - Women are counted if they report being the main decision-maker.
          - Health care autonomy is important for women’s well-being and reproductive rights.
          - Greater decision-making power suggests stronger independence and bargaining power.
          - Limited autonomy may reflect cultural or household barriers to women’s control over health.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      gd_wbl_pay_law_eqremeqval:
        title: Does the law mandate equal pay for work of equal value?
        description_short: Indicates whether the law requires equal remuneration for work of equal value in line with ILO definitions — covering different jobs of comparable skill, effort, and responsibility.
        description_key:
          - Equals 1 if the law mandates equal pay for work of equal value in line with ILO definitions, going beyond equal pay for the same job to cover different but comparably demanding jobs.
          - Equals 0 if no such law exists, or the law only requires equal pay for the same or similar work (not work of equal value).
          - *desc_standardized_assumptions
        unit: "(1=yes; 0=no)"
        display:
          numDecimalPlaces: 0
          tolerance: 5


      gd_wbl_par_law_patleave:
        title: Paid paternity leave score
        description_short: Score measuring the comprehensiveness of paid paternity leave, from 0 (no paid leave for fathers) to 1 (at least 14 calendar days of paid paternity leave).
        description_key:
          - A score of 1 means the law provides at least 14 calendar days of paid leave for fathers.
          - A score of 0 means no paid paternity leave exists in law.
          - Partial scores reflect leave entitlements shorter than 14 days; the score increases linearly with the length of leave.
          - *desc_standardized_assumptions
        unit: "score (0–1)"
        display:
          numDecimalPlaces: 2
          tolerance: 5

      gd_wbl_par_sfr_incentfathers:
        title: Are incentives in place to encourage fathers to take paternity leave?
        description_short: Indicates whether fathers are entitled to paid paternity leave and whether additional incentives exist to promote its uptake.
        description_key:
          - Equals 1 if fathers are entitled to paid paternity or parental leave AND incentives are in place to encourage them to take it.
          - Equals 0 if no paid leave for fathers exists or no incentives are in place.
          - *desc_standardized_assumptions
        unit: "(1=yes; 0=no)"
        display:
          numDecimalPlaces: 0
          tolerance: 5

      sh_fpl_wntd_zs:
        title: Share of births that were planned pregnancies
        description_short: The share of women aged 15–49 who reported that their last birth in the five years preceding the survey was planned.
        description_key:
          - Measures the proportion of births that were wanted at the time of conception.
          - Based on women's self-report from household surveys.
          - Unplanned pregnancies can limit women's education, employment, and health outcomes.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 10

      sh_mmr_risk_zs:
        title: Lifetime risk of maternal death
        description_short: The probability that a 15-year-old girl will eventually die from a maternal cause, given current levels of fertility and maternal mortality.
        description_key:
          - Combines both the risk of dying during any single pregnancy and the number of pregnancies a woman is expected to have over her lifetime.
          - A higher value means a greater chance of dying from pregnancy- or childbirth-related causes over the course of a woman's life.
          - Declines both when maternal mortality rates fall and when fertility rates fall.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 2
          tolerance: 5

      sl_tlf_cact_fm_ne_zs:
        title: Female-to-male labor force participation ratio (national estimate)
        description_short: The ratio of women's to men's labor force participation rates, based on national labor force surveys.
        description_key:
          - Compares the share of women and men aged 15+ who are working or actively seeking work, using data from national surveys.
          - A value of 100 means equal participation; values below 100 mean women participate less than men.
          - Unlike the modeled estimate, this uses country-reported survey data directly.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      sh_svr_wast_zs:
        title: Prevalence of severe wasting in children under 5
        description_short: The share of children under 5 whose weight-for-height is more than three standard deviations below the international reference median.
        description_key:
          - Severe wasting is an indicator of acute malnutrition and a strong predictor of child mortality.
          - Measured using the WHO Child Growth Standards.
          - Affected children face significantly elevated risk of death from common infections.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      sh_sta_ob18_fe_zs:
        title: Prevalence of obesity among women
        description_short: The share of women aged 18 and over with a Body Mass Index (BMI) of 30 kg/m² or higher.
        description_key:
          - BMI is calculated as weight in kilograms divided by height in metres squared.
          - A BMI of 30 or above is classified as obese by the World Health Organization.
          - Obesity raises the risk of cardiovascular disease, diabetes, and other chronic conditions.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      sh_sta_ob18_ma_zs:
        title: Prevalence of obesity among men
        description_short: The share of men aged 18 and over with a Body Mass Index (BMI) of 30 kg/m² or higher.
        description_key:
          - BMI is calculated as weight in kilograms divided by height in metres squared.
          - A BMI of 30 or above is classified as obese by the World Health Organization.
          - Obesity raises the risk of cardiovascular disease, diabetes, and other chronic conditions.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      se_sch_life:
        title: Expected years of schooling
        description_short: The number of years a child of school entrance age is expected to spend in school or university, including years repeated.
        description_key:
          - Calculated as the sum of age-specific enrolment ratios for primary, secondary, post-secondary non-tertiary, and tertiary education.
          - Includes years spent on grade repetition.
          - This is not the same as actual educational attainment — it reflects the education system's current capacity and enrolment rates applied to a child entering school today.
        unit: years
        short_unit: years
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_par_law_matbene:
        title: Government funding of maternity leave benefits
        description_short: Score measuring the extent to which maternity leave benefits are paid by the government, from 0 (employer only) to 1 (fully government-funded).
        description_key:
          - A score of 1 means leave benefits are fully paid or administered by the government (including compulsory social insurance schemes or public funds).
          - A score of 0 means leave benefits are paid solely by the employer.
          - Partial scores reflect shared payment between the government and the employer.
          - Government-funded benefits are more reliable and cover workers regardless of employer size or financial situation.
          - *desc_standardized_assumptions
        unit: "score (0–1)"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_par_law_nondismpreg:
        title: Is dismissal of pregnant workers prohibited?
        description_short: Indicates whether the law explicitly prohibits dismissing women during pregnancy and after childbirth, without restriction to specific periods.
        description_key:
          - Equals 1 if the law explicitly prohibits dismissal of pregnant workers and does not limit this protection to specific periods (e.g., only during maternity leave).
          - Equals 0 if no such prohibition exists or if protections are narrowly defined.
          - *desc_standardized_assumptions
        unit: "(1=yes; 0=no)"
        display:
          numDecimalPlaces: 0
          tolerance: 5

      gd_wbl_par_law_matleave:
        title: Paid maternity leave score
        description_short: Score measuring the comprehensiveness of paid maternity leave, from 0 (no paid leave) to 1 (at least 98 calendar days of paid leave for mothers).
        description_key:
          - A score of 1 means the law provides at least 98 calendar days of paid maternity leave — the ILO standard.
          - A score of 0 means no paid maternity leave exists in law.
          - Partial scores reflect leave entitlements shorter than 98 days; the score increases linearly with the length of leave.
          - *desc_standardized_assumptions
        unit: "score (0–1)"
        display:
          numDecimalPlaces: 2
          tolerance: 5

      se_ter_grad_fe_si_zs:
        title: Female share of graduates from STEM programmes, tertiary
        description_short: The share of women among all graduates from tertiary Science, Technology, Engineering and Mathematics (STEM) programmes.
        description_key:
          - Measures the number of female graduates in STEM as a percentage of all graduates in STEM at the tertiary level.
          - A value of 50% would mean equal numbers of men and women graduating from STEM programmes.
          - Tracking this share helps identify gender gaps in fields that often lead to higher-paying careers.
        unit: "%"
        short_unit: "%"
        display:
          numDecimalPlaces: 1
          tolerance: 5

      gd_wbl_ovl_law:
        title: "Women, Business and the Law: Legal Framework Index"
        description_short: "The index measures how laws and regulations affect women’s economic opportunity on a scale from 0 to 100, where 100 means full legal equality for women and men. It is the unweighted average of ten topic scores: safety, mobility, work, pay, marriage, parenthood, childcare, entrepreneurship, assets, and pension."
        description_key:
          - The Women, Business and the Law Legal Framework Index summarizes how legal frameworks shape women’s economic opportunities across ten areas of law.
          - "The ten areas are: safety, mobility, work, pay, marriage, parenthood, childcare, entrepreneurship, assets, and pension."
          - Each area score is based on the strength of legal provisions affecting women’s rights in that domain.
          - The index ranges from 0 to 100, where 100 indicates that laws fully support women’s economic equality.
          - The overall score is the unweighted average of the ten area scores.
          - The index captures laws as written (de jure) — it does not measure how effectively those laws are enforced in practice.
          - *desc_standardized_assumptions
        unit: "score (0–100)"
        display:
          numDecimalPlaces: 1
          tolerance: 5
