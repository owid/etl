definitions:
  common:
    presentation:
      topic_tags:
        - Fertilizers
      grapher_config:
        hasMapTab: true
        tab: map
        chartTypes:
          - DiscreteBar
        originUrl: https://ourworldindata.org/fertilizers

  # Subtitles shared across the 4 N + P excess indicators (and their share-of-world variants).
  subtitle_excess_nitrogen: |-
    "Excess nitrogen" is the difference between nutrient inputs (from fertilizers, manure, and fixation from legumes) and the amount harvested in crop material. This represents nitrogen that is lost to the environment and can create ecological imbalances in ecosystems and water bodies.
  subtitle_excess_phosphorus: |-
    "Excess phosphorus" is the difference between nutrient inputs (from fertilizers and manure) and the amount harvested in crop material. This represents phosphorus that is lost to the environment and can create ecological imbalances on ecosystems and in water bodies.
  subtitle_inputs_nitrogen: |-
    Annual inputs include nitrogen from the application of synthetic fertilizers alongside organic inputs from manure and crop fixation.
  subtitle_inputs_phosphorus: |-
    Annual inputs include phosphorous from the application of synthetic fertilizers alongside organic inputs such as manure.

