definitions:
  common:
    processing_level: major
    presentation:
      topic_tags:
        - Food Supply

dataset:
  update_period_days: 365
  title: "Decoupling of agricultural production and land use"

tables:
  decoupling_food_production_and_land_use_total:
    title: "Decoupling of agricultural production and land use"
    variables:
      food_quantity:
        title: "Food supply"
        unit: tonnes
        short_unit: t
      food_energy:
        title: "Food supply in terms of energy content"
        unit: kilocalories
        short_unit: kcal
      population:
        title: "Population"
        unit: persons
        short_unit: ""
      production:
        title: "Total agricultural production"
        unit: tonnes
        short_unit: t
      production_energy:
        title: "Total agricultural production in terms of caloric content"
        unit: kilocalories
        short_unit: kcal
        description_processing: >-
          Production in tonnes is converted to kilocalories using per-capita food supply data as conversion factors.
          To avoid double-counting, the portion of crop production used as domestic animal feed is subtracted before
          the conversion. The domestic share of feed is estimated proportionally:
          domestic_feed = feed x production / (production + imports).
      agricultural_land:
        title: "Agricultural land area"
        unit: hectares
        short_unit: ha
