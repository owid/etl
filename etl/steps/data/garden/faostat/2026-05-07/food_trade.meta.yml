tables:
  food_trade:
    variables:
      value:
        title: Bilateral trade flow
        unit: tonnes
        short_unit: t
        description_short: |-
          Quantity of the item flowing from the exporter to the importer in the export year.
        description_processing: |-
          - When only one country reports, we use that country's reported quantity.
          - When both the exporter and the importer country report a value, we use the importer's quantity, because, according to FAOSTAT's [Food Balance Sheets and Supply Utilization Accounts Resource Handbook 2025](https://openknowledge.fao.org/items/30e641b1-6d57-4998-8e8a-395727aa4307), section 6.1, "imports are typically documented more thoroughly and verified more rigorously than exports". This claim cites the United Nations Statistics Division's [International Merchandise Trade Statistics](https://unstats.un.org/unsd/trade/EG-IMTS/IMTS2010-CM%20-%20white%20cover%20version.pdf).
          - Rows where reporter country is identical to partner country are dropped.
      exporter_production:
        title: Exporter's production
        unit: tonnes
        short_unit: t
        description_short: |-
          Estimated production tonnes of the item in the exporter country, in the export year.
      importer_supply:
        title: Importer's domestic supply
        unit: tonnes
        short_unit: t
        description_short: |-
          Estimated domestic supply of the item in the importer country.
        description_processing: |-
          - We compute domestic supply from the Supply Utilization Accounts using the Food Balance Sheet identity: production plus imports minus exports minus stock variation.
          - We treat non-positive results (zero or negative) as missing, since they cannot serve as the denominator of an import share.
          - We leave domestic supply blank where the recorded imports cover less than 90% of the bilateral trade we observe flowing into the country, because in those cases imports have been under-recorded and the supply would be understated. The bilateral trade data is only used to decide whether to show the figure, never to change it.
