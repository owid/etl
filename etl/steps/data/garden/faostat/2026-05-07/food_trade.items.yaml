# Curated items for the food-trade visualization.
#
# Selection: FAO 'crops & livestock products' (QCL) commodities that are meaningfully traded
# (ranked by number of bilateral flows, tonnage and value), plus widely-recognised processed
# foods (bread, pasta, chocolate, ...). Excludes non-food, residual 'n.e.c.' aggregates, and
# items too obscure to be widely recognised.
#
# Each entry:
#   display:     name shown in the visualization dropdown.
#   item_codes:  FAO commodity item code(s) -> the code's name in FAOSTAT TM (asserted against
#                the snapshot in the garden step). Most items have a single code. A few combine a
#                primary commodity with a mechanically-derived form that trade is split across
#                (beef bone-in + boneless, almonds in-shell + shelled, milled + broken rice, raw +
#                refined sugar). For those, the trade of all codes is summed and the item carries
#                no production or supply context, because summing those would double-count (the
#                derived form is processed from the primary). The first code is the item's id;
#                combined items use 100000 + that code, so the id is never mistaken for a single
#                FAO commodity.
