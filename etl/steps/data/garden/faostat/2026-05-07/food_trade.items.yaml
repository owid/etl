# Curated items for the food-trade visualization.
#
# Each entry is one option in the visualization dropdown. Each entry references a single
# FAO commodity item code — the same codebook used by both TM (trade) and SCL (production).
#
# Each entry:
#   display:    name shown in the visualization dropdown
#   item_code:  FAO commodity item code (TM/SCL codebook, 1-1296 range).
#   fao_item:   the item's name in FAOSTAT TM.
