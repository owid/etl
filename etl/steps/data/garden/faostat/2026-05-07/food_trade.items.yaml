  # ─────────────────────────────────────────────────────────────────────────
  # Meat
  # Each meat item's `item_code` is FAOSTAT's "primary product" trade code,
  # which doubles as the production code in SCL. Trade-side, it captures only
  # the fresh-with-bone cuts (not boneless / frozen / processed); production-
  # side, it represents the country's total output of that meat. The share
  # therefore reads as "fraction of total production exported as fresh bone-in
  # cuts" — partial on the trade side but the denominator is right.
  - display: Beef
    item_code: 867
    fao_item: Meat of cattle with the bone, fresh or chilled
  - display: Pork
    item_code: 1035
    fao_item: Meat of pig with the bone, fresh or chilled
  - display: Chicken meat
    item_code: 1058
    fao_item: Meat of chickens, fresh or chilled
