# Curated items for the food-trade visualization.
#
# Selection: FAO 'crops & livestock products' (QCL) commodities that are meaningfully traded
# (ranked by number of bilateral flows, tonnage and value), plus widely-recognised processed
# foods (bread, pasta, chocolate, ...). Excludes non-food, residual 'n.e.c.' aggregates, and
# items too obscure to be widely recognised. One form per commodity.
#
# Each entry:
#   display:    name shown in the visualization dropdown
#   item_code:  FAO commodity item code (TM/SCL codebook)
#   fao_item:   the item's name in FAOSTAT TM (asserted against the snapshot in the garden step)
