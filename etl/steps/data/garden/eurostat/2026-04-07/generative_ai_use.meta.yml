tables:
  generative_ai_use:
    variables:
      pct_used_genai_16_74:
        title: Share of individuals aged 16-74 who used generative AI tools in the last 3 months
        unit: "%"
        short_unit: "%"
        description_short: Share of individuals aged 16 to 74 who used generative AI tools in the previous three months.
        description_key:
          - This data comes from Eurostat's annual ICT usage survey (the survey on ICT usage in households and by individuals), based on interviews with around 330,000 people across 35 European countries.
          - The question asks respondents whether they have used generative AI tools — such as AI text generators, image generators, or coding assistants — in the previous three months.
          - 2025 is the first year Eurostat included questions on generative AI use in this survey.
        description_from_producer: |-
          Individuals who used generative AI tools in the last 3 months, as a percentage of all individuals aged 16 to 74.

          Generative AI tools include AI systems that generate content such as text, images, code, audio, or video, based on prompts or instructions.
        display:
          numDecimalPlaces: 1
        presentation:
          title_public: Share of adults who used generative AI tools in the last 3 months
      pct_used_genai_16_24:
        title: Share of individuals aged 16-24 who used generative AI tools in the last 3 months
        unit: "%"
        short_unit: "%"
        description_short: Share of individuals aged 16 to 24 who used generative AI tools in the previous three months.
        description_key:
          - This data comes from Eurostat's annual ICT usage survey (the survey on ICT usage in households and by individuals), based on interviews with around 330,000 people across 35 European countries.
          - The question asks respondents whether they have used generative AI tools — such as AI text generators, image generators, or coding assistants — in the previous three months.
          - 2025 is the first year Eurostat included questions on generative AI use in this survey.
        description_from_producer: |-
          Individuals who used generative AI tools in the last 3 months, as a percentage of all individuals aged 16 to 24.

          Generative AI tools include AI systems that generate content such as text, images, code, audio, or video, based on prompts or instructions.
        display:
          numDecimalPlaces: 1
        presentation:
          title_public: Share of young people (16-24) who used generative AI tools in the last 3 months
