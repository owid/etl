# Curated items for the food-trade Sankey viz.
#
# Each entry is one option in the viz dropdown. The list of TM items rolled
# up under each entry is *not* listed here — it is auto-derived at runtime
# from FAOSTAT's own metadata via the FAO item codes embedded in each FBS
# item's "Default composition" description. So the YAML only names which FBS
# item we're tracking; the TM rollup follows by construction.
#
# Each entry:
#   display:        name shown in the dropdown
#   fbs_item_code:  FBS item code. We use the integer code (rather than the
#                   item name) because the codes are stable across FAOSTAT
#                   releases while names occasionally get renamed. Whether the
#                   entry is a commodity or a group total is inferred from the
#                   code itself: code < 2900 → commodity (no share line);
#                   code ≥ 2900 → group total (gets a "% of production /
#                   domestic supply" share line). The trailing `#` comment is
#                   the current FBS item name for human readability only.
#
# TM items in the snapshot that map to NO FBS commodity (industrial / non-food,
# e.g. Cigarettes, Cotton, "Food preparations n.e.c.") are dropped automatically.

items:
  # ─────────────────────────────────────────────────────────────────────────
  # Cereals
  - display: Cereals (total)
    fbs_item_code: 2905  # Cereals - Excluding Beer (group)
  - display: Wheat
    fbs_item_code: 2511  # Wheat and products
  - display: Maize (corn)
    fbs_item_code: 2514  # Maize and products
  - display: Rice
    fbs_item_code: 2807  # Rice and products
