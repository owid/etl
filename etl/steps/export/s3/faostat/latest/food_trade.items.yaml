# Curated items for the food-trade Sankey viz.
#
# Each entry is one option in the viz dropdown. Each entry references a single
# FAO commodity item code — the same codebook used by both TM (trade) and QCL
# (production), so the rollup is a direct integer-code filter against
# `item_code` in the TM data, and the share-of-production denominator (when
# wired) is a direct lookup in QCL.
#
# Each entry:
#   display:    name shown in the dropdown
#   item_code:  FAO commodity item code (TM/QCL codebook, 1-1296 range).
#               Stable across FAOSTAT releases. The trailing `#` comment is
#               the current TM item name for human readability only.
#
# We intentionally stick to raw commodities (no flours, oils, beer, etc.) and
# avoid group totals — these don't have direct QCL Production data, so they
# can't carry a share-of-production line without further machinery.

items:
  # ─────────────────────────────────────────────────────────────────────────
  # Cereals
  - display: Wheat
    item_code: 15    # Wheat
  - display: Maize (corn)
    item_code: 56    # Maize (corn)
  - display: Rice
    item_code: 27    # Rice
  - display: Barley
    item_code: 44    # Barley
  - display: Rye
    item_code: 71    # Rye
  - display: Oats
    item_code: 75    # Oats
  - display: Millet
    item_code: 79    # Millet
  - display: Sorghum
    item_code: 83    # Sorghum

  # ─────────────────────────────────────────────────────────────────────────
