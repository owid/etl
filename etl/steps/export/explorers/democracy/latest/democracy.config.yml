            - 0.799
            - 0.899
            - 1
        columnSlug: "grapher/democracy/2026-03-17/vdem/vdem_multi_with_regions#electfreefair_vdem__estimate_best"
  - dimensions:
      dataset: varieties_of_democracy
      metric: electoral_democracy
