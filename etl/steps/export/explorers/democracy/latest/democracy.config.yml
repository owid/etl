# Democracy explorer — top-level config + canonical dimensions.
# Per-source views live in `democracy.<source>.config.yml`. The Python step
# loads each, calls `paths.create_collection(explorer=True)` to build a
# mini-explorer, and combines them via `combine_collections`. After combine,
# `sort_choices` enforces the canonical dim order from this file.

config:
  explorerTitle: "Democracy"
  explorerSubtitle: "Explore changes in the world's democratic and non-democratic systems."
  isPublished: true
  thumbnail: "https://assets.ourworldindata.org/uploads/2022/06/Democracy-Data-Explorer.png"
  wpBlockId: "51850"
  subNavId: explorers
  subNavCurrentId: "democracy-data"
  hideAlertBanner: true
  hideAnnotationFieldsInTitle: true
  pickerColumnSlugs: []
  selection:
    - "Argentina"
    - "Australia"
    - "Botswana"
    - "China"
    - "World"

dimensions:
  - slug: dataset
    name: "Dataset"
    presentation:
      type: dropdown
    choices:
      - slug: varieties_of_democracy
        name: "Varieties of Democracy"
      - slug: regimes_of_the_world
        name: "Regimes of the World"
      - slug: lexical_index
        name: "Lexical Index"
      - slug: freedom_house
        name: "Freedom House"
      - slug: bertelsmann_transformation_index
        name: "Bertelsmann Transformation Index"
      - slug: economist_intelligence_unit
        name: "Economist Intelligence Unit"
      - slug: polity
        name: "Polity"
  - slug: metric
    name: "Metric"
    presentation:
      type: dropdown
    choices:
