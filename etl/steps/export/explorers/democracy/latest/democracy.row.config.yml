# Mini-explorer for row indicators (used by democracy.py with combine_collections).
# Carries only the views whose `dataset` dimension maps to this upstream source.
# FAUST (title, subtitle, note, map config, etc.) lives in the indicator's
# `presentation.grapher_config` in the corresponding garden meta.yml — Grapher
# inherits it at chart render time. Per-view `config:` here is intentionally empty
# for single-y views; multi-y views keep their combined chart config.

definitions:
  group_subtitle_1: &group_subtitle_1 |-
    Classification by [Lührmann et al. (2018)](#dod:regimes-of-the-world) based on expert estimates by [V-Dem](#dod:v-dem).
  note: &note "The share of closed autocracies increases a lot in 1900 because V-Dem covers many more countries since then, often colonies."
  group_subtitle_2: &group_subtitle_2 "{definitions.group_subtitle_1} Liberal democracies are political systems that hold meaningful, free and fair, and multi-party elections, and their citizens have further individual rights, are equal before the law, and the legislative and the courts constrain the executive."
  group_subtitle_3: &group_subtitle_3 "{definitions.group_subtitle_1} Electoral democracies are political systems that hold meaningful, free and fair, and multi-party elections."

config:
  explorerTitle: "Democracy"
  explorerSubtitle: "Explore changes in the world's democratic and non-democratic systems."
  isPublished: true

dimensions:
  - slug: metric
    name: "Metric"
    presentation:
      type: dropdown
    choices:
      - slug: electoral_democracy
        name: "­Electoral democracy"
      - slug: liberal_democracy
        name: "­Liberal democracy"
      - slug: political_regime
        name: "­Political regime"
      - slug: political_regime_including_ambiguous_categories
        name: "­Political regime, including ambiguous categories"
  - slug: sub_metric
    name: "Sub-metric"
    presentation:
      type: dropdown
    choices:
      - slug: main_classification
        name: "Main classification"
      - slug: number_and_share_of_democracies
        name: "Number and share of democracies"
      - slug: people_living_in_democracies
        name: "People living in democracies"
      - slug: multi_party_elections
        name: "Multi-party elections"
      - slug: multi_party_elections_for_chief_executive
        name: "Multi-party elections for chief executive"
      - slug: multi_party_elections_for_legislature
        name: "Multi-party elections for legislature"
      - slug: free_and_fair_elections
        name: "­Free and fair elections"
      - slug: democratic_electoral_institutions
        name: "Democratic electoral institutions"
      - slug: age_of_electoral_democracy
        name: "Age of electoral democracy"
      - slug: number_and_share_of_long_standing_electoral_democracies
        name: "Number and share of long-standing electoral democracies"
      - slug: transparent_laws
        name: "Transparent laws"
      - slug: access_to_justice_for_men
        name: "Access to justice for men"
      - slug: access_to_justice_for_women
        name: "Access to justice for women"
      - slug: liberal_political_institutions
        name: "­Liberal political institutions"
      - slug: age_of_liberal_democracy
        name: "Age of liberal democracy"
      - slug: number_and_share_of_long_standing_liberal_democracies
        name: "Number and share of long-standing liberal democracies"

views:
  - dimensions:
      metric: political_regime
      sub_metric: main_classification
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#regime_row_owid
  - dimensions:
      metric: political_regime
      sub_metric: number_and_share_of_democracies
    indicators:
      y:
        - catalogPath: vdem_num_countries#num_countries_regime__category_closed_autocracy
          display:
            name: "Closed autocracies"
            color: "#d7191c"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_autocracy
          display:
            name: "Electoral autocracies"
            color: "#ec9d4f"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_democracy
          display:
            name: "Electoral democracies"
            color: "#6da5b8"
        - catalogPath: vdem_num_countries#num_countries_regime__category_liberal_democracy
          display:
            name: "Liberal democracies"
            color: "#2c7bb6"
    config:
      title: "Countries that are democracies and autocracies"
      subtitle: *group_subtitle_1
      note: *note
      type: "StackedDiscreteBar StackedArea"
      stackMode: "relative"
  - dimensions:
      metric: political_regime
      sub_metric: people_living_in_democracies
    indicators:
      y:
        - catalogPath: vdem_population#population_regime__category__1
          display:
            name: "No regime data"
            color: "#555555"
        - catalogPath: vdem_population#population_regime__category_closed_autocracy
          display:
            name: "People living in closed autocracies"
            color: "#d7191c"
        - catalogPath: vdem_population#population_regime__category_electoral_autocracy
          display:
            name: "in electoral autocracies"
            color: "#ec9d4f"
        - catalogPath: vdem_population#population_regime__category_electoral_democracy
          display:
            name: "in electoral democracies"
            color: "#6da5b8"
        - catalogPath: vdem_population#population_regime__category_liberal_democracy
          display:
            name: "in liberal democracies"
            color: "#2c7bb6"
    config:
      title: "People living in democracies and autocracies"
      subtitle: *group_subtitle_1
  - dimensions:
      metric: electoral_democracy
      sub_metric: main_classification
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#regime_redux_row_owid
  - dimensions:
      metric: electoral_democracy
      sub_metric: multi_party_elections
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#electmulpar_row__estimate_best
  - dimensions:
      metric: electoral_democracy
      sub_metric: multi_party_elections_for_chief_executive
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#electmulpar_hoe_row_owid__estimate_best
  - dimensions:
      metric: electoral_democracy
      sub_metric: multi_party_elections_for_legislature
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#electmulpar_leg_row__estimate_best
  - dimensions:
      metric: electoral_democracy
      sub_metric: free_and_fair_elections
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#electfreefair_row__estimate_best
  - dimensions:
      metric: electoral_democracy
      sub_metric: democratic_electoral_institutions
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#electdem_dich_row_owid__estimate_best
  - dimensions:
      metric: electoral_democracy
      sub_metric: age_of_electoral_democracy
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#num_years_in_electdem_consecutive
  - dimensions:
      metric: electoral_democracy
      sub_metric: number_and_share_of_long_standing_electoral_democracies
    indicators:
      y:
        - catalogPath: vdem_num_countries#num_countries_regime__category_closed_autocracy
          display:
            name: "Closed autocracies"
            color: "#8d6e71"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_autocracy
          display:
            name: "Electoral autocracies"
            color: "#c6a1a5"
        - catalogPath: vdem_num_countries#num_countries_years_in_electdem__category_1_18_years
          display:
            name: "Electoral democracies aged 1-18"
            color: "#edf8b1"
        - catalogPath: vdem_num_countries#num_countries_years_in_electdem__category_19_30_years
          display:
            name: "aged 19-30"
            color: "#c7e9b4"
        - catalogPath: vdem_num_countries#num_countries_years_in_electdem__category_31_60_years
          display:
            name: "aged 31-60"
            color: "#41b6c4"
        - catalogPath: vdem_num_countries#num_countries_years_in_electdem__category_61_90_years
          display:
            name: "aged 61-90"
            color: "#225ea8"
        - catalogPath: vdem_num_countries#num_countries_years_in_electdem__category_91plus_years
          display:
            name: "aged 91 +"
            color: "#172976"
    config:
      title: "Countries that are long-standing electoral democracies"
      subtitle: *group_subtitle_3
      note: *note
      stackMode: "relative"
  - dimensions:
      metric: liberal_democracy
      sub_metric: main_classification
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#regime_row_owid
    config:
      title: "Liberal democracy"
      subtitle: *group_subtitle_2
      map:
        colorScale:
          baseColorScheme: "RdYlBu"
          binningStrategy: "manual"
          customNumericColors:
            - "#8d6e71"
            - "#c6a1a5"
            - "#f3d0d4"
            - 
          customNumericLabels:
            - "Closed autocracy"
            - "Electoral autocracy"
            - "Electoral democracy"
            - "Liberal democracy"
          customNumericValues:
            - 0
            - 0
            - 1
            - 2
            - 3
          customNumericColorsActive: true
        columnSlug: "grapher/democracy/2026-03-17/vdem/vdem_uni_without_regions#regime_row_owid"
        tooltipUseCustomLabels: true
  - dimensions:
      metric: liberal_democracy
      sub_metric: transparent_laws
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#transplaws_row__estimate_best
  - dimensions:
      metric: liberal_democracy
      sub_metric: access_to_justice_for_men
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#accessjust_m_row__estimate_best
  - dimensions:
      metric: liberal_democracy
      sub_metric: access_to_justice_for_women
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#accessjust_w_row__estimate_best
  - dimensions:
      metric: liberal_democracy
      sub_metric: liberal_political_institutions
    indicators:
      y:
        - catalogPath: vdem_multi_without_regions#lib_dich_row__estimate_best
  - dimensions:
      metric: liberal_democracy
      sub_metric: age_of_liberal_democracy
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#num_years_in_libdem_consecutive
  - dimensions:
      metric: liberal_democracy
      sub_metric: number_and_share_of_long_standing_liberal_democracies
    indicators:
      y:
        - catalogPath: vdem_num_countries#num_countries_regime__category_closed_autocracy
          display:
            name: "Closed autocracies"
            color: "#8d6e71"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_autocracy
          display:
            name: "Electoral autocracies"
            color: "#c6a1a5"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_democracy
          display:
            name: "Electoral democracies"
            color: "#f3d0d4"
        - catalogPath: vdem_num_countries#num_countries_years_in_libdem__category_1_18_years
          display:
            name: "Liberal democracies aged 1-18"
            color: "#edf8b1"
        - catalogPath: vdem_num_countries#num_countries_years_in_libdem__category_19_30_years
          display:
            name: "aged 19-30"
            color: "#c7e9b4"
        - catalogPath: vdem_num_countries#num_countries_years_in_libdem__category_31_60_years
          display:
            name: "aged 31-60"
            color: "#41b6c4"
        - catalogPath: vdem_num_countries#num_countries_years_in_libdem__category_61_90_years
          display:
            name: "aged 60-90"
            color: "#225ea8"
        - catalogPath: vdem_num_countries#num_countries_years_in_libdem__category_91plus_years
          display:
            name: "aged 91 +"
            color: "#172976"
    config:
      title: "Countries that are long-standing liberal democracies"
      subtitle: *group_subtitle_2
      note: *note
      stackMode: "relative"
  - dimensions:
      metric: political_regime_including_ambiguous_categories
      sub_metric: main_classification
    indicators:
      y:
        - catalogPath: vdem_uni_without_regions#regime_amb_row_owid
  - dimensions:
      metric: political_regime_including_ambiguous_categories
      sub_metric: number_and_share_of_democracies
    indicators:
      y:
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_closed_autocracy
          display:
            name: "Closed autocracies"
            color: "#d7191c"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_closed__maybe_electoral__autocracy
          display:
            name: "Probably closed autocracies"
            color: "#e74731"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_electoral__maybe_closed__autocracy
          display:
            name: "Probably electoral autocracy"
            color: "#f88e52"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_autocracy
          display:
            name: "Electoral autocracies"
            color: "#fdae61"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_electoral_autocracy__maybe_electoral_democracy
          display:
            name: " Probably electoral autocracy"
            color: "#f0cda5"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_electoral_democracy__maybe_electoral_autocracy
          display:
            name: " Probably electoral democracy"
            color: "#d0dcc1"
        - catalogPath: vdem_num_countries#num_countries_regime__category_electoral_democracy
          display:
            name: "Electoral democracies"
            color: "#abd9e9"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_electoral_democracy__maybe_liberal_democracy
          display:
            name: "Probably electoral democracy"
            color: "#8dc1dc"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_liberal_democracy__maybe_electoral_democracy
          display:
            name: "Probably liberal democracy"
            color: "#5496c5"
        - catalogPath: vdem_num_countries#num_countries_regime_amb__category_liberal_democracy
          display:
            name: "Liberal democracies"
            color: "#2c7bb6"
    config:
      title: "Countries that are democracies and autocracies"
      subtitle: *group_subtitle_1
      note: *note
      type: "StackedDiscreteBar StackedArea"
      stackMode: "relative"
  - dimensions:
      metric: political_regime_including_ambiguous_categories
      sub_metric: people_living_in_democracies
    indicators:
      y:
        - catalogPath: vdem_population#population_regime_amb__category__1
          display:
            name: "No regime data"
            color: "#555555"
        - catalogPath: vdem_population#population_regime_amb__category_closed_autocracy
          display:
            name: "People living in closed autocracies"
            color: "#d7191c"
        - catalogPath: vdem_population#population_regime_amb__category_closed__maybe_electoral__autocracy
          display:
            name: "in probably closed aut."
            color: "#e74731"
        - catalogPath: vdem_population#population_regime_amb__category_electoral__maybe_closed__autocracy
          display:
            name: "in probably elect. aut."
            color: "#f88e52"
        - catalogPath: vdem_population#population_regime_amb__category_electoral_autocracy
          display:
            name: "in electoral autocracies"
            color: "#fdae61"
        - catalogPath: vdem_population#population_regime_amb__category_electoral_autocracy__maybe_electoral_democracy
          display:
            name: " in probably elect. aut."
            color: "#f0cda5"
        - catalogPath: vdem_population#population_regime_amb__category_electoral_democracy__maybe_electoral_autocracy
          display:
            name: "in probably elect. dem."
            color: "#d0dcc1"
        - catalogPath: vdem_population#population_regime_amb__category_electoral_democracy
          display:
            name: "in electoral democracies"
            color: "#abd9e9"
        - catalogPath: vdem_population#population_regime_amb__category_electoral_democracy__maybe_liberal_democracy
          display:
            name: " in probably elect. dem."
            color: "#8dc1dc"
        - catalogPath: vdem_population#population_regime_amb__category_liberal_democracy__maybe_electoral_democracy
          display:
            name: "in probably lib. dem."
            color: "#5496c5"
        - catalogPath: vdem_population#population_regime_amb__category_liberal_democracy
          display:
            name: "in liberal democracies"
            unit: "people"
            color: "#2c7bb6"
    config:
      title: "People living in democracies and autocracies"
      subtitle: *group_subtitle_1
