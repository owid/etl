# Mini-explorer for vdem indicators (used by democracy.py with combine_collections).
# Carries only the views whose `dataset` dimension maps to this upstream source.
# FAUST (title, subtitle, note, map config, etc.) lives in the indicator's
# `presentation.grapher_config` in the corresponding garden meta.yml — Grapher
# inherits it at chart render time. Per-view `config:` here is intentionally empty
# for single-y views; multi-y views keep their combined chart config.

config:
  explorerTitle: "Democracy"
  explorerSubtitle: "Explore changes in the world's democratic and non-democratic systems."
  isPublished: true

dimensions:
  - slug: dataset
    name: "Dataset"
    presentation:
      type: dropdown
    choices:
      - slug: varieties_of_democracy
        name: "Varieties of Democracy"
      - slug: regimes_of_the_world
        name: "Regimes of the World"
  - slug: metric
    name: "Metric"
    presentation:
      type: dropdown
    choices:
      - slug: electoral_democracy
        name: "Electoral democracy"
      - slug: liberal_democracy
        name: "Liberal democracy"
      - slug: participatory_democracy
        name: "Participatory democracy"
      - slug: deliberative_democracy
        name: "Deliberative democracy"
      - slug: egalitarian_democracy
        name: "Egalitarian democracy"
      - slug: varieties_of_democracy
        name: "Varieties of democracy"
      - slug: political_regime
        name: "Political regime"
      - slug: political_regime_including_ambiguous_categories
        name: "Political regime, including ambiguous categories"
  - slug: sub_metric
    name: "Sub-metric"
    presentation:
      type: dropdown
    choices:
      - slug: main_index
        name: "Main index"
      - slug: elected_political_leaders_index
        name: "Elected political leaders index"
      - slug: share_of_adult_citizens_who_have_the_right_to_vote
        name: "Share of adult citizens who have the right to vote"
      - slug: free_and_fair_elections_index
        name: "Free and fair elections index"
      - slug: freedom_of_association_index
        name: "Freedom of association index"
      - slug: freedom_of_expression_index
        name: "Freedom of expression index"
      - slug: electoral_democracy_index
        name: "Electoral democracy index"
      - slug: liberal_political_institutions_index
        name: "Liberal political institutions index"
      - slug: individual_liberties_and_equality_before_the_law_index
        name: "Individual liberties and equality before the law index"
      - slug: judicial_constraints_on_the_executive_index
        name: "Judicial constraints on the executive index"
      - slug: legislative_constraints_on_the_executive_index
        name: "Legislative constraints on the executive index"
      - slug: participatory_political_institutions_index
        name: "Participatory political institutions index"
      - slug: strong_elected_regional_governments_index
        name: "Strong elected regional governments index"
      - slug: strong_elected_local_governments_index
        name: "Strong elected local governments index"
      - slug: civil_society_participation_index
        name: "Civil society participation index"
      - slug: direct_popular_voting_index
        name: "Direct popular voting index"
      - slug: deliberative_political_institutions_index
        name: "Deliberative political institutions index"
      - slug: justified_political_positions_score
        name: "Justified political positions score"
      - slug: common_good_justifications_score
        name: "Common good justifications score"
      - slug: respect_for_counterarguments_score
        name: "Respect for counterarguments score"
      - slug: elite_consultations_score
        name: "Elite consultations score"
      - slug: engaged_society_score
        name: "Engaged society score"
      - slug: egalitarian_political_institutions_index
        name: "Egalitarian political institutions index"
      - slug: equal_rights_protection_index
        name: "Equal rights protection index"
      - slug: equal_access_to_power_index
        name: "Equal access to power index"
      - slug: equal_resource_distribution_index
        name: "Equal resource distribution index"
      - slug: main_indices
        name: "Main indices"
      - slug: main_classification
        name: "Main classification"
      - slug: number_and_share_of_democracies
        name: "Number and share of democracies"
