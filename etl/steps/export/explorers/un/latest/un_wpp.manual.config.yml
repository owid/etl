      sex: male
      variant: estimates
    indicators:
      y:
        - catalogPath: un_wpp/deaths#deaths__sex_male__age_0_4__variant_estimates
  # See note on infant_deaths above: projection-first order, medium-only, grouped
  # with estimates for dashing.
  - dimensions:
      indicator: child_deaths
      age: 0-4
      sex: all
      variant: medium
    indicators:
      y:
        - catalogPath: un_wpp/deaths#deaths__sex_all__age_0_4__variant_medium
        - catalogPath: un_wpp/deaths#deaths__sex_all__age_0_4__variant_estimates
  - dimensions:
      indicator: child_deaths
      age: 0-4
      sex: female
      variant: medium
    indicators:
      y:
        - catalogPath: un_wpp/deaths#deaths__sex_female__age_0_4__variant_medium
        - catalogPath: un_wpp/deaths#deaths__sex_female__age_0_4__variant_estimates
  - dimensions:
      indicator: child_deaths
      age: 0-4
      sex: male
      variant: medium
    indicators:
      y:
        - catalogPath: un_wpp/deaths#deaths__sex_male__age_0_4__variant_medium
        - catalogPath: un_wpp/deaths#deaths__sex_male__age_0_4__variant_estimates

  # Mortality rates
  #
  # NOTE on projection scenarios: `infant_mortality_rate` and `child_mortality_rate`
  # (and, for the same reason, `life_expectancy`) will look nearly identical across
  # the Low / Medium / High projection variants. That is NOT a pipeline bug: UN WPP's
  # low / medium / high scenarios differ only in their *fertility* assumptions, while
  # the mortality trajectory is shared across all three. The source file
  # (WPP2024_GEN_F01_DEMOGRAPHIC_INDICATORS_FULL.xlsx) publishes the same mortality
  # values against each fertility variant. We keep all three variants wired up here
  # so the explorer honestly reflects what UN WPP publishes, even though the chart
  # looks unchanged when the user toggles the scenario.
      age: "0"
      sex: all
      variant: estimates
    indicators:
      y:
        - catalogPath: grapher/un/2024-07-12/un_wpp/mortality_rate#mortality_rate__sex_all__age_0__variant_estimates
          <<: *display_mortality_rate
  - dimensions:
      indicator: child_mortality_rate
      age: 0-4
      sex: all
      variant: estimates
    indicators:
      y:
        - catalogPath: grapher/un/2024-07-12/un_wpp/mortality_rate#mortality_rate__sex_all__age_0_4__variant_estimates
          <<: *display_mortality_rate

  # Projection views combine projection + estimates as two y-indicators (projection
  # first; see note on infant_deaths above) so grapher renders a solid→dashed
  # transition on the line chart and combines the two columns on the map tab.
  # Data exists for all three projection scenarios (low/medium/high).
  - dimensions:
      indicator: infant_mortality_rate
      age: "0"
      sex: all
      variant: low
    indicators:
      y:
        - catalogPath: un_wpp/mortality_rate#mortality_rate__sex_all__age_0__variant_low
          <<: *display_mortality_rate
        - catalogPath: un_wpp/mortality_rate#mortality_rate__sex_all__age_0__variant_estimates
          <<: *display_mortality_rate

  - dimensions:
      indicator: child_mortality_rate
      age: 0-4
      sex: all
      variant: low
    indicators:
      y:
