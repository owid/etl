topic_tags:
  - Population Growth

definitions:
  display_mortality_rate: &display_mortality_rate
    display:
      colorScaleNumericBins: 0.1;0.2;0.5;1;2;5;10;1
      colorScaleScheme: "OrRd"
  common_views:
    # Age structure
    - dimensions:
        indicator: age_structure
      config:
        title: Age structure
        subtitle: Population broken down by age group.
        type: StackedDiscreteBar
        hasMapTab: false
        stackMode: relative
    - dimensions:
        indicator: age_structure
        sex: female
      config:
        title: Female age structure
        subtitle: Female population broken down by age group.
    - dimensions:
        indicator: age_structure
        sex: male
      config:
        title: Male age structure
        subtitle: Male population broken down by age group.
    # Population by age group
    - dimensions:
        indicator: population_broad
      config:
        title: Population by age group
        type: StackedArea
        hasMapTab: false
        selectedFacetStrategy: entity
        hideRelativeToggle: false
    - dimensions:
        indicator: population_broad
        sex: female
      config:
        title: Female population by age group
    - dimensions:
        indicator: population_broad
        sex: male
      config:
        title: Male population by age group
    # Growth rate
    - dimensions:
        indicator: growth_rate
      config:
        title: Population growth rate
    # Natural growth rate
    - dimensions:
        indicator: natural_change_rate
      config:
        title: Natural population growth rate
    # Infant deaths
    - dimensions:
        indicator: infant_deaths
      config:
        title: Number of infants who die before age 1
    - dimensions:
        indicator: infant_deaths
        sex: female
      config:
        title: Number of girls who die before age 1
    - dimensions:
        indicator: infant_deaths
        sex: male
      config:
        title: Number of boys who die before age 1
    # Infant mortality rate
    - dimensions:
        indicator: infant_mortality_rate
        # sex: all
      config:
        title: Infant mortality rate

    # Child deaths
    - dimensions:
        indicator: child_deaths
      config:
        title: Number of children who die before age 5
    - dimensions:
        indicator: child_deaths
        sex: female
      config:
        title: Number of girls who die before age 5
    - dimensions:
        indicator: child_deaths
        sex: male
      config:
        title: Number of boys who die before age 5
    # Child mortality rate
    - dimensions:
        indicator: child_mortality_rate
      config:
        title: Child mortality rate

config:
  explorerTitle: "Population & Demography"
  explorerSubtitle: "Explore data from the United Nations World Population Prospects."
  wpBlockId: 52216
  hasMapTab: true
  thumbnail: "https://owid.cloud/app/uploads/2022/07/Population-Data-Explorer.png"
  isPublished: true

dimensions:
  - slug: indicator
    name: indicator
    choices:
      - slug: infant_deaths
        name: Infant deaths
      - slug: infant_mortality_rate
        name: Infant mortality rate
      - slug: child_deaths
        name: Child deaths
      - slug: child_mortality_rate
        name: Child mortality rate
      - slug: age_structure
        name: Age structure
      - slug: population_broad
        name: Population by age group

  - slug: sex
    name: Sex
    choices:
      - slug: all
        name: Both sexes
        description: null
      - slug: female
        name: Female
        description: null
      - slug: male
        name: Male
        description: null
    presentation:
      type: radio

  - slug: age
    name: Age
    choices:
      - slug: all
        name: Total
        description: null
      - slug: "0"
        name: Under 1 year
        description: null
      - slug: "0-4"
        name: Under 5 years
        description: null

  - slug: variant
    name: Projection scenario
    choices:
      - slug: estimates
        name: None
        description: null
      - slug: low
        name: Low
        description: null
      - slug: medium
        name: Medium
        description: null
      - slug: high
        name: High
        description: null
    presentation:
      type: radio

