  # Projection views combine projection + estimates as two y-indicators so
  # grapher renders a solid→dashed transition on the line chart AND the map tab
  # auto-combines them into the full 1950–2100 series (see
  # ViewEditor._apply_grouped_view_metadata for why the projection column is
  # listed first).
  # No low/high entries: UN WPP only publishes deaths counts for the medium
  # projection scenario.
  - dimensions:
      indicator: infant_deaths
      age: "0"
      sex: all
      variant: medium
    indicators:
      y:
        - catalogPath: un_wpp/deaths#deaths__sex_all__age_0__variant_medium
        - catalogPath: un_wpp/deaths#deaths__sex_all__age_0__variant_estimates
  - dimensions:
