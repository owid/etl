config:
  explorerTitle: Environmental Impacts of Food
  explorerSubtitle: Explore the land use, carbon, and water footprints of food products.
  isPublished: true
  hasMapTab: false
  hideAlertBanner: true
  hideAnnotationFieldsInTitle: true
  entityType: food
  thumbnail: https://assets.ourworldindata.org/uploads/2022/08/Env-Impacts-of-Food-Data-Explorer.png
  wpBlockId: "52428"
  subNavId: explorers
  subNavCurrentId: food-footprints
  selection:
    - Almonds
    - Bacon
    - Bananas
    - Beans
    - Beef (beef herd)
    - Beef (dairy herd)
    - Beefburger
    - Cheese
    - Cow's milk
    - Eggs
    - Lamb & Mutton
    - Maize
    - Milk
    - Peas
    - Penne pasta
    - Pig Meat
    - Pizza
    - Poultry Meat
    - Prawns (farmed)
    - Rice
    - Steak pie
    - Tofu
    - Tomatoes
    - Vegetable lasagne
    - Wheat & Rye

definitions:
  common_views:
    - config:
        type: DiscreteBar
        baseColorScheme: owid-distinct
    - dimensions:
        view_type: commodity
      config:
        sourceDesc: "Poore and Nemecek (2018). Reducing food’s environmental impacts through producers and consumers. Science."
    - dimensions:
        view_type: specific_food_product
      config:
        sourceDesc: Michael Clark et al (2022). Estimating the environmental impacts of 57,000 food products. PNAS.

dimensions:
  - slug: view_type
    name: Commodity or Specific Food Product
    presentation:
      type: radio
    choices:
      - slug: commodity
        name: Commodity
      - slug: specific_food_product
        name: Specific food products
  - slug: impact
    name: Environmental Impact
    presentation:
      type: dropdown
    choices:
      - slug: carbon
        name: Carbon footprint
      - slug: land_use
        name: Land use
      - slug: water
        name: Water use
      - slug: water_scarcity
        name: Scarcity-weighted water use
      - slug: eutrophication
        name: Eutrophication
      - slug: all_impacts
        name: All impacts (facet)
  - slug: unit
    name: Kilogram / Protein / Calories
    presentation:
      type: dropdown
    choices:
      - slug: per_kg
        name: Per kilogram
      - slug: per_100g_protein
        name: Per 100 grams of protein
      - slug: per_1000kcal
        name: Per 1000 kilocalories
      - slug: per_100g_fat
        name: Per 100 grams of fat
      - slug: compare_units
        name: Compare nutritional units
  - slug: by_stage
    name: By stage of supply chain
    presentation:
      type: checkbox
      choice_slug_true: stages
    choices:
      - slug: combined
        name: ""
      - slug: stages
        name: By stage of supply chain

views:
  # ============================================================================
  # COMMODITY views (Poore & Nemecek 2018) — 16 single/multi-indicator views
  # ============================================================================

  # ----- Carbon footprint -----
  - dimensions:
      view_type: commodity
      impact: carbon
      unit: per_kg
      by_stage: combined
    indicators:
      y:
        - catalogPath: grapher/food/2019-10-08/environmental_impacts_of_food__poore__and__nemecek__2018/environmental_impacts_of_food__poore__and__nemecek__2018#ghg_emissions_per_kilogram__poore__and__nemecek__2018
    config:
      title: Greenhouse gas emissions per kilogram of food product
      subtitle: "[Greenhouse gas emissions](#dod:ghgemissions) are measured in kilograms of [carbon dioxide-equivalents](#dod:carbondioxideequivalents). This means non-CO₂ gases are weighted by the amount of warming they cause over a 100-year timescale."

  - dimensions:
      view_type: commodity
      impact: carbon
      unit: per_kg
      by_stage: stages
    indicators:
      y:
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_land_use
