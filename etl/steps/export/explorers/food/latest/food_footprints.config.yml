        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_animal_feed
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_processing
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_transport
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_retail
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_packaging
        - catalogPath: grapher/food/2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018/food_emissions_by_life_cycle_stage__poore_and_nemecek__2018#food_emissions_losses
    config:
      type: StackedDiscreteBar
      title: "Food: greenhouse gas emissions across the supply chain"
      subtitle: "[Greenhouse gas emissions](#dod:ghgemissions) are measured in kilograms of [carbon dioxide-equivalents (CO₂eq)](#dod:carbondioxideequivalents) per kilogram of food."

  - dimensions:
      view_type: commodity
      impact: carbon
      unit: per_100g_protein
