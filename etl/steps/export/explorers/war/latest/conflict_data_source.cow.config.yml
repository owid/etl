config:
  explorerTitle: "Conflict Data Source"
  explorerSubtitle: "Explore the world's conflicts through the leading approaches to measuring them."
  isPublished: true
definitions:
  common_views:
    - config:
        yAxisMin: 0
        hideAnnotationFieldsInTitle: true
        chartTypes:
          - "LineChart"
          - "DiscreteBar"
dimensions:
  - slug: conflict_type
    name: "Conflict type"
    presentation:
      type: dropdown
    choices:
      - slug: all_armed_conflicts
        name: "All armed conflicts"
      - slug: all_state_based_conflicts
        name: "All state-based conflicts"
      - slug: interstate_conflicts
        name: "Interstate conflicts"
      - slug: intrastate_conflicts
        name: "Intrastate conflicts"
      - slug: extrastate_conflicts
        name: "Extrastate conflicts"
      - slug: non_state_conflicts
        name: "Non-state conflicts"
  - slug: measure
    name: "Measure"
    presentation:
      type: dropdown
    choices:
      - slug: conflict_deaths
        name: "Conflict deaths"
      - slug: death_rate
        name: "Death rate"
      - slug: number_of_conflicts
        name: "Number of conflicts"
      - slug: conflict_rate
        name: "Conflict rate"
      - slug: conflict_participants
        name: "Conflict participants"
      - slug: conflict_locations
        name: "Conflict locations"
  - slug: conflict_sub_type
    name: "Conflict sub-type"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: by_sub_type
        name: "By sub-type"
      - slug: all_sub_types
        name: "All sub-types"
      - slug: only_non_internationalized_conflicts
        name: "Only non-internationalized conflicts"
      - slug: only_internationalized_conflicts
        name: "Only internationalized conflicts"
  - slug: sub_measure
    name: "Sub-measure"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: regional_data
        name: "Regional data"
      - slug: all_ongoing_conflicts
        name: "All ongoing conflicts"
      - slug: only_new_conflicts
        name: "Only new conflicts"
      - slug: country_level_data
        name: "Country-level data"
views:
  - dimensions:
      conflict_type: "all_armed_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "by_sub_type"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: "grapher/war/2023-09-21/cow/cow#number_deaths_ongoing_conflicts__conflict_type_intra_state__internationalized"
        - catalogPath: "grapher/war/2023-09-21/cow/cow#number_deaths_ongoing_conflicts__conflict_type_intra_state__non_internationalized"
        - catalogPath: "grapher/war/2023-09-21/cow/cow#number_deaths_ongoing_conflicts__conflict_type_non_state"
        - catalogPath: "grapher/war/2023-09-21/cow/cow#number_deaths_ongoing_conflicts__conflict_type_extra_state"
        - catalogPath: "grapher/war/2023-09-21/cow/cow#number_deaths_ongoing_conflicts__conflict_type_inter_state"
    config:
      title: "Deaths in wars"
      subtitle: "Included are deaths of combatants due to fighting, disease, and starvation in [interstate](#dod:interstate-war-cow), [intrastate](#dod:intrastate-war-cow), [extrastate](#dod:extrastate-war-cow), and [non-state](#dod:nonstate-war-cow) wars that were ongoing that year."
      chartTypes:
        - "StackedBar"
      baseColorScheme: "stackedAreaDefault"
      hideRelativeToggle: false
  - dimensions:
