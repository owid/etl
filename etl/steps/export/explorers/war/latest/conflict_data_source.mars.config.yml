config:
  explorerTitle: "Conflict Data Source"
  explorerSubtitle: "Explore the world's conflicts through the leading approaches to measuring them."
  isPublished: true
definitions:
  common_views:
    - config:
        yAxisMin: 0
        hideAnnotationFieldsInTitle: true
        chartTypes:
          - "LineChart"
          - "DiscreteBar"
dimensions:
  - slug: conflict_type
    name: "Conflict type"
    presentation:
      type: dropdown
    choices:
      - slug: all_state_based_conflicts
        name: "All state-based conflicts"
      - slug: interstate_conflicts
        name: "Interstate conflicts"
      - slug: intrastate_conflicts
        name: "Intrastate conflicts"
  - slug: measure
    name: "Measure"
    presentation:
      type: dropdown
    choices:
      - slug: conflict_deaths
        name: "Conflict deaths"
      - slug: death_rate
        name: "Death rate"
      - slug: number_of_conflicts
        name: "Number of conflicts"
      - slug: conflict_rate
        name: "Conflict rate"
      - slug: conflict_participants
        name: "Conflict participants"
  - slug: conflict_sub_type
    name: "Conflict sub-type"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: all_sub_types
        name: "All sub-types"
      - slug: by_sub_type
        name: "By sub-type"
  - slug: sub_measure
    name: "Sub-measure"
    presentation:
      type: dropdown
    choices:
      - slug: regional_data
        name: "Regional data"
      - slug: all_ongoing_conflicts
        name: "All ongoing conflicts"
      - slug: only_new_conflicts
        name: "Only new conflicts"
      - slug: country_level_data
        name: "Country-level data"
views:
  - dimensions:
      conflict_type: "all_state_based_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "all_sub_types"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_low__conflict_type_all"
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_high__conflict_type_all"
    config:
      title: "Deaths in wars"
      subtitle: "Included are deaths of combatants due to fighting in [conventional wars](#dod:conventional-war-mars) that were ongoing that year."
      yScaleToggle: true
      selectedFacetStrategy: "entity"
  - dimensions:
      conflict_type: "all_state_based_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "by_sub_type"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_low__conflict_type_civil_war"
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_low__conflict_type_others__non_civil"
    config:
      title: "Deaths in wars"
      subtitle: "Included are deaths of combatants due to fighting in [interstate](#dod:interstate-war-mars) and [civil](#dod:civil-war-mars) wars that were ongoing that year."
      chartTypes:
        - "StackedBar"
      baseColorScheme: "stackedAreaDefault"
      hideRelativeToggle: false
  - dimensions:
      conflict_type: "all_state_based_conflicts"
      measure: "death_rate"
      conflict_sub_type: "all_sub_types"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_low_per_capita__conflict_type_all"
        - catalogPath: "grapher/war/2023-09-21/mars/mars#number_deaths_ongoing_conflicts_high_per_capita__conflict_type_all"
    config:
      title: "Death rate in wars"
      subtitle: "Deaths of combatants due to fighting, per 100,000 people. Included are [conventional wars](#dod:conventional-war-mars) that were ongoing that year."
      yScaleToggle: true
