definitions:
  common_views:
    - config:
        yAxisMin: 0
        hideAnnotationFieldsInTitle: true
        type: LineChart DiscreteBar
        entityType: country
        relatedQuestionText: How do different approaches measure armed conflicts and their deaths?
        relatedQuestionUrl: https://ourworldindata.org/conflict-data-how-do-researchers-measure-armed-conflicts-and-their-deaths
config:
  explorerTitle: Conflict Data Source
  explorerSubtitle: Explore the world's conflicts through the leading approaches to measuring them.
  isPublished: true
  selection:
    - World
  subNavId: explorers
  subNavCurrentId: conflict-data-source
  entityType: region
  hideAnnotationFieldsInTitle: true
  yAxisMin: 0
dimensions:
  - slug: data_source
    name: Data source
    presentation:
      type: dropdown
    choices:
      - slug: ucdp
        name: Uppsala Conflict Data Program
      - slug: ucdp_prio
        name: UCDP + PRIO
      - slug: mars
        name: Project Mars
      - slug: mie
        name: Militarized Interstate Events
      - slug: cow
        name: Correlates of War – Wars
      - slug: cow_mid
        name: Correlates of War — Militarized Interstate Disputes
      - slug: prio
        name: Peace Research Institute Oslo
  - slug: conflict_type
    name: "Conflict type"
    presentation:
      type: dropdown
    choices:
      - slug: all_armed_conflicts
        name: "All armed conflicts"
      - slug: all_state_based_conflicts
        name: "All state-based conflicts"
      - slug: interstate_conflicts
        name: "Interstate conflicts"
      - slug: intrastate_conflicts
        name: "Intrastate conflicts"
      - slug: extrastate_conflicts
        name: "Extrastate conflicts"
      - slug: non_state_conflicts
        name: "Non-state conflicts"
      - slug: one_sided_violence
        name: "One-sided violence"
  - slug: measure
    name: "Measure"
    presentation:
      type: dropdown
    choices:
      - slug: conflict_deaths
        name: "Conflict deaths"
      - slug: death_rate
        name: "Death rate"
      - slug: number_of_conflicts
        name: "Number of conflicts"
      - slug: conflict_rate
        name: "Conflict rate"
      - slug: conflict_locations
        name: "Conflict locations"
      - slug: conflict_participants
        name: "Conflict participants"
  - slug: conflict_sub_type
    name: "Conflict sub-type"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: by_sub_type
        name: "By sub-type"
      - slug: all_sub_types
        name: "All sub-types"
      - slug: only_non_internationalized_conflicts
        name: "Only non-internationalized conflicts"
      - slug: only_internationalized_conflicts
        name: "Only internationalized conflicts"
      - slug: only_wars
        name: "Only wars"
  - slug: sub_measure
    name: "Sub-measure"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: country_and_region_data
        name: "Country and region data"
      - slug: all_ongoing_conflicts
        name: "All ongoing conflicts"
      - slug: only_new_conflicts
        name: "Only new conflicts"
      - slug: regional_data
        name: "Regional data"
      - slug: country_level_data
        name: "Country-level data"

views:
  # == MIE ==
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "na"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: mie#number_deaths_ongoing_conflicts_high__hostility_level_all
          display:
            name: High estimate
            color: "#B13507"
        - catalogPath: mie#number_deaths_ongoing_conflicts_low__hostility_level_all
          display:
            name: Low estimate
            color: "#00295B"
    config:
      title: "Deaths in interstate conflicts"
      subtitle: "Included are deaths of combatants due to fighting between states that year."
      yScaleToggle: true
      selectedFacetStrategy: "entity"
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "death_rate"
      conflict_sub_type: "na"
      sub_measure: "regional_data"
    indicators:
      y:
        - catalogPath: mie#number_deaths_ongoing_conflicts_low_per_capita__hostility_level_all
          display:
            name: Low estimate
            color: "#00295B"
        - catalogPath: mie#number_deaths_ongoing_conflicts_high_per_capita__hostility_level_all
          display:
            name: High estimate
            color: "#B13507"
    config:
      title: "Death rate in interstate conflicts"
      subtitle: "Deaths of combatants due to fighting between states that year, per 100,000 people."
      yScaleToggle: true
      selectedFacetStrategy: "entity"
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "all_sub_types"
      sub_measure: "all_ongoing_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_all
    config:
      title: "Number of interstate conflicts"
      subtitle: "Included are conflicts between states where force was [threatened, displayed, used](#dod:force-mic), or escalated to a [war](#dod:interstate-war-mic) that year."
      note: "The number of states has increased a lot over time. Some conflicts affect several regions. The sum across all regions can therefore be higher than the global number."
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "by_sub_type"
      sub_measure: "all_ongoing_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_threat_to_use_force
          display:
            name: Threats of force
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_display_of_force
          display:
            name: Displays of force
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_use_of_force
          display:
            name: Uses of force
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_war
          display:
            name: Wars
    config:
      title: "Number of interstate conflicts"
      subtitle: "Included are conflicts between states where force was [threatened, displayed, used](#dod:force-mic), or escalated to a [war](#dod:interstate-war-mic) that year."
      note: "The number of states has increased a lot over time. Some conflicts affect several regions. The sum across all regions can therefore be higher than the global number."
      baseColorScheme: "stackedAreaDefault"
      hideRelativeToggle: false
      type: StackedBar
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "only_wars"
      sub_measure: "all_ongoing_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_ongoing_conflicts__hostility_level_war
          display:
            name: Wars
    config:
      title: "Number of interstate wars"
      subtitle: "Included are [interstate wars](#dod:interstate-war-mic) that were ongoing that year."
      note: "Some wars affect several regions. The sum across all regions can therefore be higher than the global number."
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "all_sub_types"
      sub_measure: "only_new_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_new_conflicts__hostility_level_all
    config:
      title: "Number of new interstate conflicts"
      subtitle: "Included are conflicts between states where force was [threatened, displayed, used](#dod:force-mic), or escalated to a [war](#dod:interstate-war-mic) that year for the first time."
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "by_sub_type"
      sub_measure: "only_new_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_new_conflicts__hostility_level_threat_to_use_force
          display:
            name: Threats of force
        - catalogPath: mie#number_new_conflicts__hostility_level_display_of_force
          display:
            name: Displays of force
        - catalogPath: mie#number_new_conflicts__hostility_level_use_of_force
          display:
            name: Uses of force
        - catalogPath: mie#number_new_conflicts__hostility_level_war
          display:
            name: Wars
    config:
      title: "Number of new intrastate conflicts"
      subtitle: "Included are conflicts between states where force was [threatened, displayed, used](#dod:force-mic), or escalated to a [war](#dod:interstate-war-mic) that year for the first time."
      note: "Some conflicts affect several regions, and do not necessarily start at the same time across them. The sum across all regions can therefore be higher than the global number."
      baseColorScheme: "stackedAreaDefault"
      hideRelativeToggle: false
      type: StackedBar
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "number_of_conflicts"
      conflict_sub_type: "only_wars"
      sub_measure: "only_new_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_new_conflicts__hostility_level_war
          display:
            name: Wars
    config:
      title: "Number of new interstate wars"
      subtitle: "Included are [interstate wars](#dod:interstate-war-mic) that started that year."
  - dimensions:
      data_source: mie
      conflict_type: "interstate_conflicts"
      measure: "conflict_rate"
      conflict_sub_type: "all_sub_types"
      sub_measure: "all_ongoing_conflicts"
    indicators:
      y:
        - catalogPath: mie#number_ongoing_conflicts_per_country_pair__hostility_level_all
    config:
      title: "Rate of interstate conflicts"
      subtitle: "The number of conflicts divided by the number of all state-pairs. This accounts for the changing number of states over time. Included are conflicts between states where force was [threatened, displayed, used](#dod:force-mic), or escalated to a [war](#dod:interstate-war-mic) that year."
