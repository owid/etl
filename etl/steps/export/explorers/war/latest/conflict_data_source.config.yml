      subtitle: "Included are states that participated in at least one conflict with another state where force was [threatened, displayed, or used](#dod:force-mic) that year."
      note: "Some states are not shown in the map because they do not exist anymore."
      hasMapTab: true
      tab: "map"
      selectedFacetStrategy: "entity"

  # == COW-MID ==
