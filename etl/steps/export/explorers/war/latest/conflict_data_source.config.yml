definitions:
  common_views:
    - config:
        yAxisMin: 0
        hideAnnotationFieldsInTitle: true
        type: LineChart DiscreteBar
        entityType: country
        relatedQuestionText: How do different approaches measure armed conflicts and their deaths?
        relatedQuestionUrl: https://ourworldindata.org/conflict-data-how-do-researchers-measure-armed-conflicts-and-their-deaths
config:
  explorerTitle: Conflict Data Source
  explorerSubtitle: Explore the world's conflicts through the leading approaches to measuring them.
  isPublished: true
  selection:
    - World
  subNavId: explorers
  subNavCurrentId: conflict-data-source
  entityType: region
  hideAnnotationFieldsInTitle: true
  yAxisMin: 0
dimensions:
  - slug: data_source
    name: Data source
    presentation:
      type: dropdown
    choices:
      - slug: ucdp
        name: Uppsala Conflict Data Program
      - slug: ucdp_prio
        name: UCDP + PRIO
      - slug: mars
        name: Project Mars
      - slug: mie
        name: Militarized Interstate Events
      - slug: cow
        name: Correlates of War – Wars
      - slug: cow_mid
        name: Correlates of War — Militarized Interstate Disputes
      - slug: prio
        name: Peace Research Institute Oslo
  - slug: conflict_type
    name: "Conflict type"
    presentation:
      type: dropdown
    choices:
      - slug: all_armed_conflicts
        name: "All armed conflicts"
      - slug: all_state_based_conflicts
        name: "All state-based conflicts"
      - slug: interstate_conflicts
        name: "Interstate conflicts"
      - slug: intrastate_conflicts
        name: "Intrastate conflicts"
      - slug: extrastate_conflicts
        name: "Extrastate conflicts"
      - slug: non_state_conflicts
        name: "Non-state conflicts"
      - slug: one_sided_violence
        name: "One-sided violence"
  - slug: measure
    name: "Measure"
    presentation:
      type: dropdown
    choices:
      - slug: conflict_deaths
        name: "Conflict deaths"
      - slug: death_rate
        name: "Death rate"
      - slug: number_of_conflicts
        name: "Number of conflicts"
      - slug: conflict_rate
        name: "Conflict rate"
      - slug: conflict_locations
        name: "Conflict locations"
      - slug: conflict_participants
        name: "Conflict participants"
  - slug: conflict_sub_type
    name: "Conflict sub-type"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: by_sub_type
        name: "By sub-type"
      - slug: all_sub_types
        name: "All sub-types"
      - slug: only_non_internationalized_conflicts
        name: "Only non-internationalized conflicts"
      - slug: only_internationalized_conflicts
        name: "Only internationalized conflicts"
      - slug: only_wars
        name: "Only wars"
  - slug: sub_measure
    name: "Sub-measure2"
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ""
      - slug: country_and_region_data
        name: "Country and region data"
      - slug: all_ongoing_conflicts
        name: "All ongoing conflicts"
      - slug: only_new_conflicts
        name: "Only new conflicts"
      - slug: regional_data
        name: "Regional data"
      - slug: country_level_data
        name: "Country-level data"

views:
  # == UCDP ==
  - dimensions:
      data_source: ucdp
      conflict_type: "all_armed_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "by_sub_type"
      sub_measure: "country_and_region_data"
    indicators:
      y:
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_one_sided_violence
          display:
            name: One-sided violence
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_non_state_conflict
          display:
            name: Non-state
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_intrastate
          display:
            name: Intrastate
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_extrasystemic
          display:
            name: Extrasystemic
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_interstate
          display:
            name: Interstate
    config:
      title: "Deaths in armed conflicts based on where they occurred"
      subtitle: "Included are deaths of combatants and civilians due to fighting in [interstate](#dod:interstate-ucdp), [intrastate](#dod:intrastate-ucdp), [extrasystemic](#dod:extrasystemic-ucdp), [non-state](#dod:nonstate-ucdp) conflicts, and [one-sided violence](#dod:onesided-ucdp) that were ongoing that year."
      baseColorScheme: "stackedAreaDefault"
      hideRelativeToggle: false
      selectedFacetStrategy: "entity"
      type: StackedBar
  - dimensions:
      data_source: ucdp
      conflict_type: "all_armed_conflicts"
      measure: "conflict_deaths"
      conflict_sub_type: "all_sub_types"
      sub_measure: "country_and_region_data"
    indicators:
      y:
        - catalogPath: ucdp#number_deaths_ongoing_conflicts__conflict_type_all
          display:
            name: Best estimate
            color: "#B13507"
        - catalogPath: ucdp#number_deaths_ongoing_conflicts_low__conflict_type_all
          display:
            name: Low estimate
            color: "#C3AEA6"
        - catalogPath: ucdp#number_deaths_ongoing_conflicts_high__conflict_type_all
          display:
            name: High estimate
            color: "#C3AEA6"
    config:
      title: "Deaths in armed conflicts based on where they occurred"
      subtitle: "Included are deaths of combatants and civilians due to fighting in [armed conflicts](#dod:armed-conflict-ucdp) that were ongoing that year."
      note: "'Best' estimates as identified by UCDP."
      hasMapTab: true
      tab: "map"
      selectedFacetStrategy: "entity"
  - dimensions:
      data_source: ucdp
      conflict_type: "all_armed_conflicts"
      measure: "death_rate"
      conflict_sub_type: "by_sub_type"
      sub_measure: "country_and_region_data"
    indicators:
      y:
