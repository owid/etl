      y:
        - catalogPath: "grapher/war/2023-09-21/prio_v31/prio_v31#number_deaths_ongoing_conflicts_battle__conflict_type_all"
        - catalogPath: "grapher/war/2023-09-21/prio_v31/prio_v31#number_deaths_ongoing_conflicts_battle_low__conflict_type_all"
        - catalogPath: "grapher/war/2023-09-21/prio_v31/prio_v31#number_deaths_ongoing_conflicts_battle_high__conflict_type_all"
    config:
      title: "Deaths in state-based conflicts"
      subtitle: "Included are deaths of combatants and civilians due to fighting in [interstate](#dod:interstate-ucdp), [intrastate](#dod:intrastate-ucdp), and [extrasystemic](#dod:extrasystemic-ucdp) conflicts that were ongoing that year."
      note: "'Best' estimates as identified by UCDP."
