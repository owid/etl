views:
  - dimensions:
      rate: per_capita
      metric: gdp
      region: global
      sub_metric: ''
    indicators:
      y:
        - catalogPath: global#gdp_per_capita
          display:
            type: Currency
            annotationsColumnSlug: annotation
    config:
      title: Global GDP per capita
      subtitle: |-
        Gross domestic product (GDP) is measured in 2005 international-dollars. This means it is adjusted for inflation and cross-country price differences.
  - dimensions:
      rate: total
      metric: gdp
      region: global
      sub_metric: ''
    indicators:
      y:
