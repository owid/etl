    indicators:
      y:
        - catalogPath: excess_fertilizers__west_et_al__2014#total_applied_phosphorous

  - dimensions:
      input: total
      nutrient: phosphorous
      metric: applied_per_ha
      share_world: absolute
    indicators:
      y:
        - catalogPath: excess_fertilizers__west_et_al__2014#phosphorous_applied_rate

  - dimensions:
      input: total
      nutrient: phosphorous
      metric: excess_total
      share_world: absolute
    indicators:
      y:
        - catalogPath: excess_fertilizers__west_et_al__2014#excess_phosphorous_total

  - dimensions:
      input: total
      nutrient: phosphorous
      metric: excess_per_ha
      share_world: absolute
