definitions:
  common_view: &common_view
    type: LineChart DiscreteBar
    hasMapTab: true
    yScaleToggle: false
    hideTitleAnnotation: true
    baseColorScheme: owid-distinct
    yAxisMin: 0

  # Subtitles + notes reused across views.
  reserves_subtitle: &reserves_subtitle |-
    Proved reserves are fuels that are known with reasonable certainty to be recoverable in the future from known reservoirs under existing economic and operating conditions.
  net_imports_subtitle_gas: &net_imports_subtitle_gas |-
    Net imports is calculated as total imports minus total exports. This includes all forms of dry natural gas, including liquified natural gas (LNG). Vented and flared gas are not included. A negative value indicates that a country exports more than it imports.
  net_imports_subtitle_coal: &net_imports_subtitle_coal |-
    Net imports is calculated as total imports minus total exports. A negative value indicates that a country exports more than it imports.
  net_imports_subtitle_oil: &net_imports_subtitle_oil |-
    Net imports is calculated as total imports minus total exports. A negative value indicates that a country exports more than it imports.
  gas_note: &gas_note |-
    This includes all forms of dry natural gas, including liquified natural gas (LNG). Vented and flared gas are not included.
  coal_note: &coal_note |-
    This includes five coal types: anthracite, metallurgical, bituminous, subbituminous, and lignite.
  crude_oil_note: &crude_oil_note |-
    This includes the production of crude oil, including lease condensate.

  # ---- Map color schemes (preserved from the old natural-resources explorer). ----
  # These are attached to each indicator's display block so the map view picks them up.

  # Totals — flows (production / consumption / imports / exports). Same scheme & bins per fuel.
  oil_flow_total_colors: &oil_flow_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 10000000,,;50000000,,;100000000,,;500000000,,;1000000000,,;5000000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  gas_flow_total_colors: &gas_flow_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: Purples
    colorScaleNumericBins: 1000000000,,;5000000000,,;10000000000,,;50000000000,,;100000000000,,;500000000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  coal_flow_total_colors: &coal_flow_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: YlOrBr
    colorScaleNumericBins: 1000000,,;5000000,,;10000000,,;50000000,,;100000000,,;500000000,,;1000000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false

  # Totals — reserves.
  oil_reserves_total_colors: &oil_reserves_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 100000000,,;500000000,,;1000000000,,;5000000000,,;10000000000,,;50000000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  gas_reserves_total_colors: &gas_reserves_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: Purples
    colorScaleNumericBins: 100000000000,,;500000000000,,;1000000000000,,;500000000000,,;10000000000000,,;50000000000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  coal_reserves_total_colors: &coal_reserves_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: YlOrBr
    colorScaleNumericBins: 1000000000,,;2000000000,,;5000000000,,;10000000000,,;20000000000,,;50000000000,,;100000000000,,;200000000000,,;500000000000,,
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false

  # Totals — net imports (diverging RdBu, no NumericMinValue: bins span 0).
  oil_net_imports_total_colors: &oil_net_imports_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -100000000,,;-10000000,,;-1000000,,;-100000,,;0,,;100000,,;1000000,,;10000000,,;100000000
    colorScaleEqualSizeBins: true
    colorScaleInvert: false
  gas_net_imports_total_colors: &gas_net_imports_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -100000000000,,;-10000000000,,;-1000000000,,;-100000000,,;0,,;100000000,,;1000000000,,;10000000000,,;100000000000
    colorScaleEqualSizeBins: true
    colorScaleInvert: false
  coal_net_imports_total_colors: &coal_net_imports_total_colors
    numDecimalPlaces: 0
    type: Integer
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -100000000,,;-10000000,,;-1000000,,;-100000,,;0,,;100000,,;1000000,,;10000000,,;100000000
    colorScaleEqualSizeBins: true
    colorScaleInvert: false

  # Per capita — flows.
  oil_flow_pc_colors: &oil_flow_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 0.01,,;0.1,,;1,,;10,,;100
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  gas_flow_pc_prodcons_colors: &gas_flow_pc_prodcons_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: Purples
    colorScaleNumericBins: 10,,;50,,;100,,;,,;500,,;1000,,;5000,,;10000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  gas_flow_pc_impexp_colors: &gas_flow_pc_impexp_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: Purples
    colorScaleNumericBins: 10,,;50,,;100,,;,,;500,,;1000,,;5000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  coal_flow_pc_colors: &coal_flow_pc_colors  # production / imports / exports per capita
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: YlOrBr
    colorScaleNumericBins: 0.01,,;0.1,,;1,,;10,,;100
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  coal_consumption_pc_colors: &coal_consumption_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: YlOrBr
    colorScaleNumericBins: 0.01,,;0.1,,;1,,;10
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false

  # Per capita — reserves.
  oil_reserves_pc_colors: &oil_reserves_pc_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 1,,;10,,;50,,;100,,;500,,;1000,,;5000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  gas_reserves_pc_colors: &gas_reserves_pc_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: Purples
    colorScaleNumericBins: 100,,;,,;500,,;1000,,;5000,,;10000,,;50000,,;100000,,;500000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  coal_reserves_pc_colors: &coal_reserves_pc_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: YlOrBr
    colorScaleNumericBins: 1,,;3,,;10,,;30,,;100,,;300,,;1000,,;3000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false

  # Monthly oil production (special-case dimension only meaningful for oil).
  oil_production_monthly_total_colors: &oil_production_monthly_total_colors
    numDecimalPlaces: 0
    type: Numeric
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 500000,,;1000000,,;5000000,,;10000000,,;50000000,,;100000000,,;500000000
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  oil_production_monthly_pc_colors: &oil_production_monthly_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: OrRd
    colorScaleNumericBins: 0.01,,;0.1,,;1,,;10,,;100
    colorScaleEqualSizeBins: true
    colorScaleNumericMinValue: 0
    colorScaleInvert: false
  monthly_oil_note: &monthly_oil_note |-
    Monthly production is allocated to the first day of each month: so, December 2019 production is allocated to 1st December 2019. This includes the production of crude oil, including lease condensate.

  # Per capita — net imports (diverging).
  oil_net_imports_pc_colors: &oil_net_imports_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -10,,;-5,,;-1,,;-0.5,,;-0.1,,;-0.05,,;0,,;0.05,,;0.1,,;0.5,,;1,,;5,,;10
    colorScaleEqualSizeBins: true
    colorScaleInvert: false
  gas_net_imports_pc_colors: &gas_net_imports_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -0.5,,;-0.25,,;-0.1,,;-0.075,,;-0.05,,;-0.01,,;0,,;0.01,,;0.05,,;0.075,,;0.1,,;0.25,,;0.5
    colorScaleEqualSizeBins: true
    colorScaleInvert: false
  coal_net_imports_pc_colors: &coal_net_imports_pc_colors
    numDecimalPlaces: 2
    type: Numeric
    tolerance: 2
    colorScaleScheme: RdBu
    colorScaleNumericBins: -0.5,,;-0.25,,;-0.1,,;-0.075,,;-0.05,,;-0.01,,;0,,;0.01,,;0.05,,;0.075,,;0.1,,;0.25,,;0.5
    colorScaleEqualSizeBins: true
    colorScaleInvert: false

config:
  explorerTitle: Fossil Fuels
  explorerSubtitle: Explore reserves, production, trade, and consumption of fossil fuels.
  originUrl: https://ourworldindata.org/fossil-fuels
  isPublished: true
  hideAlertBanner: true
  hasMapTab: true
  yAxisMin: 0
  hideTitleAnnotation: true
  tab: map
  thumbnail: https://assets.ourworldindata.org/uploads/2022/03/Fossil-Fuels-Data-Explorer.png
  selection:
    - United States
    - Russia
    - Norway
    - United Kingdom
    - Germany
    - Sweden
    - China

dimensions:
  - slug: resource
    name: Resource
    presentation:
      type: dropdown
    choices:
      - {slug: oil, name: Oil}
      - {slug: natural_gas, name: Natural gas}
      - {slug: coal, name: Coal}
  - slug: metric
    name: Metric
    presentation:
      type: dropdown
    choices:
      - {slug: reserves, name: Reserves}
      - {slug: production, name: Production}
      - {slug: consumption, name: Consumption}
      - {slug: imports, name: Imports}
      - {slug: exports, name: Exports}
      - {slug: net_imports, name: Net imports}
      - {slug: monthly_production, name: Monthly Production}
  - slug: count
    name: Count
    presentation:
      type: radio
    choices:
      - {slug: total, name: Total}
      - {slug: per_capita, name: Per capita}

views:
  # ---------- Oil ----------
  - dimensions: {resource: oil, metric: reserves, count: total}
    indicators:
      y:
        - catalogPath: fossil_fuels#oil_reserves
          display:
            <<: *oil_reserves_total_colors
    config:
      <<: *common_view
      title: Crude oil reserves
      subtitle: *reserves_subtitle

  - dimensions: {resource: oil, metric: reserves, count: per_capita}
