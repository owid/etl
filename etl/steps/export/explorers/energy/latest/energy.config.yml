definitions:
  common_views:
    - config:
        hasMapTab: true
config:
  explorerTitle: Energy
  explorerSubtitle: Explore data on energy production and sources.
  downloadDataLink: https://github.com/owid/energy-data
  isPublished: true
  selection:
    - United States
    - United Kingdom
    - China
    - World
    - India
    - Brazil
    - South Africa
  subNavId: energy
  subNavCurrentId: energy-data-explorer
  thumbnail: https://assets.ourworldindata.org/uploads/2022/12/Energy-data-explorer-Thumbnail.png
  hideAnnotationFieldsInTitle: true
dimensions:
  - slug: view
    name: Total or breakdown
    presentation:
      type: radio
    choices:
      - slug: total
        name: Total
      - slug: breakdown
        name: Select a source
  - slug: source
    name: Source
    presentation:
      type: dropdown
    choices:
      - slug: na
        name: ''
      - slug: fossil_fuels
        name: Fossil fuels
      - slug: coal
        name: Coal
      - slug: oil
        name: Oil
      - slug: gas
        name: Gas
      - slug: low_carbon
        name: Low-carbon
      - slug: nuclear
        name: Nuclear
      - slug: renewables
        name: Renewables
      - slug: hydropower
        name: Hydropower
      - slug: solar
        name: Solar
      - slug: wind
        name: Wind
      - slug: solar_and_wind
        name: Solar and wind
  - slug: energy_or_electricity
    name: Energy or electricity
    presentation:
      type: radio
    choices:
      - slug: primary_energy
        name: Primary energy
      - slug: electricity_only
        name: Electricity only
  - slug: metric
    name: Metric
    presentation:
      type: dropdown
    choices:
      - slug: annual_consumption
        name: Annual consumption
      - slug: per_capita_consumption
        name: Per capita consumption
      - slug: rel_change_from_previous_year
        name: Rel. change from previous year
      - slug: abs_change_from_previous_year
        name: Abs. change from previous year
      - slug: annual_generation
        name: Annual generation
      - slug: per_capita_generation
        name: Per capita generation
      - slug: net_electricity_imports
        name: Net electricity imports
      - slug: annual_demand
        name: Annual demand
      - slug: electricity_imports_share_of_demand
        name: Electricity imports as a share of demand
      - slug: carbon_intensity
        name: Carbon intensity
      - slug: share_of_total
        name: Share of total
      - slug: share_of_total_generation
        name: Share of total generation
views:
  - dimensions:
      view: total
      source: na
      energy_or_electricity: primary_energy
      metric: annual_consumption
    indicators:
      y:
        - catalogPath: primary_energy_consumption#primary_energy_consumption__twh
    config:
      title: Primary energy consumption
      subtitle: |-
        [Primary energy](#dod:primaryenergy) consumption is measured in [terawatt-hours](#dod:watt-hours), using the [substitution method](#dod:substitutionmethod).
      note: |-
        Data includes only commercially-traded fuels (coal, oil, gas), nuclear and modern renewables. It does not include traditional biomass.
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: primary_energy
      metric: per_capita_consumption
    indicators:
      y:
        - catalogPath: primary_energy_consumption#primary_energy_consumption_per_capita__kwh
    config:
      title: Energy use per person
      subtitle: |-
        Measured in [kilowatt-hours](#dod:watt-hours) per person. Here, energy refers to [primary energy](#dod:primaryenergy) using the [substitution method](#dod:substitutionmethod).
      tab: map
      defaultView: 'true'
  - dimensions:
      view: total
      source: na
      energy_or_electricity: primary_energy
      metric: rel_change_from_previous_year
    indicators:
      y:
        - catalogPath: primary_energy_consumption#annual_change_in_primary_energy_consumption__pct
    config:
      title: Annual change in primary energy consumption
      subtitle: |-
        Change in [primary energy](#dod:primaryenergy) consumption as a percentage of the consumption of the previous year, using the [substitution method](#dod:substitutionmethod).
  - dimensions:
      view: total
      source: na
      energy_or_electricity: primary_energy
      metric: abs_change_from_previous_year
    indicators:
      y:
        - catalogPath: primary_energy_consumption#annual_change_in_primary_energy_consumption__twh
    config:
      title: Absolute annual change in primary energy consumption
      subtitle: |-
        Annual change in [primary energy](#dod:primaryenergy) consumption in one year, relative to the previous year. Energy is measured in [terawatt-hours](#dod:watt-hours), using the [substitution method](#dod:substitutionmethod).
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: annual_generation
    indicators:
      y:
        - catalogPath: electricity_mix#total_generation__twh
    config:
      title: Electricity generation
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: per_capita_generation
    indicators:
      y:
        - catalogPath: electricity_mix#per_capita_total_generation__kwh
    config:
      title: Per capita electricity generation
      subtitle: |-
        Annual average electricity generation per person, measured in [kilowatt-hours](#dod:watt-hours).
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: net_electricity_imports
    indicators:
      y:
        - catalogPath: electricity_mix#total_net_imports__twh
    config:
      title: Net electricity imports
      subtitle: |-
        Net electricity imports are calculated as electricity imports minus exports. Countries with positive values are net importers of electricity; negative values are net exporters. Measured in [terawatt-hours](#dod:watt-hours).
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: annual_demand
    indicators:
      y:
        - catalogPath: electricity_mix#total_demand__twh
    config:
      title: Electricity demand
      subtitle: |-
        Electricity demand is measured in [terawatt-hours](#dod:watt-hours), as total electricity generation, adjusted for electricity imports and exports.
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: electricity_imports_share_of_demand
    indicators:
      y:
        - catalogPath: electricity_mix#net_imports_share_of_demand__pct
    config:
      title: Net electricity imports as a share of electricity demand
      subtitle: |-
        Net electricity imports are calculated as electricity imports minus exports. This is given as a share of a country's electricity demand. Countries with positive values are net importers of electricity; negative values are net exporters.
      tab: discrete-bar
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: carbon_intensity
    indicators:
      y:
        - catalogPath: electricity_mix#co2_intensity__gco2_kwh
    config:
      title: Lifecycle carbon intensity of electricity
      subtitle: |-
        Measured in grams of [carbon dioxide-equivalents](#dod:carbondioxideequivalents) emitted per [kilowatt-hour](#dod:watt-hours) of electricity generated. Emissions are estimated on a lifecycle basis, including upstream, supply chain and manufacturing stages, and cover all greenhouse gases.
      tab: map
  - dimensions:
      view: total
      source: na
      energy_or_electricity: electricity_only
      metric: share_of_total
    indicators:
      y:
        - catalogPath: electricity_mix#total_electricity_share_of_primary_energy__pct
    config:
      title: Electricity as a share of primary energy
      subtitle: |-
        Share of electricity generation as a percentage of total, direct [primary energy](#dod:primaryenergy) consumption.
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: primary_energy
      metric: annual_consumption
    indicators:
      y:
        - catalogPath: energy_mix#fossil_fuels__twh
    config:
      title: Fossil fuel consumption
      subtitle: |-
        Measured in [terawatt-hours](#dod:watt-hours).
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: primary_energy
      metric: per_capita_consumption
    indicators:
      y:
        - catalogPath: energy_mix#fossil_fuels_per_capita__kwh
    config:
      title: Fossil fuel consumption per capita
      subtitle: |-
        Fossil fuel consumption per capita is measured as the average annual consumption of energy from coal, oil and gas, in [kilowatt-hours](#dod:watt-hours) per person.
      tab: discrete-bar
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: primary_energy
      metric: share_of_total
    indicators:
      y:
        - catalogPath: energy_mix#fossil_fuels__pct_equivalent_primary_energy
    config:
      title: Share of primary energy consumption from fossil fuels
      subtitle: |-
        Measured as a percentage of [primary energy](#dod:primaryenergy), using the [substitution method](#dod:substitutionmethod).
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: primary_energy
      metric: rel_change_from_previous_year
    indicators:
      y:
        - catalogPath: energy_mix#fossil_fuels__pct_growth
    config:
      title: Annual percentage change in fossil fuel consumption
      subtitle: |-
        Percentage change in fossil energy consumption relative to the previous year. This is the sum of energy from coal, oil and gas.
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: primary_energy
      metric: abs_change_from_previous_year
    indicators:
      y:
        - catalogPath: energy_mix#fossil_fuels__twh_growth
    config:
      title: Annual change in fossil fuel consumption
      subtitle: |-
        Change in fossil energy consumption, measured in [terawatt-hours](#dod:watt-hours), relative to the previous year. This is the sum of energy from coal, oil and gas.
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: electricity_only
      metric: annual_generation
    indicators:
      y:
        - catalogPath: electricity_mix#fossil_generation__twh
    config:
      title: Electricity generation from fossil fuels
      tab: map
  - dimensions:
      view: breakdown
      source: fossil_fuels
      energy_or_electricity: electricity_only
      metric: per_capita_generation
    indicators:
      y:
        - catalogPath: electricity_mix#per_capita_fossil_generation__kwh
    config:
      title: Per capita electricity generation from fossil fuels
      tab: map
  - dimensions:
