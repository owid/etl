      metric: share_of_total
    indicators:
      y:
        - catalogPath: energy_mix#nuclear__pct_equivalent_primary_energy
    config:
      title: Share of primary energy consumption from nuclear
      subtitle: |-
        Measured as a percentage of [primary energy](#dod:primaryenergy) using the [substitution method](#dod:substitutionmethod).
