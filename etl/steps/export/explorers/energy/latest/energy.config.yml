        - catalogPath: energy_mix#low_carbon_energy__twh__equivalent
    config:
      title: Low-carbon energy consumption
      subtitle: |-
        Measured in [terawatt-hours](#dod:watt-hours) of [primary energy](#dod:primaryenergy), using the [substitution method](#dod:substitutionmethod). Low-carbon energy is the sum of nuclear and renewable sources. Renewables include hydropower, solar, wind, geothermal, wave and tidal and bioenergy, but not traditional biofuels.
      tab: map
  - dimensions:
      view: breakdown
      source: low_carbon
      energy_or_electricity: primary_energy
      metric: per_capita_consumption
    indicators:
      y:
        - catalogPath: energy_mix#low_carbon_energy_per_capita__kwh__equivalent
