      source: fossil_fuels
      energy_or_electricity: electricity_only
      metric: share_of_total_generation
    indicators:
      y:
        - catalogPath: electricity_mix#fossil_share_of_electricity__pct
    config:
      title: Share of electricity production from fossil fuels
      tab: map
  - dimensions:
      view: breakdown
      source: coal
