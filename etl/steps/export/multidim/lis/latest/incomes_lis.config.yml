title:
  title: Incomes across the distribution
  title_variant: Luxembourg Income Study
topic_tags:
  - Economic Inequality

default_selection:
  - United States
  - United Kingdom
  - Germany
  - Canada
  - Japan
  - Brazil

default_dimensions:
  indicator: thr
  decile: all
  welfare_type: dhi
  period: month

definitions:
  common_views:
    - config:
        originUrl: ourworldindata.org/economic-inequality

dimensions:
  - name: Indicator
    slug: indicator
    choices:
      - slug: mean
        name: Mean income
      - slug: median
        name: Median income
      - slug: avg
        name: Mean income, by decile
      - slug: thr
        name: Income threshold for each decile
        description: The income level below which 10%, 20%, 30%, etc. of the population falls
      - slug: share
        name: Income share of each decile
        description: The share of income received by each income group

  - name: Group
    slug: decile
    description: The population is divided into 10 equal groups (deciles), ranked by income, from poorest to richest
    choices:
      - slug: "1"
        name: "Poorest 10%"
      - slug: "5"
        name: "Median"
      - slug: "9"
        name: "Richest 10% "
      - slug: "10"
        name: "Richest 10%"
      - slug: all
        name: All deciles
      # - slug: all_bar
      #   name: All deciles (bar chart)
      - slug: "10_40_50"
        name: Poorest 50%, middle 40% and richest 10%
      # - slug: "10_40_50_bar"
      #   name: Richest and poorest groups (bar chart)
      - slug: nan
        name: ""

  - name: Income measure
    slug: welfare_type
    choices:
      - slug: dhi
        name: After taxes and benefits
      - slug: mi
        name: Before taxes and benefits
      - slug: before_vs_after
        name: Before vs. after taxes and benefits

  - name: Period
    slug: period
    choices:
      - slug: "day"
        name: "Per day"
      - slug: "month"
        name: "Per month"
      - slug: "year"
        name: "Per year"
      - slug: "nan"
        name: ""

views:
  - dimensions:
      indicator: share
      decile: "10_40_50"
      period: nan
      welfare_type: dhi
    indicators:
      y:
        - catalogPath: inequality#share_top_10__welfare_type_dhi__equivalence_scale_square_root
          display:
            name: "Richest 10%"
        - catalogPath: inequality#share_middle_40__welfare_type_dhi__equivalence_scale_square_root
          display:
            name: "Middle 40%"
        - catalogPath: inequality#share_bottom_50__welfare_type_dhi__equivalence_scale_square_root
          display:
            name: "Poorest 50%"
    config:
      title: Distribution of income across richer and poorer groups (after tax)
      subtitle: The share of income received by different income groups. Income here is measured after taxes and benefits.
      note: ""
      hasMapTab: false
      chartTypes: ["StackedArea"]
      selectedFacetStrategy: entity
      baseColorScheme: OwidCategoricalE
    metadata:
      description_short: "The share of income received by different income groups: the richest 10%, the poorest 50% and the 40% in the middle. Income here is measured after taxes and benefits."

  - dimensions:
      indicator: share
      decile: "10_40_50"
      period: nan
      welfare_type: mi
    indicators:
      y:
        - catalogPath: inequality#share_top_10__welfare_type_mi__equivalence_scale_square_root
          display:
            name: "Richest 10%"
        - catalogPath: inequality#share_middle_40__welfare_type_mi__equivalence_scale_square_root
          display:
            name: "Middle 40%"
        - catalogPath: inequality#share_bottom_50__welfare_type_mi__equivalence_scale_square_root
          display:
            name: "Poorest 50%"
    config:
      title: Distribution of income across richer and poorer groups (before tax)
      subtitle: The share of income received by different income groups. Income here is measured before taxes and benefits.
      note: ""
      hasMapTab: false
      chartTypes: ["StackedArea"]
      selectedFacetStrategy: entity
      baseColorScheme: OwidCategoricalE
    metadata:
      description_short: "The share of income received by different income groups: the richest 10%, the poorest 50% and the 40% in the middle. Income here is measured before taxes and benefits."

