steps:
  ######################################################################################################################
  # Auxiliary FAOSTAT RL step with basic processing, used by the population dataset to generate population density.
  data://garden/faostat/2024-03-14/faostat_rl_auxiliary:
    - snapshot://faostat/2024-03-14/faostat_rl.zip
  ######################################################################################################################
  #
  # FAOSTAT meadow steps for version 2025-03-17
  #
  data://meadow/faostat/2025-03-17/faostat_fs:
    - snapshot://faostat/2025-03-17/faostat_fs.zip
  data://grapher/faostat/2025-03-17/faostat_fs:
    - data://garden/faostat/2025-03-17/faostat_fs:
      - data://garden/demography/2024-07-15/population
      - data://meadow/faostat/2025-03-17/faostat_fs
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/regions/2023-01-01/regions
      - data://garden/faostat/2025-03-17/faostat_metadata:
        - data://meadow/faostat/2025-03-17/faostat_cisp:
          - snapshot://faostat/2025-03-17/faostat_cisp.zip
        - data://meadow/faostat/2025-03-17/faostat_rl:
          - snapshot://faostat/2025-03-17/faostat_rl.zip
        - data://meadow/faostat/2025-03-17/faostat_lc:
          - snapshot://faostat/2025-03-17/faostat_lc.zip
        - data://meadow/faostat/2025-03-17/faostat_fbsh:
          - snapshot://faostat/2025-03-17/faostat_fbsh.zip
        - data://meadow/faostat/2025-03-17/faostat_metadata:
          - snapshot://faostat/2025-03-17/faostat_metadata.json
        - data://meadow/faostat/2025-03-17/faostat_rp:
          - snapshot://faostat/2025-03-17/faostat_rp.zip
        - data://meadow/faostat/2025-03-17/faostat_sdgb:
          - snapshot://faostat/2025-03-17/faostat_sdgb.zip
        - data://meadow/faostat/2025-03-17/faostat_qv:
          - snapshot://faostat/2025-03-17/faostat_qv.zip
        - data://meadow/faostat/2025-03-17/faostat_fs
        - data://meadow/faostat/2025-03-17/faostat_rfn:
          - snapshot://faostat/2025-03-17/faostat_rfn.zip
        - data://meadow/faostat/2025-03-17/faostat_qi:
          - snapshot://faostat/2025-03-17/faostat_qi.zip
        - data://meadow/faostat/2025-03-17/faostat_fbs:
          - snapshot://faostat/2025-03-17/faostat_fbs.zip
        - data://meadow/faostat/2025-03-17/faostat_qcl:
          - snapshot://faostat/2025-03-17/faostat_qcl.zip
  #
  # Global food explorer.
  #
  export://explorers/faostat/latest/global_food:
    - data://grapher/faostat/2026-02-25/faostat_qcl:
      - data://garden/faostat/2026-02-25/faostat_qcl
    - data://grapher/faostat/2026-02-25/faostat_fbsc:
      - data://garden/faostat/2026-02-25/faostat_fbsc
  #
  # FAOSTAT meadow steps for version 2026-02-25
  #
  data://meadow/faostat/2026-02-25/faostat_cisp:
    - snapshot://faostat/2026-02-25/faostat_cisp.zip
  ##################################################################################################################
  # NOTE: The latest version of FBS is missing data for various countries that are currently under review.
  # For now, import the data for those missing countries from the previous version:
  ##################################################################################################################
  data://meadow/faostat/2026-02-25/faostat_fbs:
    - snapshot://faostat/2026-02-25/faostat_fbs.zip
    - snapshot://faostat/2025-03-17/faostat_fbs.zip
  data://meadow/faostat/2026-02-25/faostat_fbsh:
    - snapshot://faostat/2026-02-25/faostat_fbsh.zip
  data://meadow/faostat/2026-02-25/faostat_fs:
    - snapshot://faostat/2026-02-25/faostat_fs.zip
  data://meadow/faostat/2026-02-25/faostat_lc:
    - snapshot://faostat/2026-02-25/faostat_lc.zip
  data://meadow/faostat/2026-02-25/faostat_qcl:
    - snapshot://faostat/2026-02-25/faostat_qcl.zip
  data://meadow/faostat/2026-02-25/faostat_qi:
    - snapshot://faostat/2026-02-25/faostat_qi.zip
  data://meadow/faostat/2026-02-25/faostat_scl:
    # NOTE: For convenience, we included the snapshot of SCL later, on 2026-05-21 (the latest update from FAOSTAT SCL was on 2025-11-01).
    - snapshot://faostat/2026-02-25/faostat_scl.zip
  ##################################################################################################################
  # NOTE: The latest version of QV is missing post-2017 data for all EU-27 countries.
  # For now, import the data for those missing country-years from the previous version:
  ##################################################################################################################
  data://meadow/faostat/2026-02-25/faostat_qv:
    - snapshot://faostat/2026-02-25/faostat_qv.zip
    - snapshot://faostat/2025-03-17/faostat_qv.zip
  data://meadow/faostat/2026-02-25/faostat_rfn:
    - snapshot://faostat/2026-02-25/faostat_rfn.zip
  data://meadow/faostat/2026-02-25/faostat_rl:
    - snapshot://faostat/2026-02-25/faostat_rl.zip
  data://meadow/faostat/2026-02-25/faostat_rp:
    - snapshot://faostat/2026-02-25/faostat_rp.zip
  data://meadow/faostat/2026-02-25/faostat_sdgb:
    - snapshot://faostat/2026-02-25/faostat_sdgb.zip
  #
  # FAOSTAT garden steps for version 2026-02-25
  #
  data://garden/faostat/2026-02-25/faostat_fbsc:
    - data://meadow/faostat/2026-02-25/faostat_fbsh
    - data://garden/demography/2024-07-15/population
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://meadow/faostat/2026-02-25/faostat_fbs
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_metadata:
    - data://meadow/faostat/2026-02-25/faostat_rp
    - data://meadow/faostat/2026-02-25/faostat_fbsh
    - data://meadow/faostat/2026-02-25/faostat_sdgb
    - data://meadow/faostat/2026-02-25/faostat_cisp
    - data://meadow/faostat/2026-02-25/faostat_metadata:
      - snapshot://faostat/2026-02-25/faostat_metadata.json
    - data://meadow/faostat/2026-02-25/faostat_qi
    - data://meadow/faostat/2026-02-25/faostat_fs
    - data://meadow/faostat/2026-02-25/faostat_rfn
    - data://meadow/faostat/2026-02-25/faostat_rl
    - data://meadow/faostat/2026-02-25/faostat_lc
    - data://meadow/faostat/2026-02-25/faostat_qcl
    - data://meadow/faostat/2026-02-25/faostat_fbs
    - data://meadow/faostat/2026-02-25/faostat_qv
    - data://meadow/faostat/2026-02-25/faostat_scl
  data://garden/faostat/2026-02-25/faostat_qcl:
    - data://garden/demography/2024-07-15/population
    - data://meadow/faostat/2026-02-25/faostat_qcl
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_qi:
    - data://meadow/faostat/2026-02-25/faostat_qi
    - data://garden/demography/2024-07-15/population
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_rfn:
    - data://garden/demography/2024-07-15/population
    - data://meadow/faostat/2026-02-25/faostat_rfn
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_rl:
    - data://garden/demography/2024-07-15/population
    - data://meadow/faostat/2026-02-25/faostat_rl
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_sdgb:
    - data://meadow/faostat/2026-02-25/faostat_sdgb
    - data://garden/demography/2024-07-15/population
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  data://garden/faostat/2026-02-25/faostat_scl:
    - data://garden/demography/2024-07-15/population
    - data://meadow/faostat/2026-02-25/faostat_scl
    - data://garden/faostat/2026-02-25/faostat_metadata
    - data://garden/wb/2026-07-01/income_groups
    - data://garden/regions/2023-01-01/regions
  #
  # FAOSTAT grapher steps for version 2026-02-25
  #
  data://grapher/faostat/2026-02-25/faostat_cisp:
    - data://garden/faostat/2026-02-25/faostat_cisp:
      - data://meadow/faostat/2026-02-25/faostat_cisp
      - data://garden/demography/2024-07-15/population
      - data://garden/faostat/2026-02-25/faostat_metadata
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/regions/2023-01-01/regions
  data://grapher/faostat/2026-02-25/faostat_fs:
    - data://garden/faostat/2026-02-25/faostat_fs:
      - data://meadow/faostat/2026-02-25/faostat_fs
      - data://garden/demography/2024-07-15/population
      - data://garden/faostat/2026-02-25/faostat_metadata
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/regions/2023-01-01/regions
  data://grapher/faostat/2026-02-25/faostat_lc:
    - data://garden/faostat/2026-02-25/faostat_lc:
      - data://garden/demography/2024-07-15/population
      - data://meadow/faostat/2026-02-25/faostat_lc
      - data://garden/faostat/2026-02-25/faostat_metadata
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/regions/2023-01-01/regions
  data://grapher/faostat/2026-02-25/faostat_qi:
    - data://garden/faostat/2026-02-25/faostat_qi
  data://grapher/faostat/2026-02-25/faostat_qv:
    - data://garden/faostat/2026-02-25/faostat_qv:
      - data://garden/regions/2023-01-01/regions
      - data://garden/demography/2024-07-15/population
      - data://garden/faostat/2026-02-25/faostat_metadata
      - data://garden/wb/2026-07-01/income_groups
      - data://meadow/faostat/2026-02-25/faostat_qv
  export://multidim/faostat/latest/fertilizer_use:
    - data://grapher/faostat/2026-02-25/faostat_rfn:
      - data://garden/faostat/2026-02-25/faostat_rfn
    # FAOSTAT grapher step for additional variables for version 2026-05-22
    - data://grapher/faostat/2026-05-22/additional_variables:
      # FAOSTAT garden step for additional variables for version 2026-05-22
      - data://garden/faostat/2026-05-22/additional_variables:
        - data://garden/faostat/2026-02-25/faostat_rl
        - data://garden/faostat/2026-02-25/faostat_qi
        - data://garden/faostat/2026-02-25/faostat_qcl
        - data://garden/faostat/2026-02-25/faostat_sdgb
        - data://garden/faostat/2026-02-25/faostat_fbsc
        - data://garden/faostat/2026-02-25/faostat_rfn
  data://grapher/faostat/2026-02-25/faostat_rl:
    - data://garden/faostat/2026-02-25/faostat_rl
  data://grapher/faostat/2026-02-25/faostat_rp:
    - data://garden/faostat/2026-02-25/faostat_rp:
      - data://meadow/faostat/2026-02-25/faostat_rp
      - data://garden/demography/2024-07-15/population
      - data://garden/faostat/2026-02-25/faostat_metadata
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/regions/2023-01-01/regions
  data://grapher/faostat/2026-02-25/faostat_sdgb:
    - data://garden/faostat/2026-02-25/faostat_sdgb
  ######################################################################################################################
  #
  # FAOSTAT Detailed Trade Matrix (faostat_tm).
  #
  # Standalone trade-flow steps that powers a bespoke food trade visualization.
  # They are intentionally decoupled from the rest of the FAOSTAT pipeline because the matrix is huge (~8.5 GB uncompressed), and won't go to grapher in the usual way.
  data://meadow/faostat/2026-05-07/faostat_tm:
    - snapshot://faostat/2026-05-07/faostat_tm.zip
  data://garden/faostat/2026-05-07/faostat_tm:
    - data://meadow/faostat/2026-05-07/faostat_tm
  # Viz-ready slice of the trade matrix for the latest year. All the build logic lives in this
  # garden step; the dropdown definition lives next to it in food_trade.items.yaml.
  data://garden/faostat/2026-05-07/food_trade:
    - data://garden/faostat/2026-05-07/faostat_tm
  # S3 export step: load the garden table and write a metadata JSON plus one JSON per product
  # under s3://owid-public/data/food-trade/, for the bespoke viz to fetch.
  export://s3/faostat/latest/food_trade:
    - data://garden/faostat/2026-05-07/food_trade
  ######################################################################################################################
