steps:
  # OECD plastic production and plastic waste datasets
  data://meadow/oecd/2023-09-21/plastic_waste_2019:
    - snapshot://oecd/2023-09-21/plastic_waste_2019.csv
  data://grapher/oecd/2023-09-21/plastic_waste_2019:
    - data://garden/oecd/2023-09-21/plastic_waste_2019:
      - data://meadow/oecd/2023-09-21/plastic_waste_2019
  data://grapher/oecd/2023-09-21/plastic_waste_2019_by_polymer:
    - data://garden/oecd/2023-09-21/plastic_waste_2019_by_polymer:
      - data://meadow/oecd/2023-09-21/plastic_waste_2019
  data://grapher/oecd/2023-09-21/plastic_aquatic_leakage:
    - data://garden/oecd/2023-09-21/plastic_aquatic_leakage:
      - data://meadow/oecd/2023-09-21/plastic_aquatic_leakage:
        - snapshot://oecd/2023-09-21/plastic_aquatic_leakage.csv
  data://grapher/oecd/2023-09-21/plastic_emissions:
    - data://garden/oecd/2023-09-21/plastic_emissions:
      - data://meadow/oecd/2023-09-21/plastic_emissions:
        - snapshot://oecd/2023-09-21/plastic_emissions.csv
  data://garden/oecd/2023-09-21/plastic_use_application:
    - data://meadow/oecd/2023-09-21/plastic_use_application:
      - snapshot://oecd/2023-09-21/plastic_use_application.csv
  data://grapher/oecd/2023-09-21/plastic_use_application:
    - data://garden/oecd/2023-09-21/plastic_use_application
  data://grapher/oecd/2023-09-21/plastic_use_polymer:
    - data://garden/oecd/2023-09-21/plastic_use_polymer:
      - data://meadow/oecd/2023-09-21/plastic_use_polymer:
        - snapshot://oecd/2023-09-21/plastic_use_polymer.csv
  data://grapher/oecd/2023-09-21/plastic_use_projections:
    - data://garden/oecd/2023-09-21/plastic_use_projections:
      - data://meadow/oecd/2023-09-21/plastic_use_projections:
        - snapshot://oecd/2023-09-21/plastic_use_projections.csv
  data://grapher/oecd/2023-09-21/plastic_fate_regions_projections:
    - data://garden/oecd/2023-09-21/plastic_fate_regions_projections:
      - data://meadow/oecd/2023-09-21/plastic_fate_regions_projections:
        - snapshot://oecd/2023-09-21/plastic_fate_regions_projections.csv

  # Geyer et al. 2017 historical plastic production
  data://grapher/plastic_waste/2023-09-26/geyer_2017:
    - data://garden/plastic_waste/2023-09-26/geyer_2017:
      - data://meadow/plastic_waste/2023-09-26/geyer_2017:
        - snapshot://plastic_waste/2023-09-26/geyer_2017.pdf
      - data://garden/oecd/2023-09-21/plastic_use_application
  # UN plastic trade dataset 2023-2024
  data://grapher/un/2025-09-25/plastic_waste_2023_2024:
    - data://garden/un/2025-09-25/plastic_waste_2023_2024:
      - data://meadow/un/2025-09-25/plastic_waste_2023_2024:
        - snapshot://un/2025-09-25/plastic_waste_2023_2024.csv
      - data://garden/regions/2023-01-01/regions
      - data://garden/wb/2026-07-01/income_groups
      - data://garden/demography/2024-07-15/population
      # UN Comstat plastic trade dataset
      - data://garden/un/2023-10-09/plastic_waste:
        - data://meadow/un/2023-10-09/plastic_waste:
          - snapshot://un/2023-10-09/plastic_waste_1987_1998.csv
          - snapshot://un/2023-10-09/plastic_waste_1999_2010.csv
          - snapshot://un/2023-10-09/plastic_waste_2011_2022.csv
        - data://garden/regions/2023-01-01/regions
        - data://garden/wb/2026-07-01/income_groups
        - data://garden/demography/2023-03-31/population
  export://multidim/plastic_waste/latest/plastic_waste_trade:
    - data://grapher/un/2025-09-25/plastic_waste_2023_2024

  # Nature plastic waste emissions inventory (Cottom et al. 2024)
  data://grapher/plastic_waste/2026-01-14/cottom_plastic_waste:
    - data://garden/plastic_waste/2026-01-14/cottom_plastic_waste:
      - data://meadow/plastic_waste/2026-01-14/cottom_plastic_waste:
        - snapshot://plastic_waste/2026-01-14/cottom_plastic_waste.zip
  export://multidim/plastic_waste/latest/mismanaged_plastic_waste:
    - data://grapher/plastic_waste/2026-01-14/cottom_plastic_waste
  export://multidim/plastic_waste/latest/plastic_waste_generation:
    - data://grapher/plastic_waste/2026-01-14/cottom_plastic_waste

  #
  # Plastic pollution explorer.
  #
  export://explorers/plastic_waste/latest/plastic_pollution:
    - data://grapher/plastic_pollution/2021-04-30/plastic_ocean_pollution__meijer_et_al__2021
    - data://grapher/plastic_waste/2017-11-22/plastic_waste__jambeck_et_al__2015
    - data://grapher/plastic_waste/2018-01-01/plastic_waste_generation_by_country__owid_based_on_jambeck_et_al__and__world_bank
    - data://grapher/oecd/2023-09-21/plastic_fate_regions:
      - data://garden/oecd/2023-09-21/plastic_fate_regions:
        - data://meadow/oecd/2023-09-21/plastic_fate_regions:
          - snapshot://oecd/2023-09-21/plastic_fate_regions.csv
    - data://grapher/un/2025-09-25/plastic_waste_2023_2024
