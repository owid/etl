      - data://garden/faostat/2025-03-17/faostat_rl
      - data://garden/regions/2023-01-01/regions
      - data://garden/demography/2024-07-15/population
  #
  # Lobell Lab: Crop productivity in southern Africa
  # NOTE: Not updateable.
  #
  #
  # Lobell Lab: Crop productivity in southern Africa
  # NOTE: Not updateable.
  #
  #
  # Lobell Lab: Crop productivity in southern Africa
  # NOTE: Not updateable.
  #
