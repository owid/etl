steps:
  # Maddison Project Database
  data://garden/ggdc/2024-04-26/maddison_project_database:
    - data://meadow/ggdc/2024-04-26/maddison_project_database:
      - snapshot://ggdc/2024-04-26/maddison_project_database.xlsx
  data://grapher/ggdc/2024-04-26/maddison_project_database:
    - data://garden/ggdc/2024-04-26/maddison_project_database

    # Maddison Database 2010

  # Global GDP in the long run (with WDI)
  data://grapher/growth/2024-05-16/gdp_historical:
    - data://garden/growth/2024-05-16/gdp_historical:
      - data://garden/ggdc/2024-04-26/maddison_project_database
      - data://garden/ggdc/2022-12-23/maddison_database:
        - data://meadow/ggdc/2022-12-23/maddison_database:
          - snapshot://ggdc/2022-12-23/maddison_database.xlsx
      - data://grapher/worldbank_wdi/2026-02-27/wdi

  # Penn World Table
  data://garden/ggdc/2025-10-09/penn_world_table:
    - data://meadow/ggdc/2025-10-09/penn_world_table:
      - snapshot://ggdc/2025-10-09/penn_world_table.xlsx
    - data://garden/ggdc/2025-10-09/penn_world_table_national_accounts:
      - data://meadow/ggdc/2025-10-09/penn_world_table_national_accounts:
        - snapshot://ggdc/2025-10-09/penn_world_table_national_accounts.xlsx
        - data://garden/regions/2023-01-01/regions
  data://grapher/ggdc/2025-10-09/penn_world_table:
    - data://garden/ggdc/2025-10-09/penn_world_table

      # IMF World Economic Outlook
  data://grapher/imf/2026-04-22/world_economic_outlook:
    - data://garden/imf/2026-04-22/world_economic_outlook:
      - data://meadow/imf/2026-04-22/world_economic_outlook:
        - snapshot://imf/2026-04-22/world_economic_outlook.csv

  #
  # Average working hours - Huberman and Minns (2007)
  #
  data://garden/working_hours/2025-08-05/huberman_minns:
    - data://meadow/working_hours/2025-08-05/huberman_minns:
      - snapshot://working_hours/2025-08-05/huberman_minns.csv
  data://grapher/working_hours/2025-08-05/huberman_minns:
    - data://garden/working_hours/2025-08-05/huberman_minns

  #
  # Working hours OMM
  #
  data://grapher/working_hours/2025-08-05/working_hours_omm:
    - data://garden/working_hours/2025-08-05/working_hours_omm:
      - data://garden/ggdc/2025-10-09/penn_world_table
      - data://garden/working_hours/2025-08-05/huberman_minns

    # GDP per capita vs. living conditions indicators
    # NOTE: Don't forget to run with --private to access the GBD risk factors data
  data://garden/growth/2025-01-16/gdppc_vs_living_conditions:
    - data://garden/worldbank_wdi/2026-02-27/wdi
    - data://garden/un/2024-07-12/un_wpp
    - data://garden/un/2025-03-25/igme
    - data://garden/maternal_mortality/2024-07-08/maternal_mortality
    - data://garden/wash/2025-12-08/household
    - data://garden/tourism/2026-01-21/unwto
    - data://garden/ggdc/2025-10-09/penn_world_table
    - data://garden/education/2025-08-20/harmonized_scores
    - data://grapher/wb/2025-09-08/gender_statistics
    - data://garden/unesco/2025-05-01/education_sdgs
    - data://garden/happiness/2026-03-16/happiness
    - data://garden/who/2025-05-19/gho
    - data://garden/wb/2026-03-24/world_bank_pip
    - data://garden/un/2025-05-07/undp_hdr
    - data://garden/demography/2024-07-15/population
    - data://garden/regions/2023-01-01/regions
    - data-private://garden/ihme_gbd/2026-02-07/gbd_risk_deaths

  #
  # A millennium of macroeconomic data (Bank of England)
  #
  data://garden/bank_of_england/2025-12-29/millennium_macroeconomic_data:
    - data://meadow/bank_of_england/2025-12-29/millennium_macroeconomic_data:
      - snapshot://bank_of_england/2025-12-29/millennium_macroeconomic_data.xlsx
  #
  # CPI UK (ONS)
  #
  data://garden/ons/2025-12-31/cpi_uk:
    - data://meadow/ons/2025-12-31/cpi_uk:
      - snapshot://ons/2025-12-31/cpi_uk.csv

  #
  # Real average weekly earnings UK (ONS)
  #
  data://garden/ons/2025-12-31/average_weekly_earnings_uk:
    - data://meadow/ons/2025-12-31/average_weekly_earnings_uk:
      - snapshot://ons/2025-12-31/average_weekly_earnings_uk.xlsx
  #
  # A millennium of macroeconomic data (Bank of England) - Version 4 (extract)
  #
  data://garden/bank_of_england/2026-01-21/millennium_macroeconomic_data:
    - data://meadow/bank_of_england/2026-01-21/millennium_macroeconomic_data:
      - snapshot://bank_of_england/2026-01-21/millennium_macroeconomic_data.xlsx
