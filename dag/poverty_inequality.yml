steps:
  # Poverty and inequality dataset for comparison explorers (check steps for updating tables)
  data://explorers/poverty_inequality/latest/poverty_inequality:
    - data://explorers/wb/latest/world_bank_pip:
      - data://garden/wb/2026-03-24/world_bank_pip_legacy
    - data://explorers/wid/latest/world_inequality_database:
      - data://garden/wid/2026-02-10/world_inequality_database_legacy

  # World Bank Poverty and Inequality Platform
  data://meadow/wb/2026-03-24/world_bank_pip:
    - snapshot://wb/2026-03-24/world_bank_pip_percentiles.csv
    - snapshot://wb/2026-03-24/world_bank_pip.csv
  # Dimensional PIP pipeline
  data://garden/wb/2026-03-24/world_bank_pip:
    - data://meadow/wb/2026-03-24/world_bank_pip
  data://grapher/wb/2026-03-24/world_bank_pip:
    - data://garden/wb/2026-03-24/world_bank_pip
  export://multidim/wb/latest/poverty_pip:
    - data://grapher/wb/2026-03-24/world_bank_pip
  export://multidim/wb/latest/incomes_pip:
    - data://grapher/wb/2026-03-24/world_bank_pip
    - data://grapher/demography/2024-07-15/population
    - data://grapher/regions/2023-01-01/regions
  export://multidim/wb/latest/gini_pip:
    - data://grapher/wb/2026-03-24/world_bank_pip
  export://multidim/wb/latest/palma_ratio_pip:
    - data://grapher/wb/2026-03-24/world_bank_pip
  # Legacy PIP pipeline
  data://garden/wb/2026-03-24/world_bank_pip_legacy:
    - data://meadow/wb/2026-03-24/world_bank_pip

  # PREVIOUS VERSION (TO KEEP 2011 PRICES and 2017 PRICES BEFORE THE CHANGES IN SURVEYS)
  data://grapher/wb/2025-04-14/world_bank_pip:
    - data://garden/wb/2025-04-14/world_bank_pip:
      - data://meadow/wb/2025-04-08/world_bank_pip:
        - snapshot://wb/2025-04-08/world_bank_pip.csv
        - snapshot://wb/2025-04-08/world_bank_pip_percentiles.csv
        - snapshot://wb/2025-04-08/world_bank_pip_regions.csv

    # World Inequality Database
  data://meadow/wid/2026-02-10/world_inequality_database:
    - snapshot://wid/2026-02-10/world_inequality_database_distribution.csv
    - snapshot://wid/2026-02-10/world_inequality_database_fiscal.csv
    - snapshot://wid/2026-02-10/world_inequality_database_distribution_with_extrapolations.csv
    - snapshot://wid/2026-02-10/world_inequality_database_with_extrapolations.csv
    - data://garden/regions/2023-01-01/regions
    - snapshot://wid/2026-02-10/world_inequality_database.csv
  data://grapher/wid/2026-02-10/world_inequality_database:
    - data://garden/wid/2026-02-10/world_inequality_database:
      - data://meadow/wid/2026-02-10/world_inequality_database
  export://multidim/wid/latest/incomes_wid:
    - data://grapher/wid/2026-02-10/world_inequality_database
    - data://grapher/demography/2024-07-15/population
    - data://grapher/regions/2023-01-01/regions
  export://multidim/wid/latest/gini_wid:
    - data://grapher/wid/2026-02-10/world_inequality_database
  export://multidim/wid/latest/palma_ratio_wid:
    - data://grapher/wid/2026-02-10/world_inequality_database

    # Legacy WID pipeline
  data://garden/wid/2026-02-10/world_inequality_database_legacy:
    - data://meadow/wid/2026-02-10/world_inequality_database

  #
  # Luxembourg Income Study
  #
  data://grapher/lis/2026-03-16/luxembourg_income_study:
    - data://garden/lis/2026-03-16/luxembourg_income_study:
      - data://meadow/lis/2026-03-16/luxembourg_income_study:
        - snapshot://lis/2026-03-16/lis_absolute_poverty.csv
        - snapshot://lis/2026-03-16/lis_inequality.csv
        - snapshot://lis/2026-03-16/lis_incomes.csv
        - snapshot://lis/2026-03-16/lis_relative_poverty.csv
  export://explorers/lis/latest/poverty_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study
  export://explorers/lis/latest/inequality_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study
  export://explorers/lis/latest/incomes_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study
  export://multidim/lis/latest/gini_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study
  export://multidim/lis/latest/relative_poverty_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study
  export://multidim/lis/latest/incomes_lis:
    - data://grapher/lis/2026-03-16/luxembourg_income_study

  # Inequality comparison data

  # Poverty and inequality file for inequality comparisons at OWID
  data://grapher/poverty_inequality/2025-01-22/inequality_comparison:
    - data://garden/poverty_inequality/2025-01-22/inequality_comparison:
      - data://garden/poverty_inequality/2025-01-22/poverty_inequality_file:
        - data://garden/wb/2026-03-24/world_bank_pip_legacy
        - data://garden/wid/2026-02-10/world_inequality_database_legacy
        - data://garden/worldbank_wdi/2026-02-27/wdi
      - data://garden/demography/2024-07-15/population
      - data://garden/regions/2023-01-01/regions
      - data://garden/wb/2026-03-24/world_bank_pip_legacy
      - data://garden/wid/2026-02-10/world_inequality_database_legacy

    # Global Multidimensional Poverty Index
  data://grapher/ophi/2025-12-23/multidimensional_poverty_index:
    - data://garden/ophi/2025-12-23/multidimensional_poverty_index:
      - data://meadow/ophi/2025-12-23/multidimensional_poverty_index:
        - snapshot://ophi/2025-12-23/multidimensional_poverty_index_hot.csv
        - snapshot://ophi/2025-12-23/multidimensional_poverty_index_cme.csv

  # # OECD Income Distribution Database
  data://grapher/oecd/2026-04-23/income_distribution_database:
    - data://garden/oecd/2026-04-23/income_distribution_database:
      - data://meadow/oecd/2026-04-23/income_distribution_database:
        - snapshot://oecd/2026-04-23/income_distribution_database.csv

  # Historical poverty data - Moatsos (2021)
  data://grapher/moatsos/2023-10-09/moatsos_historical_poverty:
    - data://garden/moatsos/2023-10-09/moatsos_historical_poverty:
      - data://meadow/moatsos/2023-10-09/moatsos_historical_poverty:
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_oecd.csv
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_oecd_countries_share.xlsx
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_oecd_regions_number.xlsx
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_5.csv
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_10.csv
        - snapshot://moatsos/2023-10-09/moatsos_historical_poverty_30.csv

  # 1000 Binned Global Distribution (World Bank PIP)
  data://garden/wb/2026-03-25/thousand_bins_distribution:
    - data://meadow/wb/2026-03-25/thousand_bins_distribution:
      - snapshot://wb/2026-03-25/thousand_bins_distribution.dta
  data://external/poverty_inequality/latest/thousand_bins_distribution:
    - data://garden/wb/2026-03-25/thousand_bins_distribution

  #
  # Historical inequality estimates from van Zanden et al. (2014)
  #

  # Historical poverty estimates (combining thousand_bins with Maddison GDP growth)
  data://grapher/poverty_inequality/2025-10-23/historical_poverty:
    - data://garden/poverty_inequality/2025-10-23/historical_poverty:
      - data://garden/wb/2026-03-25/thousand_bins_distribution
      - data://garden/ggdc/2024-04-26/maddison_project_database
      - data://garden/wb/2026-03-24/world_bank_pip
      - data://garden/poverty_inequality/2025-11-11/historical_inequality_van_zanden_et_al:
        - data://meadow/poverty_inequality/2025-11-11/historical_inequality_van_zanden_et_al:
          - snapshot://poverty_inequality/2025-11-11/historical_inequality_van_zanden_et_al.xlsx
      - data://garden/demography/2024-07-15/population
      - data://garden/demography/2025-12-10/population_ireland
      - data://garden/regions/2023-01-01/regions

  # Socio-Economic Database for Latin America and the Caribbean (SEDLAC)
  data://garden/cedlas/2025-04-01/sedlac:
    - data://meadow/cedlas/2025-04-01/sedlac:
      - snapshot://cedlas/2025-04-01/sedlac_poverty.xlsx
      - snapshot://cedlas/2025-04-01/sedlac_incomes.xlsx
      - snapshot://cedlas/2025-04-01/sedlac_inequality.xlsx

  # OECD Affordable Housing Database - Homelessness
  data://grapher/oecd/2024-04-30/affordable_housing_database:
    - data://garden/oecd/2024-04-30/affordable_housing_database:
      - data://meadow/oecd/2024-04-30/affordable_housing_database:
        - snapshot://oecd/2024-04-30/affordable_housing_database_homelessness.xlsx

  # Institute of Global Homelessness - Better Data Project
  data://grapher/igh/2024-07-05/better_data_homelessness:
    - data://garden/igh/2024-07-05/better_data_homelessness:
      - data://meadow/igh/2024-07-05/better_data_homelessness:
        - snapshot://igh/2024-07-05/better_data_homelessness.xlsx
  #
  # Harmonized national poverty lines (for 2021 PPPs poverty lines)
  #
  data://grapher/wb/2025-06-11/harmonized_national_poverty_lines:
    - data://garden/wb/2025-06-11/harmonized_national_poverty_lines:
      - data://meadow/wb/2025-06-11/harmonized_national_poverty_lines:
        - snapshot://wb/2025-06-11/harmonized_national_poverty_lines.dta

  #
  # Poverty projections in 2021 prices up to 2050
  #
  data://grapher/wb/2026-03-25/poverty_projections:
    - data://garden/wb/2026-03-25/poverty_projections:
      - data://meadow/wb/2026-03-25/poverty_projections:
        - snapshot://wb/2026-03-25/poverty_projections.dta

  # International dollars conversions (from PIP and WDI)
  data://external/owid_grapher/latest/int_dollar_conversions:
    - data://garden/worldbank_wdi/2026-02-27/wdi
    - data://garden/wb/2026-03-24/world_bank_pip
    - data://garden/regions/2023-01-01/regions
    - data://garden/worldbank_icp/2024-05-30/icp_2021_currencies:
      - snapshot://worldbank_icp/2024-05-30/icp_2021_currencies.json:
      - data://garden/regions/2023-01-01/regions
