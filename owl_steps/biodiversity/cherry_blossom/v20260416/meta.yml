datasets:
  cherry_blossom:
    dataset:
      title: Cherry Blossom Full Bloom Dates in Kyoto, Japan
      description: |-
        A historical time series of peak cherry blossom bloom data from Kyoto, Japan. The timing of peak cherry blossom is linked to weather and climate factors. Warmer weather, due to climate change, is pulling peak cherry blossom earlier in the year.

        Yasuyuki Aono compiled this data based on multiple sources:

              - Taguchi,T. (1939) Climatic change in historical time in Japan J. Mar. Meteorol. Soc. 19 217–27

              - Sekiguchi,T. (1969) The historical dates of Japanese cherry festival since the 8th century and her climatic changes Tokyo Geog. Pap. 13 175–90

              - Aono,Y. and Omoto,Y. (1994) Estimation of temperature at Kyoto since 11th century using flowering data of cherry tree in old documents J. Agric. Meteorol. 49 263–72

              - Aono,Y. and Kazui,K. (2008) Phenological data series of cherry tree flowering in Kyoto, Japan, and its application to reconstruction of springtime temperatures since the 9th century Int. J. Climatol. 28 905–14

              - Aono,Y. and Saito,S. (2010) Clarifying springtime temperature reconstructions of the medieval period by gap-filling the cherry blossom phenological data series at Kyoto, Japan Int. J. Biometeorol. 54 211–9

              Data for 812-2021 is available here - http://atmenv.envi.osakafu-u.ac.jp/aono/kyophenotemp4/

              Data for 2022 & 2023 full blossom is gathered from personal communication with Yasuyuki Aono.
      update_period_days: 365
    tables:
      cherry_blossom:
        variables:
          full_flowering_date:
            title: Day of the year with peak cherry blossom
            description_short: The day of the year with the peak cherry blossom of the Prunus jamasakura species of cherry tree in Kyoto, Japan.
            unit: day of the year
            short_unit: ""
            display:
              numDecimalPlaces: 0
              color: "#e7adca"
            processing_level: minor
            presentation:
              topic_tags:
                - Biodiversity
                - Climate Change
              grapher_config:
                title: Day of the year with peak cherry tree blossom in Kyoto, Japan
                subtitle: >
                  The vertical axis shows the date of peak blossom, expressed as the number of days since 1st January. The timing of the peak cherry blossom is influenced by spring temperatures. Higher temperatures due to climate change have caused the peak blossom to gradually move earlier in the year since the early 20th century.
                yAxis:
                  min: 70
                selectedEntityNames:
                  - Japan
          average_last_30_years:
            title: Thirty-year average day of the year with peak cherry blossom
            description_short: A thirty year moving average of the day of the year with peak cherry blossom (Prunus jamasakura species). Only calculated for 30-year periods with at least ten years of data.
            description_processing: |-
              - The 30-year moving average is calculated by taking the last 30 years (including the current year) and averaging over the day of the year with peak cherry blossom. The average is only calculated for 30-year periods with at least ten years of data.
              - This means the average for 2026 includes data from 1997 to 2026, and is only calculated if at least ten of those years have data on the peak cherry blossom.
            unit: day of the year
            short_unit: ""
            display:
              numDecimalPlaces: 2
              color: "#c15065"
            processing_level: major
            presentation:
              topic_tags:
                - Biodiversity
                - Climate Change
              grapher_config:
                title: Thirty-year average day of the year with peak cherry tree blossom in Kyoto, Japan
                subtitle: |-
                  The vertical axis shows the date of peak blossom, expressed as the number of days since 1st January. The timing of the peak cherry blossom is influenced by spring temperatures. Higher temperatures due to climate change have caused the peak blossom to gradually move earlier in the year since the early 20th century.
                yAxis:
                  min: 70
                selectedEntityNames:
                  - Japan
