# ── Snapshot metadata ─────────────────────────────────────────────────
snapshots:
  historical_data:
    origin:
      producer: Yasuyuki Aono
      title: Cherry Blossom Full Bloom Dates in Kyoto, Japan
      description: |-
        A historical time series of peak cherry blossom bloom data from
        Kyoto, Japan. The timing of peak cherry blossom is linked to weather
        and climate factors. Warmer weather, due to climate change, is pulling
        peak cherry blossom earlier in the year.

        Yasuyuki Aono compiled this data based on multiple sources.
        Data for 812-2021 is available here:
        http://atmenv.envi.osakafu-u.ac.jp/aono/kyophenotemp4/
      citation_full: |-
        - Aono and Kazui (2008) International Journal of Climatology, 28, 905-914
        - Aono and Saito (2010) International Journal of Biometeorology, 54, 211-219
        - Aono (2012) Chikyu Kankyo (Global Environment), 17, 21-29
      attribution_short: Aono
      url_main: http://atmenv.envi.osakafu-u.ac.jp/aono/kyophenotemp4/
      url_download: http://atmenv.envi.osakafu-u.ac.jp/omu-content/uploads/sites/1215/2015/10/KyotoFullFlower7.xls
      date_accessed: "2024-01-25"
      date_published: "2021-03-06"
      license:
        name: CC BY 4.0
        url: https://creativecommons.org/licenses/by/4.0/

  recent_data:
    origin:
      producer: Yasuyuki Aono
      title: Cherry Blossom Full Bloom Dates in Kyoto, Japan
      description: |-
        Recent years (2016-2025) of peak cherry blossom full-flowering dates
        in Kyoto, Japan. Data gathered from personal communication with
        Yasuyuki Aono and social media posts.
      citation_full: |-
        - Aono and Kazui (2008) International Journal of Climatology, 28, 905-914
        - Aono and Saito (2010) International Journal of Biometeorology, 54, 211-219
        - Aono (2012) Chikyu Kankyo (Global Environment), 17, 21-29
      attribution_short: Aono
      url_main: https://web.archive.org/web/20250214112552/http://atmenv.envi.osakafu-u.ac.jp/aono/kyophenotemp4/
      date_accessed: "2025-04-07"
      date_published: "2025-04-07"
      license:
        name: CC BY 4.0
        url: https://creativecommons.org/licenses/by/4.0/

# ── Datasets ─────────────────────────────────────────────────────────
datasets:
  cherry_blossom:
    dataset:
      title: Cherry Blossom Full Bloom Dates in Kyoto, Japan
      description: |-
        A 1200-year time series of peak cherry blossom bloom dates in Kyoto,
        Japan. Warmer spring temperatures due to climate change have caused
        the peak to move earlier in the year.
      source: Yasuyuki Aono
      tags:
        - Biodiversity
        - Climate Change
    columns:
      country:
        title: Country
        role: entity
      year:
        title: Year
        unit: year
        role: time
      full_flowering_date:
        title: Day of the year with peak cherry blossom
        description: |-
          The day of the year with the peak cherry blossom of the
          Prunus jamasakura species of cherry tree in Kyoto, Japan.
        unit: day of the year
        role: metric
      average_20_years:
        title: Twenty-year average day of peak cherry blossom
        description: |-
          A twenty-year moving average of the day of the year with peak
          cherry blossom. Only calculated for 20-year periods with at
          least five years of data.
        unit: day of the year
        role: metric
